<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMTC Tasks Showcase — Web</title>
    <style>
      /* Custom font from the materialized public/fonts (the assets
         step copies the shared assets/Brand.ttf here). <Text font="Brand">
         emits font-family: Brand. */
      @font-face {
        font-family: 'Brand';
        src: url('/fonts/Brand.ttf') format('truetype');
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        max-width: 640px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      input {
        font: inherit;
        padding: 0.25rem 0.5rem;
      }
      button {
        font: inherit;
        padding: 0.25rem 0.75rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>PMTC Tasks Showcase — Web</h1>
    <div id="app" data-testid="app-root"></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
