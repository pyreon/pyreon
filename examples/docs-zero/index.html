<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F0F14" />

    <!-- Title + description are overridden per-page via @pyreon/head's
         useHead() in _layout.tsx. The default below ships on the home
         page and any SSG render that doesn't set a title explicitly. -->
    <title>Pyreon — the signal-based UI framework</title>
    <meta
      name="description"
      content="Signal-based UI framework — fine-grained reactivity, no virtual DOM, streaming SSR."
    />

    <!-- FOUC-safe theme sync. Mirrors VitePress's localStorage key
         ('vitepress-theme-appearance') so the cut-over is seamless for
         users who already have a stored preference. Sets data-theme on
         <html> BEFORE first paint so tokens.css resolves the right
         palette with no flash. Default = dark per brand handoff. -->
    <script>
      ;(function () {
        try {
          var a = localStorage.getItem('vitepress-theme-appearance')
          var d =
            !a ||
            a === 'dark' ||
            (a === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = d ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>

    <!-- Brand fonts — Space Grotesk (sans) + JetBrains Mono (mono/accent),
         exactly the family set + weights from brand handoff §4. Preconnect
         primes the TCP/TLS handshake; the stylesheet link uses
         display=swap so first paint shows the system fallback rather
         than a blank text invisible-until-loaded. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!-- Brand favicon — rounded ink tile + ember disc. Leading slash
         so Vite's index.html transform base-prefixes it to
         `/<base>/favicon.svg`. Relative `./favicon.svg` would resolve
         against the current page URL and 404 on deep routes like
         `/pyreon/preview/docs/X/` (→ tried to load `/docs/favicon.svg`). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph + Twitter card. og:image is absolute because social
         scrapers don't resolve site-relative paths. The OG asset is an
         SVG (Twitter/Slack prefer raster — a build-time PNG rasterize
         is a documented follow-up; same gap as VitePress today). -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pyreon — the signal-based UI framework" />
    <meta
      property="og:description"
      content="Signal-based UI framework — fine-grained reactivity, no virtual DOM, streaming SSR."
    />
    <meta property="og:image" content="https://pyreon.github.io/pyreon/og.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://pyreon.github.io/pyreon/og.svg" />
  </head>
  <body>
    <div id="app"><!--pyreon-app--></div>
    <!--pyreon-head-->
    <!--pyreon-scripts-->
  </body>
</html>
