<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@pyreon/example-real-bench — real-app head-to-head</title>
    <style>
      body { font: 14px/1.5 ui-monospace, monospace; margin: 1.5rem; }
      .todos { list-style: none; padding: 0; margin: 0; }
      .todos li { padding: 2px 0; }
      .todos li.completed span { text-decoration: line-through; opacity: 0.5; }
      table { border-collapse: collapse; margin-top: 1rem; }
      th, td { border: 1px solid #ccc; padding: 4px 10px; text-align: right; }
      th:first-child, td:first-child { text-align: left; }
      #status { font-weight: bold; }
    </style>
  </head>
  <body>
    <h1>@pyreon/example-real-bench</h1>
    <p id="status">idle</p>
    <div id="app"></div>
    <div id="results"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
