<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyreon — Preact Compat Example</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #141416;
        --surface-2: #1c1c20;
        --border: #2a2a2e;
        --text: #e4e4e7;
        --text-muted: #71717a;
        --accent: #fb923c;
        --accent-dim: #c2410c;
        --green: #34d399;
        --red: #f87171;
        --radius: 8px;
        --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        padding: 2rem;
        max-width: 800px;
        margin: 0 auto;
      }

      header { margin-bottom: 2rem; }
      h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
      .subtitle { color: var(--text-muted); margin-top: 0.5rem; }
      .api-count {
        margin-top: 0.75rem;
        color: var(--accent);
        font-size: 0.9rem;
      }

      nav {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem 1.25rem;
        margin-bottom: 2rem;
      }
      nav h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
      .api-index { display: flex; flex-wrap: wrap; gap: 6px; }
      .tag {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 8px;
        color: var(--accent);
      }

      button {
        font-family: inherit;
        font-size: 0.85rem;
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 14px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      button:hover { background: var(--border); border-color: var(--accent-dim); }
      button.selected {
        background: var(--accent-dim);
        border-color: var(--accent);
        color: white;
      }

      ul { list-style: none; padding-left: 0; }
      li {
        padding: 4px 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
      }
      li::before { content: "\2192 "; color: var(--accent); }

      .row { display: flex; gap: 6px; flex-wrap: wrap; margin: 0.5rem 0; }

      .demo {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 1rem;
        overflow: hidden;
        padding-bottom: 1rem;
      }
      .demo > p,
      .demo > button,
      .demo > div:not(.demo-header),
      .demo > ul {
        margin-left: 1.25rem;
        margin-right: 1.25rem;
      }
      .demo > p { margin: 0.25rem 0; }
      .demo-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1.25rem;
        border-bottom: 1px solid var(--border);
        gap: 1rem;
      }
      .demo-header h2 { font-size: 1rem; font-weight: 600; white-space: nowrap; }
      .demo-meta { display: flex; align-items: center; gap: 0.75rem; }
      .api-tags {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--accent);
        white-space: nowrap;
      }
      .code-toggle {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        background: var(--surface-2);
        color: var(--text-muted);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 10px;
        cursor: pointer;
        white-space: nowrap;
        transition: color 0.15s, border-color 0.15s;
      }
      .code-toggle:hover { color: var(--text); border-color: var(--accent-dim); }

      .code-preview {
        background: #0d0d0f;
        border-bottom: 1px solid var(--border);
        padding: 1rem 1.25rem;
        overflow-x: auto;
      }
      .code-preview code {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        line-height: 1.5;
        color: #a1a1aa;
        white-space: pre;
      }

      input {
        font-family: inherit;
        font-size: 0.85rem;
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 10px;
        outline: none;
      }
      input:focus { border-color: var(--accent-dim); }

      strong { color: var(--accent); font-weight: 600; }
      .muted { color: var(--text-muted); font-size: 0.85rem; }
      .highlight { color: var(--green); }
      .error-msg { color: var(--red); font-weight: 600; }

      footer {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      @media (max-width: 600px) {
        body { padding: 1rem; }
        .demo-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
