name: Setup Pyreon
description: |
  Composite action for the common downstream-job preamble: setup-bun
  (pinned via .bun-version) + optional setup-node + restore node_modules
  cache (per-run, populated by Install) + restore bootstrap lib/ cache
  (per-run, populated by Install).

  **The caller MUST run `actions/checkout` first**, BEFORE invoking this
  composite. Local composite actions (`./.github/actions/...`) are
  resolved from disk; the runner needs the action.yml on disk before
  the invocation, which requires the checkout step at the JOB level.
  Putting checkout INSIDE the composite breaks with `Can't find
  action.yml ... Did you forget to run actions/checkout before running
  your local action?`

  Replaces the duplicated preamble (setup-bun + 2 cache restores) across
  16 jobs in ci.yml. Removes the maintenance burden of keeping cache
  keys / paths / action SHAs in lockstep; a single edit here propagates
  to all consumers.

  P2b of the CI speedup plan (.claude/plans/keen-imagining-cherny.md).

  ## Caller pattern

  ```yaml
  steps:
    - uses: actions/checkout@SHA  # MANDATORY — must run first
    - uses: ./.github/actions/setup-pyreon
      with:
        restore-bootstrap: 'false'  # optional
        node-version: '24'          # optional
  ```

  ## Inputs

  - `restore-node-modules` (default 'true'): restore the per-run
    node_modules cache. Disable for jobs that only need bun (rare).
  - `restore-bootstrap` (default 'true'): restore the per-run lib/ cache
    (rolldown-built package outputs). Disable for jobs that don't read
    lib/ (e.g. typecheck against src/ via the bun condition).
  - `node-version` (default ''): if non-empty, install Node via
    actions/setup-node at the given version. Used by test / test-browser /
    test-rust-binary which exercise the dev-mode CLI path under modern
    active-LTS Node.

inputs:
  restore-node-modules:
    description: Restore the per-run node_modules cache (default true).
    required: false
    default: 'true'
  restore-bootstrap:
    description: Restore the per-run bootstrap lib/ cache (default true).
    required: false
    default: 'true'
  node-version:
    description: If non-empty, also install Node via setup-node at this version.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: .bun-version
    - if: inputs.node-version != ''
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
    # BOOTSTRAP_KEY env var must be set in the calling workflow (ci.yml
    # does this at env: scope so every job inherits it). The node_modules
    # key is computed HERE from the lockfile hash — content-keyed, no
    # same-run propagation dependency (2026-06-11 root-cause fix).
    # CONTENT-KEYED restore (2026-06-11 root-cause fix). The previous design
    # restored a per-run key (`node-modules-<run_id>`) that the Install job
    # saved MINUTES earlier — a hard dependency on same-run cache
    # propagation, the single most fragile guarantee the cache service
    # offers. During the 2026-06-11 degradation, freshly-saved entries were
    # randomly invisible to same-run readers (the entries EXISTED in the
    # cache inventory; the read path couldn't see them yet) while day-old
    # content-keyed entries restored reliably ALL DAY. node_modules is
    # fully determined by the lockfile, so the content key IS the exact
    # key — the run-id indirection added nothing but the fragility. The
    # prefix restore-key catches lockfile-changing PRs (nearest entry +
    # the fallback install below tops it up correctly).
    - name: Restore node_modules
      id: nm-cache
      if: inputs.restore-node-modules == 'true'
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          node_modules
          packages/*/*/node_modules
          examples/*/node_modules
          docs/node_modules
        key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: node-modules-${{ runner.os }}-bun-
    # CACHE-OUTAGE FALLBACK (2026-06-11 incident): GitHub's Actions cache
    # service intermittently LOST per-run cache saves/restores — every
    # downstream job then ran without node_modules and failed with exit
    # 127 / module-not-found, across whole runs, repeatedly. A run whose
    # Install succeeded but whose save was eaten is permanently poisoned
    # for `rerun --failed` (Install won't re-run, the key never exists).
    # Fallback: when the restore MISSES, do a fresh `bun install` —
    # slow-but-green instead of guaranteed-red. PYREON_BOOTSTRAP_SKIP=1
    # matches the Install job's contract (lib/ comes from the bootstrap
    # cache / fallback below, never from postinstall).
    # The fallback install needs bun's package-tarball cache or it cold-
    # fetches every package from the registry (~minutes — blew test cells'
    # 15-min job timeout during the 2026-06-11 outage). This key is
    # lockfile-hashed, shared cross-run/cross-PR, and OLD entries restore
    # fine even while the outage eats fresh run-scoped SAVES.
    - name: Restore bun download cache (fallback prep)
      if: inputs.restore-node-modules == 'true' && steps.nm-cache.outputs.cache-hit != 'true'
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.bun/install/cache
        key: bun-install-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-install-cache-${{ runner.os }}-
    - name: Fallback bun install (cache miss)
      if: inputs.restore-node-modules == 'true' && steps.nm-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        PYREON_BOOTSTRAP_SKIP: '1'
      run: |
        echo "::warning::node_modules exact-key miss — running bun install (corrects a stale prefix-match restore or a full miss)."
        bun install --frozen-lockfile
    # lib/ differs per push (source changes), so the per-run key stays the
    # PRIMARY (exact-fresh) attempt — but it now degrades through the
    # source-hashed cross-run key and a bare prefix instead of failing:
    # a prefix match restores the nearest lib/ and the fallback rebuild
    # below runs scripts/bootstrap.ts, which mtime-rebuilds whatever is
    # stale. Worst case = slower job, never a red one.
    - name: Restore bootstrap (lib/)
      id: bootstrap-cache
      if: inputs.restore-bootstrap == 'true'
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: packages/*/*/lib
        key: ${{ env.BOOTSTRAP_KEY }}
        restore-keys: |
          bootstrap-ubuntu-${{ hashFiles('packages/*/*/src/**', 'packages/*/*/package.json', 'scripts/bootstrap.ts', 'bun.lock') }}
          bootstrap-ubuntu-
    # Same fallback for the lib/ cache: rebuild via the bootstrap script
    # (~45s) instead of letting every lib-needing job fail on missing
    # build outputs.
    - name: Fallback bootstrap build (cache miss)
      if: inputs.restore-bootstrap == 'true' && steps.bootstrap-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "::warning::bootstrap lib/ cache missed (key $BOOTSTRAP_KEY) — rebuilding via scripts/bootstrap.ts. Cache service may be degraded."
        bun scripts/bootstrap.ts
