name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # 15 min was too tight for a fresh full-monorepo publish — the 0.15.0
    # release timed out mid-publish at minute 15 with ~5 of 55 packages
    # still queued. Each `npm publish --provenance` takes 5-15s and the
    # build phase alone (~3 min) plus `bun install` (~1 min) eat 4 min
    # before publishing even starts. 45 gives comfortable headroom even
    # if a future release adds packages or npm registry is slow.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      # Speed up release runs by ~1 min on warm cache. The `bun.lock` hash
      # invalidates the cache when deps change, so we never publish against
      # a stale snapshot. restore-keys allows a near-miss fallback while
      # full match stays preferred.
      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # Pyreon's pre-push hook (installed by `scripts/bootstrap.ts` postinstall,
      # configured via `core.hooksPath`) runs lint + affected typecheck + tests
      # on every `git push`. Inside this workflow, `changesets/action` pushes
      # the Version PR commit AND (on publish path) the npm tags — each of
      # those `git push` calls would re-trigger the hook, burning minutes
      # of compute and risking SIGTERM mid-publish.
      #
      # The explicit Lint / Typecheck / Test steps below cover the same
      # ground at workflow level. Suppressing the hook removes pure
      # redundancy — not safety.
      #
      # Reference: vitus-labs/ui-system hit this on their 2.2.1 publish
      # (npm publish succeeded, GitHub Release step SIGTERM'd because the
      # pre-push hook ate the remaining time budget).
      - name: Disable local git hooks for the publish flow
        run: git config core.hooksPath /dev/null

      # Pre-publish validation. Catches broken main builds before the artifact
      # ships to npm. Each step exits the workflow on failure — `changesets/action`
      # below only runs if all four pass.
      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: bun run version-packages
          publish: bun run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          # Prefer a fine-grained PAT (`RELEASE_PAT`) when present so commits
          # the action pushes to the Version PR branch trigger downstream
          # workflows (CI on the Version PR). The default `GITHUB_TOKEN`
          # works for everything except trigger propagation — Version PRs
          # opened with it have a blank CI status until someone pushes a
          # follow-up commit. Fallback to `GITHUB_TOKEN` keeps the workflow
          # functional without PAT setup. See CONTRIBUTING.md → Releases.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
