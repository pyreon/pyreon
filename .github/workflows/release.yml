name: Release

on:
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Stable release (main only) ──────────────────────────────────
  stable:
    if: github.ref == 'refs/heads/main'
    name: Release
    runs-on: ubuntu-latest
    # 15 min was too tight for a fresh full-monorepo publish — the 0.15.0
    # release timed out mid-publish at minute 15 with ~5 of 55 packages
    # still queued. Each `npm publish --provenance` takes 5-15s and the
    # build phase alone (~3 min) plus `bun install` (~1 min) eat 4 min
    # before publishing even starts. 45 gives comfortable headroom even
    # if a future release adds packages or npm registry is slow.
    timeout-minutes: 45
    steps:
      # Supply-chain hardening — audit network egress to catch exfil
      # attempts during npm publish (which uses long-lived OIDC tokens).
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      # Speed up release runs by ~1 min on warm cache. The `bun.lock` hash
      # invalidates the cache when deps change, so we never publish against
      # a stale snapshot. restore-keys allows a near-miss fallback while
      # full match stays preferred.
      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # Pyreon's pre-push hook (installed by `scripts/bootstrap.ts` postinstall,
      # configured via `core.hooksPath`) runs lint + affected typecheck + tests
      # on every `git push`. Inside this workflow, `changesets/action` pushes
      # the Version PR commit AND (on publish path) the npm tags — each of
      # those `git push` calls would re-trigger the hook, burning minutes
      # of compute and risking SIGTERM mid-publish.
      #
      # CI runs full Lint / Typecheck / Test / Verify Modes / E2E on every
      # push to main as required checks — by the time this workflow runs,
      # main is known-green. Re-validating here is redundant and structurally
      # too heavy: `bun run typecheck` (unfiltered) runs `--filter='*'` across
      # 60+ packages sequentially, which has repeatedly exceeded the 45-min
      # job timeout (vs CI's typecheck which uses an affected-filter and
      # completes in <10 min). Removed in favor of trusting CI.
      #
      # Reference: vitus-labs/ui-system hit a similar SIGTERM mid-publish
      # issue on 2.2.1 — the underlying lesson is the same: keep the release
      # job lean, let CI gate quality.
      - name: Disable local git hooks for the publish flow
        run: git config core.hooksPath /dev/null

      # 0.x cap: rewrite any `: major` → `: minor` in `.changeset/*.md`
      # BEFORE `changesets/action` runs `version-packages`. Pyreon is 0.x;
      # a stray major changeset would otherwise produce a 1.0.0 cascade
      # across the `fixed` group of 60+ packages. CI's `check-no-major`
      # job catches `: major` at PR time so this is belt + suspenders —
      # but the safety net belongs at release time too, in case `: major`
      # ever lands on main via a workflow path that bypasses the PR check.
      # When Pyreon goes 1.0 someday, remove this step AND the CI guard
      # as a deliberate gate (the removal is the explicit signal).
      - name: Cap changeset bumps at minor (0.x policy)
        run: bun scripts/cap-changeset-bumps.ts

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: bun run version-packages
          publish: bun run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          # Prefer a fine-grained PAT (`RELEASE_PAT`) when present so commits
          # the action pushes to the Version PR branch trigger downstream
          # workflows (CI on the Version PR). The default `GITHUB_TOKEN`
          # works for everything except trigger propagation — Version PRs
          # opened with it have a blank CI status until someone pushes a
          # follow-up commit. Fallback to `GITHUB_TOKEN` keeps the workflow
          # functional without PAT setup. See CONTRIBUTING.md → Releases.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      # The changesets/action's built-in `createGithubReleases: true`
      # iterates per-package — slow for a 55-package monorepo and observed
      # hanging mid-run in vitus-labs/ui-system 2.2.0 release after npm
      # publish had already succeeded. Replaced with a single umbrella
      # Release for the suite — matches how other fixed-group monorepos
      # (React, Apollo, Babel) ship: ONE release per cut, per-package
      # detail in each `packages/*/CHANGELOG.md`.
      - name: Create umbrella GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Anchor version on @pyreon/core — the foundation package every
          # other Pyreon package transitively depends on. Under the fixed
          # group, every internal package shares this version after
          # `changeset version` runs, so the tag accurately represents
          # the whole suite.
          VERSION=$(node -p "require('./packages/core/core/package.json').version")
          TAG="v${VERSION}"

          # Idempotent tag: skip if it already exists (e.g. retried run).
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::Tag ${TAG} already exists — skipping tag step."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

          # Build a markdown list of every published package@version from
          # the action's structured output.
          PACKAGES=$(echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '[.[] | "- `\(.name)@\(.version)`"] | join("\n")')

          BODY=$(cat <<EOF
          All packages in the \`@pyreon/*\` suite at **${VERSION}**.

          ## Published

          ${PACKAGES}

          ## Per-package detail

          See each \`packages/*/CHANGELOG.md\` for the package-specific entry generated from the changesets that bumped it.
          EOF
          )

          # Create the Release. `--verify-tag` ensures we point at a real
          # ref. Idempotent via `|| true` if a Release already exists for
          # this tag (manual retry scenario).
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --notes "${BODY}" \
            --verify-tag \
            || echo "::warning::Release for ${TAG} already exists — skipping creation."

  # ── Prerelease snapshot (release/** branches) ────────────────────
  # Pushes to `release/**` branches publish a `next` npm tag — useful for
  # canary testing big changes before they land on main. Each push to the
  # branch publishes a NEW snapshot version (e.g. 0.15.1-alpha-20260514).
  # Consumers opt in via `bun add @pyreon/zero@next`.
  prerelease:
    if: startsWith(github.ref, 'refs/heads/release/')
    name: Publish Prerelease
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # Same reason as the stable job — the local pre-push hook would
      # re-run on every `git push` and could cancel the action mid-publish.
      # Pre-validation (Lint / Typecheck) also removed — CI on the release/**
      # branch gates these on every push before this workflow runs, and the
      # unfiltered `bun run typecheck` was timing out at 45 min.
      - name: Disable local git hooks for the publish flow
        run: git config core.hooksPath /dev/null

      - name: Publish snapshot
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # Snapshot tag derives from the branch name: `release/0.15.x` →
          # `alpha`. The version becomes 0.15.X-alpha-<timestamp> via
          # changeset's snapshot machinery.
          bunx changeset version --snapshot alpha
          bun run build
          bun run scripts/publish.ts --tag next
