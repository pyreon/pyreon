name: Release Native Binaries

# Cross-platform build matrix for the @pyreon/compiler napi-rs binary.
# Phases 4-5 of the Rust-compiler-to-production roadmap.
#
# Phase 4 (workflow_dispatch only): builds the 5 production triples and
# uploads each as a CI artifact for inspection. No publish.
#
# Phase 5 (tag push of v*.*.*): builds + publishes each per-platform
# package (`@pyreon/compiler-<triple>`) to npm. Consumers install
# `@pyreon/compiler` and npm resolves the matching per-platform package
# via `optionalDependencies`. The compiler's loader prefers the per-
# platform package over the in-tree binary (see src/load-native.ts),
# falls back to the JS implementation if both are missing.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from (default: main)'
        required: false
        default: main
      publish:
        description: 'Publish per-platform packages to npm (use with caution — usually triggered by tag push instead)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon — native arm64 runner.
          # `npm` field maps Rust target triple → per-platform npm package
          # short name (matches the `npm/<short>/` directory layout AND
          # the loader's `getPlatformPackageName()` output).
          - target: aarch64-apple-darwin
            os: macos-latest
            host: native
            ext: dylib
            prefix: lib
            npm: darwin-arm64
          # macOS Intel — uses macos-13 (last Intel runner before
          # GitHub deprecated x86_64 macos-latest in favour of arm64).
          - target: x86_64-apple-darwin
            os: macos-13
            host: native
            ext: dylib
            prefix: lib
            npm: darwin-x64
          # Linux x64 — direct native build.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            host: native
            ext: so
            prefix: lib
            npm: linux-x64-gnu
          # Linux ARM64 — cross-compile via cargo-zigbuild (zero-config
          # glibc version selection, faster than docker-based `cross`).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            host: zigbuild
            ext: so
            prefix: lib
            npm: linux-arm64-gnu
          # Linux x64 musl — Alpine / distroless. cargo-zigbuild handles
          # the musl libc target without needing a docker image.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            host: zigbuild
            ext: so
            prefix: lib
            npm: linux-x64-musl
          # Linux ARM64 musl — Alpine on AWS Graviton, distroless ARM64.
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            host: zigbuild
            ext: so
            prefix: lib
            npm: linux-arm64-musl
          # Windows x64 MSVC — direct native build on windows-latest.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            host: native
            ext: dll
            prefix: ''
            npm: win32-x64-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig (for aarch64-linux cross-compile)
        if: matrix.host == 'zigbuild'
        uses: goto-bus-stop/setup-zig@7ab2955eb728f5440978d5824358023be3a2802d # v2.2.1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.host == 'zigbuild'
        run: cargo install cargo-zigbuild --locked

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('packages/core/compiler/native/Cargo.lock') }}
          restore-keys: cargo-release-${{ runner.os }}-${{ matrix.target }}-

      - name: Build (native)
        if: matrix.host == 'native'
        working-directory: packages/core/compiler/native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cargo-zigbuild)
        # Linux musl targets need `-C target-feature=-crt-static` to produce
        # a cdylib (.so). Default Rust musl behaviour statically links libc,
        # which only supports `staticlib`, not the dynamic library napi-rs
        # consumers expect — produces: `error: cannot produce cdylib for
        # ... as the target X-musl does not support these crate types`.
        # Standard napi-rs workaround (used by oxc-parser, swc, esbuild's
        # Rust binding, etc.). Linux gnu targets ignore the flag (they're
        # already dynamic by default), so applying it unconditionally to
        # the zigbuild path is safe — no per-target branching needed.
        if: matrix.host == 'zigbuild'
        working-directory: packages/core/compiler/native
        env:
          RUSTFLAGS: '-C target-feature=-crt-static'
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Stage artifact
        # Standard napi-rs convention: rename platform shared lib to
        # `pyreon-compiler-<triple>.node` so it's immediately consumable
        # by Node's native-module loader without further renaming.
        shell: bash
        working-directory: packages/core/compiler/native
        run: |
          BIN_NAME="${{ matrix.prefix }}pyreon_compiler_native.${{ matrix.ext }}"
          ARTIFACT="pyreon-compiler-${{ matrix.target }}.node"
          SRC="target/${{ matrix.target }}/release/$BIN_NAME"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected built binary at $SRC, not found"
            ls -la "target/${{ matrix.target }}/release/" || true
            exit 1
          fi
          cp "$SRC" "$ARTIFACT"
          ls -la "$ARTIFACT"
          # Sanity check: file should be > 100KB. Empty / corrupted
          # builds would silently upload otherwise.
          SIZE=$(wc -c < "$ARTIFACT")
          if [ "$SIZE" -lt 100000 ]; then
            echo "::error::Binary too small ($SIZE bytes) — likely corrupted"
            exit 1
          fi
          echo "Built ${{ matrix.target }}: $SIZE bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pyreon-compiler-${{ matrix.target }}
          path: packages/core/compiler/native/pyreon-compiler-${{ matrix.target }}.node
          retention-days: 14
          if-no-files-found: error

  # ── Publish: per-platform npm packages on tag push ────────────────
  # Runs only when the workflow is triggered by a v*.*.* tag push OR
  # an explicit workflow_dispatch with publish=true. workflow_dispatch
  # without the input stays at "build artifacts only" — same behavior
  # as Phase 4.
  publish:
    name: Publish (${{ matrix.npm }})
    needs: build
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            npm: darwin-arm64
          - target: x86_64-apple-darwin
            npm: darwin-x64
          - target: x86_64-unknown-linux-gnu
            npm: linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            npm: linux-arm64-gnu
          - target: x86_64-unknown-linux-musl
            npm: linux-x64-musl
          - target: aarch64-unknown-linux-musl
            npm: linux-arm64-musl
          - target: x86_64-pc-windows-msvc
            npm: win32-x64-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Download platform artifact
        uses: actions/download-artifact@cc20338822e95a0fb5ef76d27cd4cd5ca3dfdc87 # v5.0.0
        with:
          name: pyreon-compiler-${{ matrix.target }}
          path: packages/core/compiler/npm/${{ matrix.npm }}
      - name: Stage binary in stub package
        # Artifact is named `pyreon-compiler-<triple>.node`; the per-
        # platform package's `main` field expects `pyreon-compiler.node`
        # (no triple suffix — the package name already encodes it).
        # Rename in place before publish.
        working-directory: packages/core/compiler/npm/${{ matrix.npm }}
        run: |
          mv pyreon-compiler-${{ matrix.target }}.node pyreon-compiler.node
          ls -la
          # Sanity check: file > 100KB. Same guard as the build step,
          # in case the artifact was somehow corrupted between upload
          # and download.
          SIZE=$(wc -c < pyreon-compiler.node)
          if [ "$SIZE" -lt 100000 ]; then
            echo "::error::Binary too small ($SIZE bytes) — corrupted artifact"
            exit 1
          fi
      - name: Publish to npm
        working-directory: packages/core/compiler/npm/${{ matrix.npm }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
