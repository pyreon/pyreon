name: Release Native Binaries

# Cross-platform build matrix for the @pyreon/compiler napi-rs binary.
# Phases 4-5 of the Rust-compiler-to-production roadmap.
#
# Phase 4 (workflow_dispatch only): builds the 5 production triples and
# uploads each as a CI artifact for inspection. No publish.
#
# Phase 5 (tag push of v*.*.*): builds + publishes each per-platform
# package (`@pyreon/compiler-<triple>`) to npm. Consumers install
# `@pyreon/compiler` and npm resolves the matching per-platform package
# via `optionalDependencies`. The compiler's loader prefers the per-
# platform package over the in-tree binary (see src/load-native.ts),
# falls back to the JS implementation if both are missing.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from (default: main)'
        required: false
        default: main
      publish:
        description: 'Publish per-platform packages to npm (use with caution — usually triggered by tag push instead)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon — native arm64 runner.
          # `npm` field maps Rust target triple → per-platform npm package
          # short name (matches the `npm/<short>/` directory layout AND
          # the loader's `getPlatformPackageName()` output).
          - target: aarch64-apple-darwin
            os: macos-latest
            host: native
            ext: dylib
            prefix: lib
            npm: darwin-arm64
          # macOS Intel — cross-compile from a macos-latest (arm64) runner.
          # macos-13 is the only Intel-native GitHub runner since macos-latest
          # moved to Apple Silicon, but its pool is heavily constrained — we
          # saw 2+ hour queue waits during validation. Apple's clang on arm64
          # hosts ships cross-compile support for x86_64-apple-darwin out of
          # the box (`rustup target add x86_64-apple-darwin` + `cargo build
          # --target x86_64-apple-darwin` Just Works), so we sidestep the
          # macos-13 pool entirely by running on macos-latest. `host: native`
          # because the cross-compile is invisible to cargo — no zigbuild or
          # docker needed; the rust toolchain action's `targets:` parameter
          # installs the right target via rustup.
          - target: x86_64-apple-darwin
            os: macos-latest
            host: native
            ext: dylib
            prefix: lib
            npm: darwin-x64
          # Linux x64 — direct native build.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            host: native
            ext: so
            prefix: lib
            npm: linux-x64-gnu
          # Linux ARM64 — cross-compile via cargo-zigbuild (zero-config
          # glibc version selection, faster than docker-based `cross`).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            host: zigbuild
            ext: so
            prefix: lib
            npm: linux-arm64-gnu
          # Linux x64 musl — Alpine / distroless. cargo-zigbuild handles
          # the musl libc target without needing a docker image.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            host: zigbuild
            ext: so
            prefix: lib
            npm: linux-x64-musl
          # Linux ARM64 musl — Alpine on AWS Graviton, distroless ARM64.
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            host: zigbuild
            ext: so
            prefix: lib
            npm: linux-arm64-musl
          # Windows x64 MSVC — direct native build on windows-latest.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            host: native
            ext: dll
            prefix: ''
            npm: win32-x64-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master — pinned (OpenSSF Pinned-Dependencies)
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install zig (for aarch64-linux cross-compile)
        if: matrix.host == 'zigbuild'
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.host == 'zigbuild'
        run: cargo install cargo-zigbuild --locked

      - name: Cache cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('packages/core/compiler/native/Cargo.lock') }}
          restore-keys: cargo-release-${{ runner.os }}-${{ matrix.target }}-

      - name: Build (native)
        if: matrix.host == 'native'
        working-directory: packages/core/compiler/native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cargo-zigbuild)
        # Linux musl targets need `-C target-feature=-crt-static` to produce
        # a cdylib (.so). Default Rust musl behaviour statically links libc,
        # which only supports `staticlib`, not the dynamic library napi-rs
        # consumers expect — produces: `error: cannot produce cdylib for
        # ... as the target X-musl does not support these crate types`.
        # Standard napi-rs workaround (used by oxc-parser, swc, esbuild's
        # Rust binding, etc.). Linux gnu targets ignore the flag (they're
        # already dynamic by default), so applying it unconditionally to
        # the zigbuild path is safe — no per-target branching needed.
        if: matrix.host == 'zigbuild'
        working-directory: packages/core/compiler/native
        env:
          RUSTFLAGS: '-C target-feature=-crt-static'
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Stage artifact
        # Standard napi-rs convention: rename platform shared lib to
        # `pyreon-compiler-<triple>.node` so it's immediately consumable
        # by Node's native-module loader without further renaming.
        shell: bash
        working-directory: packages/core/compiler/native
        run: |
          BIN_NAME="${{ matrix.prefix }}pyreon_compiler_native.${{ matrix.ext }}"
          ARTIFACT="pyreon-compiler-${{ matrix.target }}.node"
          SRC="target/${{ matrix.target }}/release/$BIN_NAME"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected built binary at $SRC, not found"
            ls -la "target/${{ matrix.target }}/release/" || true
            exit 1
          fi
          cp "$SRC" "$ARTIFACT"
          ls -la "$ARTIFACT"
          # Sanity check: file should be > 100KB. Empty / corrupted
          # builds would silently upload otherwise.
          SIZE=$(wc -c < "$ARTIFACT")
          if [ "$SIZE" -lt 100000 ]; then
            echo "::error::Binary too small ($SIZE bytes) — likely corrupted"
            exit 1
          fi
          echo "Built ${{ matrix.target }}: $SIZE bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pyreon-compiler-${{ matrix.target }}
          path: packages/core/compiler/native/pyreon-compiler-${{ matrix.target }}.node
          retention-days: 14
          if-no-files-found: error

  # ── Publish: per-platform npm packages on tag push ────────────────
  # Runs only when the workflow is triggered by a v*.*.* tag push OR
  # an explicit workflow_dispatch with publish=true. workflow_dispatch
  # without the input stays at "build artifacts only" — same behavior
  # as Phase 4.
  publish:
    name: Publish (${{ matrix.npm }})
    needs: build
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            npm: darwin-arm64
          - target: x86_64-apple-darwin
            npm: darwin-x64
          - target: x86_64-unknown-linux-gnu
            npm: linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            npm: linux-arm64-gnu
          - target: x86_64-unknown-linux-musl
            npm: linux-x64-musl
          - target: aarch64-unknown-linux-musl
            npm: linux-arm64-musl
          - target: x86_64-pc-windows-msvc
            npm: win32-x64-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          # NO `registry-url:` — that makes setup-node write an
          # `.npmrc` containing `//registry.npmjs.org/:_authToken=`
          # (empty, because there is intentionally no NODE_AUTH_TOKEN).
          # npm then sees explicit registry auth and SKIPS the OIDC
          # trusted-publishing exchange entirely → `npm publish` 404s on
          # PUT even when the trusted publisher is configured correctly.
          # This was the real cause of the v0.18.0 native-publish 404s
          # (provenance still signed because that uses the GitHub OIDC
          # id-token directly, independent of npm registry auth — which
          # masked the root cause). For trusted publishing the registry
          # default is correct and NO .npmrc auth must exist.
      - name: Ensure npm supports OIDC trusted publishing
        # npm's native OIDC trusted-publishing (token-free `npm publish`)
        # landed in npm 11.5.1. Node 24's bundled npm can be older
        # (24.x shipped 11.3.x); pin a known-good npm so the exchange is
        # guaranteed regardless of the Node minor.
        run: |
          npm install -g npm@latest
          npm --version
      - name: Download platform artifact
        # SHA must match the real v5.0.0 tag (634f93cb…). The prior pin
        # (cc20338…) was a transcription error that GitHub rejected as
        # an unknown ref — every Publish job in run 25873293958 (the
        # v0.18.0 release-native trigger) failed at "Set up job" with
        # `Unable to resolve action ... unable to find version <SHA>`.
        # No prior release exercised this code path (every previous
        # release-native run was workflow_dispatch with the default
        # `publish: 'false'` input, which skips the publish matrix).
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pyreon-compiler-${{ matrix.target }}
          path: packages/core/compiler/npm/${{ matrix.npm }}
      - name: Stage binary in stub package
        # Artifact is named `pyreon-compiler-<triple>.node`; the per-
        # platform package's `main` field expects `pyreon-compiler.node`
        # (no triple suffix — the package name already encodes it).
        # Rename in place before publish.
        working-directory: packages/core/compiler/npm/${{ matrix.npm }}
        run: |
          mv pyreon-compiler-${{ matrix.target }}.node pyreon-compiler.node
          ls -la
          # Sanity check: file > 100KB. Same guard as the build step,
          # in case the artifact was somehow corrupted between upload
          # and download.
          SIZE=$(wc -c < pyreon-compiler.node)
          if [ "$SIZE" -lt 100000 ]; then
            echo "::error::Binary too small ($SIZE bytes) — corrupted artifact"
            exit 1
          fi
      - name: Publish to npm (OIDC trusted publishing)
        # Token-free OIDC trusted publishing. npm (>=11.5.1, ensured
        # above) performs the OIDC exchange automatically when:
        #   1. `id-token: write` is granted (file scope, line 37);
        #   2. NO `.npmrc` registry-auth line exists (setup-node's
        #      `registry-url:` was removed above — that was writing an
        #      empty `_authToken` that defeated OIDC);
        #   3. each `@pyreon/compiler-<triple>` package has a trusted
        #      publisher configured on npmjs.com matching THIS identity:
        #        org/repo  = pyreon/pyreon
        #        workflow  = release-native.yml   (filename only)
        #        environment = (blank — this workflow uses none)
        # A 404 on the PUT means (2) or (3) didn't hold. See
        # CONTRIBUTING.md → "Native binary publishing".
        working-directory: packages/core/compiler/npm/${{ matrix.npm }}
        run: |
          # Belt-and-suspenders: ensure no stray .npmrc auth line (repo
          # checkout, cached home dir) shadows the OIDC exchange.
          rm -f "$HOME/.npmrc" .npmrc ../../../../.npmrc 2>/dev/null || true
          npm publish --provenance --access public
