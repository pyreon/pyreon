name: Deploy Docs

# Builds the Pyreon-native docs site (`docs/`) and deploys to GitHub
# Pages. The `build` job ALSO runs on PRs (docs source / docs-dep
# packages) as a verification-only gate so a docs-SITE build break is
# caught pre-merge (see the `pull_request` trigger note); only a push to
# main deploys. Replaces the legacy VitePress workflow + the side-by-side
# `docs-zero-preview.yml` (both removed in the cutover).
#
# Production URL: https://pyreon.dev (custom apex domain, served by
# GitHub Pages via Cloudflare DNS — `@ CNAME -> pyreon.github.io`,
# grey-cloud / DNS-only, GitHub's own Let's Encrypt cert).
# Built with a ROOT base (`vite build`, base `/`) because a custom
# domain serves at the apex, not the `/pyreon/` project-pages subpath.
# The custom domain is pinned by `docs/public/CNAME` so it survives
# every Actions deploy. (Was `--base=/pyreon/` for the old
# pyreon.github.io/pyreon/ URL, retired in this cutover.)

on:
  push:
    branches: [main]
    paths:
      # Any change to the docs source itself
      - 'docs/**'
      # Framework packages the docs build transitively depends on —
      # a fix in any of these can change what ships on the docs site,
      # so any of them retriggers a deploy.
      - 'packages/zero/zero/**'
      - 'packages/zero/zero-content/**'
      - 'packages/tools/vite-plugin/**'
      - 'packages/core/router/**'
      - 'packages/core/runtime-dom/**'
      - 'packages/core/runtime-server/**'
      - 'packages/core/reactivity/**'
      - 'packages/core/core/**'
      - 'packages/core/compiler/**'
      - 'packages/core/head/**'
      - '.github/workflows/docs.yml'
  # Also run the BUILD job (not deploy) on PRs touching the docs source or the
  # framework packages the docs build depends on — so a docs-SITE build break
  # (e.g. MDX-invalid content: an unbackticked `<Foo>` generic that the
  # zero-content compiler parses as an unclosed JSX tag) is caught PRE-merge as
  # a PR check, instead of only reddening this main-only deploy AFTER it lands.
  # The four docs PR checks (Doc Claims / Doc Examples / Docs Generated Fresh /
  # Docs Sync) don't build the site, so nothing else catches this class. The
  # `deploy` job + artifact upload are gated to push events below, so a PR
  # build-and-verifies WITHOUT deploying to the live pyreon.dev site.
  pull_request:
    paths:
      - 'docs/**'
      - 'packages/zero/zero/**'
      - 'packages/zero/zero-content/**'
      - 'packages/tools/vite-plugin/**'
      - 'packages/core/router/**'
      - 'packages/core/runtime-dom/**'
      - 'packages/core/runtime-server/**'
      - 'packages/core/reactivity/**'
      - 'packages/core/core/**'
      - 'packages/core/compiler/**'
      - 'packages/core/head/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  # Per-ref so a PR's build can't cancel main's in-flight deploy (and vice
  # versa). On main this still coalesces rapid pushes to the latest deploy.
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need the full history so `git log -1 --format=%aI <file>` in
          # the last-updated plugin returns the real timestamp instead
          # of the shallow-clone-only commit.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build docs
        # ROOT base (no `--base` flag → Vite defaults to `/`) because the
        # site now serves at the apex `pyreon.dev`, not the `/pyreon/`
        # project-pages subpath. The custom domain is pinned by
        # `docs/public/CNAME` (copied into `dist/` by Vite) so it persists
        # across deploys.
        run: |
          cd docs
          bunx vite build

      - name: Upload pages artifact
        # Only the main-push build feeds the deploy; a PR build is
        # verification-only (catch a docs-site build break), so it skips the
        # upload.
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    # Deploy only on a real push to main. On PRs the `build` job runs as a
    # verification-only gate (it caught nothing to deploy), so skip deploy —
    # a PR must never publish to the live pyreon.dev site.
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
