name: Deploy Docs

# Builds the Pyreon-native docs site (`docs/`) and deploys to GitHub
# Pages. Replaces the legacy VitePress workflow + the side-by-side
# `docs-zero-preview.yml` (both removed in the cutover).
#
# Production URL: https://pyreon.dev (custom apex domain, served by
# GitHub Pages via Cloudflare DNS — `@ CNAME -> pyreon.github.io`,
# grey-cloud / DNS-only, GitHub's own Let's Encrypt cert).
# Built with a ROOT base (`vite build`, base `/`) because a custom
# domain serves at the apex, not the `/pyreon/` project-pages subpath.
# The custom domain is pinned by `docs/public/CNAME` so it survives
# every Actions deploy. (Was `--base=/pyreon/` for the old
# pyreon.github.io/pyreon/ URL, retired in this cutover.)

on:
  push:
    branches: [main]
    paths:
      # Any change to the docs source itself
      - 'docs/**'
      # Framework packages the docs build transitively depends on —
      # a fix in any of these can change what ships on the docs site,
      # so any of them retriggers a deploy.
      - 'packages/zero/zero/**'
      - 'packages/zero/zero-content/**'
      - 'packages/tools/vite-plugin/**'
      - 'packages/core/router/**'
      - 'packages/core/runtime-dom/**'
      - 'packages/core/runtime-server/**'
      - 'packages/core/reactivity/**'
      - 'packages/core/core/**'
      - 'packages/core/compiler/**'
      - 'packages/core/head/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Need the full history so `git log -1 --format=%aI <file>` in
          # the last-updated plugin returns the real timestamp instead
          # of the shallow-clone-only commit.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build docs
        # ROOT base (no `--base` flag → Vite defaults to `/`) because the
        # site now serves at the apex `pyreon.dev`, not the `/pyreon/`
        # project-pages subpath. The custom domain is pinned by
        # `docs/public/CNAME` (copied into `dist/` by Vite) so it persists
        # across deploys.
        run: |
          cd docs
          bunx vite build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
