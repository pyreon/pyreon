name: Deploy Docs (legacy — DISABLED)

# IMPORTANT — this workflow is DISABLED for `push` events.
#
# History: it uploaded `docs/.vitepress/dist` as the entire Pages
# artifact. Side-by-side with `docs-zero-preview.yml` (which uploads
# a COMBINED artifact: VitePress at `/` + docs-zero at `/preview/`),
# this workflow's solo deploys would OVERWRITE the preview directory
# whenever a legacy docs change triggered it without also triggering
# the preview workflow.
#
# Symptom: `pyreon.github.io/pyreon/preview/` returns 404 after any
# `docs/**`-only merge.
#
# Fix: `docs/**` is now in `docs-zero-preview.yml`'s path filter, so
# every legacy docs change rebuilds the COMBINED site. This workflow
# is kept as `workflow_dispatch`-only for the very rare case someone
# needs the legacy-site-only deploy (it's preserved as a recovery
# tool but won't auto-fire on push).
on:
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - run: cd docs && bun install --frozen-lockfile
      - name: Build static site
        run: cd docs && bun run build
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
