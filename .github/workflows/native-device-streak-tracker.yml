# Gap 7 closure infrastructure — green-streak tracker for the
# `native-device` workflow.
#
# Runs daily and computes the current consecutive-green streak of
# the `native-device` workflow on main. When the streak reaches the
# 14-day threshold (per the 2026-06-05 audit's 2-week observation
# window), prints a clear "ready to promote" signal that maintainers
# can act on.
#
# This does NOT auto-promote — that's a one-line `gh api PATCH`
# performed by a maintainer after seeing the green-light here.
# Auto-promotion is left to humans by design: the promotion is
# semi-permanent (branch protection change), and a one-shot human
# confirmation is the right gate.

name: Native Device Green-Streak Tracker

on:
  schedule:
    # Daily at 06:00 UTC — runs after the typical nightly
    # native-device window so the latest run is recorded.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  track:
    name: Compute native-device green streak
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Compute streak (human-readable + JSON)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "## Native Device Green Streak" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bun scripts/check-native-device-streak.ts --branch main | tee -a "$GITHUB_STEP_SUMMARY"
          STREAK_EXIT=$?
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### JSON" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          bun scripts/check-native-device-streak.ts --branch main --json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Don't fail the job — this is a tracker, not a gate.
          # The signal is in $GITHUB_STEP_SUMMARY; promotion is manual.
          exit 0
