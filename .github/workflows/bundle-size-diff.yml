name: Bundle size diff

# Posts a sticky PR comment with per-package gzip-size deltas (base vs PR).
# Companion to the strict `Check Bundle Budgets` gate in ci.yml — this
# workflow is informational: shows ALL movers, not just budget violations.
# Helps reviewers eyeball "this PR adds 4KB to @pyreon/zero" before merge.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bundle-size-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diff:
    name: Bundle size diff
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install (PR head)
        run: bun install --frozen-lockfile

      - name: Measure (PR head)
        run: bun scripts/check-bundle-budgets.ts --json >/tmp/pr.json || true

      - name: Checkout base
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git checkout "origin/${{ github.event.pull_request.base.ref }}"

      - name: Install (base)
        run: bun install --frozen-lockfile

      - name: Measure (base)
        run: bun scripts/check-bundle-budgets.ts --json >/tmp/base.json || true

      - name: Restore PR head for diff script
        run: git checkout "${{ github.event.pull_request.head.sha }}"

      - name: Diff
        id: diff
        continue-on-error: true
        run: bun run scripts/bundle-size-diff.ts /tmp/base.json /tmp/pr.json --output /tmp/summary.md

      - name: Post sticky comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('node:fs')
            const summary = fs.readFileSync('/tmp/summary.md', 'utf8')
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const marker = '<!-- bundle-size-diff -->'
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            )
            const existing = comments.find((c) => c.body?.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: summary })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: summary })
            }
