name: Benchmark

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (PR branch)
        run: bun install --frozen-lockfile

      # Run benchmarks on PR branch
      - name: Benchmark (current)
        run: bun scripts/bench/run-all.ts > current.json 2> bench-current.log

      # Run bundle size on PR branch
      - name: Bundle size (current)
        run: bun scripts/bench/bundle-size.ts --json > current-size.json

      # Switch to base branch and benchmark
      - name: Benchmark (baseline)
        run: |
          git stash --include-untracked
          git checkout ${{ github.event.pull_request.base.sha }}
          bun install --frozen-lockfile
          bun scripts/bench/run-all.ts > baseline.json 2> bench-baseline.log || true
          bun scripts/bench/bundle-size.ts --json > baseline-size.json || true
          git checkout -
          git stash pop || true

      # Compare and generate report
      - name: Compare benchmarks
        id: compare
        run: |
          REPORT=$(bun scripts/bench/compare.ts baseline.json current.json || true)
          {
            echo "report<<EOF"
            echo "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Post comment on PR
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Performance Report\n\n${{ steps.compare.outputs.report }}`

            // Find existing benchmark comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('## Performance Report')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      # Upload artifacts for debugging
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            baseline.json
            current.json
            baseline-size.json
            current-size.json
            bench-baseline.log
            bench-current.log
          retention-days: 30
