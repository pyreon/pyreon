name: Changeset

# Verifies that PRs changing PUBLISHED-to-npm package source either add
# a changeset (regular feature/fix PR) or consume one (the Version PR
# generated by `changesets/action`). Either action satisfies the
# "every npm-published change has a changelog trail" rule.
#
# The detector intentionally excludes private packages (`@pyreon/test-utils`,
# `@pyreon/manifest`, `@pyreon/perf-harness`, `@pyreon/vitest-config`,
# `@pyreon/playwright-config`, `@pyreon/devtools`, `@pyreon/ui-*`, every
# `@pyreon/native-*`) and changeset-`ignore`d workspaces (examples,
# docs, ai-reference). Those are repo-internal — they don't ship to
# consumers, so they don't need a changelog.
#
# See `scripts/check-changeset-required.ts` for the policy + unit tests
# at `packages/internals/test-utils/src/tests/check-changeset-required.test.ts`.
#
# Bypass: add the `skip-changeset` label on the PR — appropriate for
# the rare case where a published-package source file changed but the
# change is genuinely catalog-irrelevant (comment-only edit,
# type-tightening with no runtime impact).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: changeset-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Verify changeset activity (added or consumed)
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HAS_SKIP_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}
        run: bun scripts/check-changeset-required.ts
