name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ── Shared cache keys ──────────────────────────────────────────────────────
# Defined here so every job uses the exact same strings.
env:
  NM_KEY: node-modules-${{ github.run_id }}
  BOOTSTRAP_KEY: bootstrap-${{ github.run_id }}

jobs:
  # ── Install: checkout + install + bootstrap, then save caches ───────────
  # Downstream jobs restore these caches by run_id — guaranteed fresh,
  # no stale restore-keys matches, no redundant bun install calls.
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      affected-filter: ${{ steps.affected.outputs.filter }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      # P1b — cache bun's global package-tarball cache (`~/.bun/install/cache`).
      # When the lockfile-keyed node_modules restore misses (new bun.lock hash,
      # fresh runner), `bun install --frozen-lockfile` extracts tarballs from
      # this cache. Without it bun re-fetches every package from npm registry —
      # ~30-90s on cold starts. Content-addressed by tarball hash, safe to
      # share cross-run AND cross-PR.
      - name: Cache bun install cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-install-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-install-cache-${{ runner.os }}-
      # Try to restore a previous lockfile-matched cache (fast path)
      - name: Restore node_modules
        id: nm-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      # P3c — skip the postinstall lib/ build. The Install job now does
      # ONLY `bun install --frozen-lockfile` (~60s) so lib-free downstream
      # jobs (typecheck, lint, test, coverage, audit-types, etc.) unblock
      # ~150s sooner. The separate `bootstrap` job below runs the build
      # and gates lib-needing jobs (build, verify-modes, e2e-*,
      # check-bundle-budgets, scaffold-smoke, check-distribution).
      # PYREON_BOOTSTRAP_SKIP=1 makes bootstrap.ts a no-op (exit 0 before
      # any work). Local-dev installs deliberately keep the build because
      # devs want `bun run dev` to work immediately.
      - run: PYREON_BOOTSTRAP_SKIP=1 bun install --frozen-lockfile
      # Save under run_id so downstream jobs get an exact match (no stale data)
      - name: Save node_modules for this run
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      # Also save under the lockfile hash for future runs
      - name: Save node_modules (lockfile key)
        if: steps.nm-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      # Compute affected filter once — shared via output to all downstream jobs
      - name: Compute affected filter
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            FILTER=$(bun run scripts/affected.ts --base=origin/${{ github.base_ref }})
            echo "filter=$FILTER" >> $GITHUB_OUTPUT
          else
            echo "filter=--filter=*" >> $GITHUB_OUTPUT
          fi

  # ── Bootstrap (P3c): builds lib/ separately from Install ──────────────
  # Restores node_modules from the Install job (per-run cache), runs
  # `bun scripts/bootstrap.ts` (which does the workspace-wide build of
  # lib/*), saves the lib/ cache for lib-needing downstream jobs.
  #
  # ## Why split this off
  #
  # Pre-P3c, Install ran `bun install` + the postinstall bootstrap in
  # one ~210s job. Every downstream job — INCLUDING lib-free ones like
  # typecheck, lint, test — waited the full 210s to start. The build
  # step (~150s) accounts for ~70% of that wait.
  #
  # Post-P3c, Install does ONLY `bun install` (~60s). Lib-free jobs
  # need only `install`, so they start ~150s sooner. Lib-needing jobs
  # need `bootstrap` (which itself needs `install`), so their start
  # time is roughly unchanged (~210s = 60s install + 150s bootstrap)
  # but the critical path for the COMMON case (PRs only need a subset
  # of lib-needing jobs) is dominated by the now-faster lib-free path.
  #
  # ## Cross-run lib/ caching deliberately disabled
  #
  # We DON'T restore a previous-run lib/ here for the same reason the
  # pre-P3c Install job didn't: rolldown's chunk filenames are
  # content-hashed, and a stale lib/ that nominally matches current
  # source might reference chunk filenames that no longer exist
  # (dropped files, divergent chunk-split decisions between runs).
  # Save under the per-run key only so downstream jobs in THIS run get
  # exactly the lib/ that THIS run's bootstrap produced.
  bootstrap:
    name: Bootstrap
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Composite restores node_modules (default) from Install's per-run
      # cache. We disable bootstrap restore because the cache doesn't
      # exist yet — THIS job populates it.
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Build lib/
        run: bun scripts/bootstrap.ts
      - name: Save bootstrap for this run
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}

  # ── Shared setup anchor (YAML anchor not supported, so we repeat) ───────
  # Every downstream job: checkout → setup-bun → restore run_id caches.
  # No bun install needed — caches are guaranteed fresh from Install job.

  # ── Typecheck: per-category matrix (P3b) ─────────────────────────────
  # Sharded by `packages/<category>/` (8 cells in parallel). Each cell
  # narrows the affected-filter to its own slice via
  # `scripts/affected.ts --category=<name>`; cells with no affected
  # packages in their category skip gracefully (empty filter = no-op).
  # Aggregator `typecheck` job (next) keeps the stable `Typecheck`
  # required check name for branch protection.
  #
  # Why shard: pre-P3b Typecheck ran `bun run $FILTER --sequential
  # typecheck` against EVERY affected package on one runner (~270s
  # median for full-suite runs because we must run sequentially to
  # avoid 7+ heavy tsc invocations OOM-killing the 7GB runner). Sharding
  # parallelizes across runners — per-cell wall-clock = ~max-of-category
  # (90-120s typical) instead of the full sum. Critical-path drop
  # ~150-180s.
  #
  # Why 8 cells (not 5 as the plan first sketched): every `packages/*`
  # category is its own cell — including `internals` (4 pkgs), `ui` (3
  # private), `native` (6, newer ios/android stuff). The matrix infra
  # cost is per-cell startup overhead (~30s composite restore); going
  # 5→8 cells adds ~3 runners but each finishes in ~30-60s anyway
  # because every cell carries fewer packages. Smaller cells also fit
  # under the 10min job timeout with comfortable margin on the OOM-
  # sensitive `--sequential` path.
  typecheck-cell:
    name: typecheck (${{ matrix.category }})
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        category: [core, fundamentals, internals, native, tools, ui, ui-system, zero]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # affected.ts needs the merge-base to compute a real diff;
          # the install job uses fetch-depth: 0 for the same reason.
          fetch-depth: 0
      - uses: ./.github/actions/setup-pyreon
        with:
          # P3c — typecheck reads src/ via the bun customCondition (root
          # tsconfig.json line 8); lib/ is not needed. Skipping the
          # bootstrap restore lets typecheck start as soon as Install
          # finishes (~60s) instead of waiting for Bootstrap (~210s).
          restore-bootstrap: 'false'
      - name: Run typecheck (${{ matrix.category }})
        run: |
          # Recompute the filter per-cell with --category narrowing.
          # We DON'T reuse install.outputs.affected-filter because it
          # spans every category; per-cell we need only this slice.
          # The script's closure is still computed against the full dep
          # graph (a @pyreon/core change still expands to every
          # dependent), but the final emit drops anything outside
          # packages/${cat}/.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            FILTER=$(bun run scripts/affected.ts \
              --base=origin/${{ github.base_ref }} \
              --category=${{ matrix.category }})
            # Root-file change in a PR returns --filter=* from the
            # script (the only safe escalation when blast radius is
            # unknowable). At the cell level we translate that to the
            # category-scoped glob so each cell runs its OWN full
            # slice — otherwise every cell would run every package and
            # we'd lose the shard entirely.
            if [ "$FILTER" = "--filter=*" ]; then
              FILTER="--filter=./packages/${{ matrix.category }}/*"
            fi
          else
            # push:main + merge_group always run the full slice for
            # this category — the gate that protects main never
            # trusts the narrowing.
            FILTER="--filter=./packages/${{ matrix.category }}/*"
          fi
          if [ -z "$FILTER" ]; then
            echo "No affected packages in this category — skipping."
            exit 0
          fi
          echo "Cell filter: $FILTER"
          set -f
          # --sequential caps simultaneous memory at the largest
          # single tsc invocation (~775 MB for app-showcase, ~583 MB
          # for fundamentals-playground). Examples are NOT in any
          # `packages/*` cell, so per-category memory is much lower —
          # but `--sequential` still pays off here as defense-in-depth
          # against future heavy tsc invocations creeping into a
          # category.
          bun run $FILTER --sequential typecheck

  typecheck:
    name: Typecheck
    needs: typecheck-cell
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Aggregate typecheck matrix result
        run: |
          RESULT='${{ needs.typecheck-cell.result }}'
          echo "typecheck-cell=$RESULT"
          # `success` = every cell passed (or skipped via empty filter,
          # which exits 0). `skipped` only happens if all cells got
          # `if:` filtered, which we don't do. Anything else = fail.
          if [ "$RESULT" = "success" ]; then
            echo "All typecheck cells passed."
            exit 0
          fi
          echo "::error::One or more typecheck cells failed ($RESULT)"
          exit 1

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Run lint
        run: bun run lint
      - name: Enforce pyreon/require-browser-smoke-test
        run: bun run lint:browser-smoke

  # ── Test: per-category matrix (P3b) ──────────────────────────────────
  # Same shard shape as `typecheck-cell` above (8 cells, per-category).
  # Aggregator `test` job (next) keeps the stable `Test` required check
  # name for branch protection. See `typecheck-cell` comment for shard
  # rationale.
  test-cell:
    name: test (${{ matrix.category }})
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        category: [core, fundamentals, internals, native, tools, ui, ui-system, zero]
    steps:
      # Pin Node — vitest's `#!/usr/bin/env node` shebang means tests
      # run under whatever Node is on PATH. Without this, ubuntu-latest's
      # baked-in Node (currently 20) runs vitest; developers on Node 22+
      # hit interactions (e.g. the happy-dom localStorage shim trap fixed
      # in vitest.setup.ts) that ubuntu's stale Node masks. Pinning to
      # active-LTS Node 24 makes the CI env reflect what modern consumers
      # use, so bugs surface in CI instead of only at pre-push.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-pyreon
        with:
          node-version: '24'
          # P3c — vitest resolves @pyreon/* via the `bun` condition
          # (packages/internals/vitest-config/src/node.ts:conditions),
          # so tests run against src/, not lib/. Skipping the bootstrap
          # restore lets test cells start as soon as Install finishes.
          restore-bootstrap: 'false'
      - name: Run tests (${{ matrix.category }})
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            FILTER=$(bun run scripts/affected.ts \
              --base=origin/${{ github.base_ref }} \
              --category=${{ matrix.category }})
            if [ "$FILTER" = "--filter=*" ]; then
              FILTER="--filter=./packages/${{ matrix.category }}/*"
            fi
          else
            FILTER="--filter=./packages/${{ matrix.category }}/*"
          fi
          if [ -z "$FILTER" ]; then
            echo "No affected packages in this category — skipping."
            exit 0
          fi
          echo "Cell filter: $FILTER"
          set -f
          # Some affected packages genuinely have no `test` script (rare
          # under packages/* — most are zero-cli kind of shape — but
          # possible). When the affected filter matches only such
          # packages, bun errors with "No packages matched the filter"
          # and exits 1. Tolerate that case — fail on real test
          # failures only.
          set +e
          OUTPUT=$(bun run $FILTER test 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"
          if [ $EXIT -ne 0 ] && echo "$OUTPUT" | grep -q "No packages matched the filter"; then
            echo "(no matching packages have a 'test' script — treating as no-op)"
            exit 0
          fi
          exit $EXIT

  test:
    name: Test
    needs: test-cell
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Aggregate test matrix result
        run: |
          RESULT='${{ needs.test-cell.result }}'
          echo "test-cell=$RESULT"
          if [ "$RESULT" = "success" ]; then
            echo "All test cells passed."
            exit 0
          fi
          echo "::error::One or more test cells failed ($RESULT)"
          exit 1

  test-browser:
    name: Test (browser)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pin Node (see Test job above for rationale). No bootstrap needed —
      # browser tests run against src/ via the bun condition.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
        with:
          node-version: '24'
          restore-bootstrap: 'false'
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-chromium-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - run: bun run test:browser

  # ── Test (Rust binary): cross-backend equivalence gate ───────────────
  # Builds the @pyreon/compiler Rust napi-rs binary and runs the compiler
  # test suite with it loaded. The cross-backend equivalence harness
  # (235 patterns) auto-detects the binary's presence and asserts every
  # JS-path output matches the Rust-path output. Without this job, only
  # the JS fallback is exercised in CI — which is exactly what shipped the
  # 6 divergences caught in Phase 1 (#491). Locks the Rust path against
  # silent regressions going forward.
  test-rust-binary:
    name: Test (Rust binary)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Composite handles checkout + bun + node + NM/bootstrap cache restore;
      # rust toolchain + cargo caches stay manual (specific ordering needs).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
        with:
          node-version: '24'
          # P3c — @pyreon/compiler tests resolve via the bun condition
          # (its own src/), and the rust binary is built in this job
          # below. Other packages' lib/ is not needed.
          restore-bootstrap: 'false'
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master — pinned (OpenSSF Pinned-Dependencies)
        with:
          toolchain: stable
      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('packages/core/compiler/native/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-
      # P1c — cache cargo `target/` (compiled artifacts), keyed by Cargo.lock
      # + every Rust source file under native/src. Cargo's content hashing
      # invalidates correctly on source change; the cache only hits when the
      # exact compiled output is reproducible. Saves ~2-3 min on common case
      # where compiler source is unchanged (vast majority of CI runs).
      - name: Cache cargo target/
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/core/compiler/native/target
          key: cargo-target-${{ runner.os }}-${{ hashFiles('packages/core/compiler/native/Cargo.lock', 'packages/core/compiler/native/src/**/*.rs') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ hashFiles('packages/core/compiler/native/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-
      - name: Build native binary
        run: bun run --filter='@pyreon/compiler' build:native
      - name: Assert binary present
        # Soft-fail in build-native.ts means cargo trouble silently routes
        # consumers to JS. CI's job is the opposite — fail loudly so the
        # gate can never erode to "JS-only ran, equivalence checks
        # silently skipped."
        run: |
          BIN=packages/core/compiler/native/pyreon-compiler.node
          if [ ! -f "$BIN" ]; then
            echo "::error::Native binary missing at $BIN. Cargo build failed silently (build-native.ts soft-fails). The Rust equivalence gate cannot run without it."
            exit 1
          fi
          echo "Binary OK: $(ls -la $BIN)"
      - name: Run @pyreon/compiler tests against Rust binary
        run: bun run --filter='@pyreon/compiler' test

  # ── E2E: real-Chromium app-level tests against example apps ──────────
  # Parallel, flake-resilient matrix. Before 2026-05 this was ONE runner
  # executing 11 suites SEQUENTIALLY — wall-clock = the SUM (~6-10 min),
  # and a flake in suite N skipped every suite after it (an unrelated
  # storage-hydration flake once skipped the whole zero-hmr gate). Now:
  #
  #  • `e2e-decide` maps the PR's changed paths → only the suites those
  #    changes can affect (scripts/e2e-affected.ts). push:main and
  #    merge_group always run ALL — the gate protecting main never
  #    trusts the narrowing; false-negatives are the only real danger.
  #  • `e2e-suite` is a `fail-fast: false` matrix — every suite is its
  #    own parallel job + own check. One suite's flake/failure cannot
  #    skip or cancel another. Wall-clock ≈ the slowest single suite.
  #  • Every playwright*.config.ts uses `retries: process.env.CI ? 2 : 0`
  #    so a flaky spec self-heals within its job (3 attempts); a real
  #    bug fails all 3. Local stays 0 for honest, fast feedback.
  #  • `e2e` (THIS exact check name) is the STABLE required check: it
  #    aggregates the matrix so branch-protection's "E2E" requirement
  #    keeps working no matter which / how many matrix jobs ran, and an
  #    empty matrix (docs-only PR) resolves as a green skip.
  e2e-decide:
    name: E2E (decide)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      has: ${{ steps.pick.outputs.has }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Select affected e2e suites
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            MATRIX=$(bun run scripts/e2e-affected.ts --base=origin/${{ github.base_ref }})
          else
            MATRIX=$(bun run scripts/e2e-affected.ts --all)
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          if [ "$MATRIX" = "[]" ]; then
            echo "has=false" >> "$GITHUB_OUTPUT"
          else
            echo "has=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Selected e2e matrix: $MATRIX"

  e2e-suite:
    name: e2e (${{ matrix.name }})
    # P3c — e2e suites boot example apps via `vite preview` / `vite build`
    # which resolves @pyreon/* via the node condition → lib/. Needs Bootstrap.
    needs: [bootstrap, e2e-decide]
    if: needs.e2e-decide.outputs.has == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.e2e-decide.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-chromium-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run e2e — ${{ matrix.name }}
        # Tee the combined output so the next step can surface FLAKY
        # specs. `set -o pipefail` keeps Playwright's real exit code
        # through the pipe so a genuine failure still fails the job.
        run: |
          set -o pipefail
          bun run ${{ matrix.script }} 2>&1 | tee /tmp/e2e-out.txt
      - name: Surface flaky specs (passed only on retry)
        # `retries: 2` means a flaky spec self-heals → the job is green
        # and the flake is INVISIBLE. That hides a degrading spec. This
        # step turns "passed on retry" into a loud, durable signal: a
        # GitHub ::warning:: annotation + a job-summary block. It does
        # NOT fail the job (the retry already made it pass) — it makes
        # the flake impossible to ignore so the rate gets watched.
        if: always()
        run: |
          OUT=/tmp/e2e-out.txt
          [ -f "$OUT" ] || exit 0
          # Playwright's line/list reporter prints a final "  N flaky"
          # and lists each flaky title with a "(retry #N)" suffix.
          FLAKY=$(grep -E '[0-9]+ flaky' "$OUT" | grep -vE '\b0 flaky\b' || true)
          if [ -z "$FLAKY" ]; then
            echo "No flaky specs in suite '${{ matrix.name }}'."
            exit 0
          fi
          TITLES=$(grep -E '\(retry #[0-9]+\)' "$OUT" | sed 's/^[[:space:]]*//' | sort -u || true)
          echo "::warning title=Flaky e2e suite::'${{ matrix.name }}' had spec(s) that passed only on retry — $FLAKY"
          {
            echo "### ⚠️ Flaky specs in e2e suite \`${{ matrix.name }}\`"
            echo ""
            echo "Passed only after a retry (\`retries: 2\`). Green, but the flake rate should be watched / root-caused — not left to the retry mask."
            echo ""
            echo '```'
            echo "$FLAKY"
            [ -n "$TITLES" ] && { echo ""; echo "$TITLES"; }
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.name }}
          path: playwright-report/
          retention-days: 7

  # Stable required check. Aggregates the dynamic matrix so the
  # branch-protection "E2E" requirement keeps resolving regardless of
  # which suites the PR selected (or none, for a docs-only PR).
  e2e:
    name: E2E
    needs: [e2e-decide, e2e-suite]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Aggregate e2e matrix result
        run: |
          DECIDE='${{ needs.e2e-decide.result }}'
          SUITE='${{ needs.e2e-suite.result }}'
          HAS='${{ needs.e2e-decide.outputs.has }}'
          echo "e2e-decide=$DECIDE  e2e-suite=$SUITE  has=$HAS"
          if [ "$DECIDE" != "success" ]; then
            echo "::error::e2e-decide did not succeed ($DECIDE)"
            exit 1
          fi
          if [ "$HAS" != "true" ]; then
            echo "No e2e-relevant changes for this PR — matrix empty, green skip."
            exit 0
          fi
          if [ "$SUITE" = "success" ]; then
            echo "All selected e2e suites passed."
            exit 0
          fi
          echo "::error::One or more e2e suites failed (e2e-suite=$SUITE)"
          exit 1

  build:
    name: Build
    # P3c — `vite build` of examples resolves @pyreon/* via the node
    # condition → lib/. Needs Bootstrap.
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
      - name: Run build
        run: |
          # @pyreon/* packages are already built by install's bootstrap;
          # lib/ is restored from this run's cache above. The Build job
          # only verifies example app builds (which consume the restored
          # lib/). Including @pyreon/* in `bun run --filter=*` here would
          # race with the example builds: rolldown cleans lib/ before
          # rebuilding, and example apps reading lib/seo.js in parallel
          # hit a window where seo.js still references chunks that were
          # just deleted but not yet re-emitted → "Cannot find module".
          # Scope to examples/* to avoid the race.
          set -f
          bun run --filter='./examples/*' build

  # ── Coverage gate — split into floor (PR-fast) + full (push/merge_group) ──
  # P3a — pre-fix, Coverage ran the full per-package test suite with
  # --coverage instrumentation on EVERY PR (~200s). The actual coverage
  # numbers only matter when blocking main from regressing; the *floor*
  # config invariant (every package's vitest.config.ts threshold ≥ FLOOR
  # + drift detection on BELOW_FLOOR_EXEMPTIONS entries) is what's
  # actionable to a PR author at edit time. Splitting:
  #
  #  • `Coverage` (this job): floor-only, always runs, ~5s. Same name
  #    as before so branch protection keeps working — PRs now get a
  #    fast structural check instead of waiting 200s for actual
  #    numbers most PRs don't change.
  #  • `Coverage (Full)` (below): full test execution with coverage,
  #    runs on push:main + merge_group only. Main is never allowed to
  #    regress; merge_group acts as the final pre-merge safety check.
  #
  # Trade-off: a PR that drops a package's actual coverage from 92% to
  # 88% (still above the 90% floor of its vitest.config.ts threshold)
  # passes `Coverage` but fails `Coverage (Full)` at merge-queue time
  # — that's the documented safety policy. To opt INTO full coverage
  # on a specific PR, push the merge_group event manually or add a
  # `full-coverage` label (label-gating is a follow-up, not in this PR).
  coverage:
    name: Coverage
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false' # floor check reads vitest.config.ts only
      - name: Coverage floor + exemption drift check
        run: bun run coverage:floor

  coverage-full:
    name: Coverage (Full)
    needs: install
    if: github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
        with:
          # P3c — vitest's bun condition reads src/, not lib/.
          restore-bootstrap: 'false'
      - name: Run full per-package coverage
        run: bun run coverage

  # ── Audit Types: typed-but-unimplemented detector ─────────────────────
  # Runs `audit-types --all --strict` against the high-risk packages
  # (zero, router, core, server, runtime-server, vite-plugin) and FAILS
  # CI if any field is typed-but-unimplemented (zero non-type refs in
  # the owning package). Phase E2 triaged the original 3-finding
  # baseline: zero's duplicate `LoaderContext` was deleted (re-exports
  # router's), `RouteMeta.requiresAuth` and `NativeItem.__isNative` are
  # in `EXEMPT_FIELDS` with rationale (user-side convention + cross-
  # package brand respectively). New HIGH findings now block merge.
  # See scripts/audit-types.ts for the heuristic + EXEMPT_FIELDS /
  # EXEMPT_FILES escape hatches when a field genuinely doesn't fit the
  # in-package-by-name read pattern.
  audit-types:
    name: Audit Types
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Audit typed-but-unimplemented surfaces (strict)
        run: bun run audit-types --all --strict

  # ── Check bundle budgets: per-package main-entry size gate ────────────
  # Bundles each package's `lib/index.js` (workspace + peer-deps
  # externalized, dynamic-import chunks split out) and asserts the
  # gzipped main-entry size is ≤ the budget locked in
  # scripts/bundle-budgets.json. Catches regressions like "PR
  # accidentally moves heavy code out of a lazy chunk into the main
  # entry" before they ship to consumers. Lazy chunks (flow's elkjs,
  # document's PDF/DOCX renderers) are EXCLUDED from the main-entry
  # measurement by design — they only load on-demand.
  # See scripts/check-bundle-budgets.ts.
  check-bundle-budgets:
    name: Check Bundle Budgets
    # P3c — bundles `lib/index.js` of every published package via Bun.build.
    # Needs Bootstrap.
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
      - name: Verify each package main-entry within budget
        run: bun run check-bundle-budgets

  # ── Check distribution: bundle/distribution hygiene gate ──────────────
  # Asserts every published @pyreon/* package declares `sideEffects` (so
  # bundlers can tree-shake) and excludes `!lib/**/*.map` from its `files`
  # array (so source maps don't ship to npm consumers). Also runs an
  # `npm pack --dry-run` probe against @pyreon/reactivity to prove the
  # tarball is actually clean at publish time, not just on paper. The
  # probe relies on lib/ being built — restored from the bootstrap
  # cache rather than rebuilt, so the job runs in seconds, not minutes.
  # See scripts/check-distribution.ts.
  check-distribution:
    name: Check Distribution
    # P3c — `npm pack --dry-run` probe reads lib/ via the `files` array.
    # Needs Bootstrap.
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
      - name: Check sideEffects + source-map exclusion
        run: bun run check-distribution

  # ── Check doc claims: numeric drift gate ──────────────────────────────
  # Asserts every numeric claim in human-written docs (hooks count in
  # README/manifest/CLAUDE.md, docs page count in CLAUDE.md) matches the
  # underlying source of truth (export count, file count). The audit
  # caught the hooks README claiming 16 vs actual 34 — drift that lasted
  # long enough to ship to users. This gate prevents recurrence.
  # See scripts/check-doc-claims.ts.
  check-doc-claims:
    name: Check Doc Claims
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Verify doc-claim numbers match source of truth
        run: bun run check-doc-claims

  # ── Manifest depth ratchet ────────────────────────────────────────────
  # The root cause behind "get_api returns a signature but no foot-gun
  # catalog for half the fundamentals" was that nothing enforced manifest
  # density — rx shipped 3 api[] entries for 37 functions; store
  # referenced StoreApi 3x in seeAlso with no entry (a get_api 404).
  # This ratchet locks each migrated package's achieved density so it
  # can't silently erode. Not-yet-migrated packages are intentionally
  # absent from the lock (the visible backlog), so this never flag-days
  # CI. See scripts/check-manifest-depth.ts.
  check-manifest-depth:
    name: Check Manifest Depth
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      # check-manifest-depth's `findManifests` dynamic-imports every package
      # manifest.ts; each does `import { defineManifest } from
      # '@pyreon/manifest'` — a workspace specifier that resolves ONLY against
      # the restored node_modules symlink farm. The composite restores
      # node_modules by default. No bootstrap restore needed (script reads
      # manifest.ts via the bun condition → src/, not lib/).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Verify locked manifests stay at or above their density floor
        run: bun run check-manifest-depth

  # ── No-major-changesets: 0.x version cap at PR time ───────────────────
  # Pyreon is 0.x; `major` changesets would produce a 1.0.0 cascade across
  # the `fixed` group of 60+ packages. Companion to `scripts/cap-changeset-
  # bumps.ts` (release-time downgrade) — the CI guard surfaces the violation
  # at PR time so contributors see a clear error instead of a silent release-
  # time downgrade. When Pyreon goes 1.0, remove BOTH this job and the
  # release-time cap step as a deliberate gate (the removal IS the signal).
  check-no-major-changesets:
    name: Check No Major Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: 'Verify no major changesets (0.x policy)'
        run: bun scripts/check-no-major-changesets.ts

  # ── Verify modes: real-app build matrix ────────────────────────────────
  # Builds every example × mode cell defined in scripts/verify-modes.ts and
  # asserts the dist/ has actual rendered content. This is the structural
  # gate against the "typed-but-unimplemented" bug class — 0.14.0 shipped
  # with `mode: "ssg"` typed but not implemented because no internal test
  # exercised the consumer-level surface end-to-end. See scripts/verify-modes.ts
  # for the matrix definition.
  verify-modes:
    name: Verify Modes
    # P3c — `vite build` of every example × mode cell. Needs Bootstrap.
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
      - run: bun run verify-modes

  # ── Scaffold smoke: end-to-end gate against create-pyreon-app ──────────
  # Runs the actual scaffolder + bun install + bun run build for every
  # cell defined in scripts/scaffold-smoke.ts (template × adapter ×
  # integrations). Catches the bug class that PR #404 shipped with —
  # template TS errors / missing deps / wrong API names that lint+
  # typecheck on the scaffolder package can't see, because templates
  # aren't in any tsconfig include path.
  #
  # P1d — sharded as a matrix (6 cells in parallel) so wall-clock
  # ≈ slowest single cell instead of the sum. Pre-shard the job ran 6
  # cells sequentially in one runner (~215s); post-shard each runs in
  # its own ~50-110s job (per-cell `bun install` from repo root is the
  # dominant cost) with no cross-cell contention.
  #
  # `scaffold-smoke-aggregate` mirrors the e2e aggregator pattern: a
  # stable required check name regardless of which cells ran (matches
  # branch-protection's expectations even if a cell gets renamed).
  scaffold-smoke-cell:
    name: Scaffold Smoke (${{ matrix.cell }})
    # P3c — each cell runs `bun install` + `vite build` of the scaffolded app.
    # Needs Bootstrap so the workspace lib/ is resolvable when the app pulls
    # in @pyreon/* via the node condition.
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        cell:
          - cpa-smoke-app-vercel
          - cpa-smoke-app-static
          - cpa-smoke-blog-cloudflare
          - cpa-smoke-dashboard-vercel-full
          - cpa-smoke-dashboard-node-supabase
          - cpa-smoke-monorepo-vercel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
      # scaffold-smoke.ts accepts a positional cell filter:
      #   `bun scripts/scaffold-smoke.ts cpa-smoke-app-vercel` runs only that cell.
      - name: Run scaffold-smoke cell
        run: bun scripts/scaffold-smoke.ts ${{ matrix.cell }}

  # Stable required-check aggregator. Mirrors the `e2e` job's pattern
  # — branch protection requires this check by name; matrix cells are
  # the individual reports + failure surface.
  scaffold-smoke:
    name: Scaffold Smoke
    needs: scaffold-smoke-cell
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Aggregate scaffold-smoke matrix
        run: |
          RESULT="${{ needs.scaffold-smoke-cell.result }}"
          if [ "$RESULT" = "success" ]; then
            echo "All scaffold-smoke cells passed."
            exit 0
          fi
          echo "::error::One or more scaffold-smoke cells failed (result=$RESULT)"
          exit 1

  docs-sync:
    name: Docs Sync
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect whether docs-sync inputs changed
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" || echo '')
          if echo "$CHANGED" | grep -qE '(^packages/[^/]+/[^/]+/src/manifest\.ts$|^llms(-full)?\.txt$|^scripts/gen-docs(-core)?\.ts$|^packages/internals/manifest/|^package\.json$|^docs/docs/mcp\.md$|^scripts/check-mcp-docs\.ts$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "No docs-sync-relevant files changed — skipping."
          fi
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: steps.changes.outputs.should_run == 'true'
        with:
          bun-version-file: .bun-version
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: steps.changes.outputs.should_run == 'true'
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - name: Check manifest-generated docs are in sync
        if: steps.changes.outputs.should_run == 'true'
        run: bun run gen-docs --check
      - name: Check docs/docs/mcp.md covers every registered MCP tool
        if: steps.changes.outputs.should_run == 'true'
        run: bun run check-mcp-docs

  audit:
    name: Dependency Audit
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
        with:
          # P3c — `bun pm untrusted` + lockfile diff only need NM, not lib/.
          restore-bootstrap: 'false'
      - name: Check for untrusted dependencies
        run: bun pm untrusted
        continue-on-error: true
      - name: Verify no lockfile drift
        run: git diff --exit-code bun.lock || (echo "::error::Lockfile is out of sync with package.json" && exit 1)

  # ── Benchmark (push:main only — track perf over time) ────────────────────
  benchmark:
    name: Benchmark
    if: github.event_name == 'push'
    # P3c — benchmarks measure realistic perf against the BUILT artifacts,
    # not src/. Needs Bootstrap.
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pyreon
      - name: Run core benchmarks
        run: bun run bench:all > bench-results.json
      - name: Run bundle size analysis
        run: bun run bench:bundle-size > bundle-size.json
      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-${{ github.sha }}
          path: |
            bench-results.json
            bundle-size.json
          retention-days: 90

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # The trufflehog action `docker run`s ghcr.io/trufflesecurity/
      # trufflehog at job runtime. ghcr.io intermittently times out on
      # the manifest fetch (exit 125, BEFORE any scan) — and since this
      # is a REQUIRED check, that flake blocks every PR repo-wide on bad
      # luck (observed on #656, #688). Pre-pull the image with retry +
      # backoff into the local Docker cache so the action finds it
      # locally and never performs the flaky network pull. This adds
      # ZERO change to the trufflehog action SHA, `--only-verified`
      # args, or scan scope — the security posture is identical; only
      # the image fetch is made resilient. A genuine sustained ghcr.io
      # outage still fails (correctly) after honest retries.
      - name: Pre-pull trufflehog image (ghcr.io flake-resilient)
        run: |
          img="ghcr.io/trufflesecurity/trufflehog:latest"
          for i in 1 2 3 4; do
            if docker pull "$img"; then exit 0; fi
            echo "::warning::ghcr.io pull attempt $i/4 failed for $img; backing off ${i}0s"
            sleep "${i}0"
          done
          echo "::error::trufflehog image pull failed after 4 attempts — genuine ghcr.io outage, not a transient flake"
          exit 1
      - uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: --only-verified
