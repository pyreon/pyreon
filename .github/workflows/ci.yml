name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

# Cancel in-progress runs for the same branch/PR. For merge_group events,
# github.ref is the merge queue's synthetic ref (refs/heads/gh-readonly-queue/...),
# distinct from PR refs, so queued runs don't cancel each other inappropriately.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Restrict all jobs to read-only by default
permissions:
  contents: read

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
      - name: Cache bootstrap (lib/) builds
        uses: actions/cache@v4
        with:
          path: packages/*/*/lib
          key: bootstrap-${{ runner.os }}-${{ hashFiles('packages/**/src/**', 'packages/**/package.json', 'packages/**/tsconfig.json') }}
          restore-keys: bootstrap-${{ runner.os }}-
      - name: Compute affected filter
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            FILTER=$(bun run scripts/affected.ts --base=origin/${{ github.base_ref }})
            echo "filter=$FILTER" >> $GITHUB_OUTPUT
          else
            echo "filter=--filter=*" >> $GITHUB_OUTPUT
          fi
      - name: Run typecheck
        run: |
          FILTER="${{ steps.affected.outputs.filter }}"
          if [ -z "$FILTER" ]; then
            echo "No affected packages — skipping typecheck."
            exit 0
          fi
          # set -f disables shell glob expansion so --filter=* reaches bun
          # literally (bun does its own glob matching against workspace names).
          set -f
          bun run $FILTER typecheck

  # Note: matrix sharding (vitest --shard=i/n) was considered and rejected.
  # Branch protection required-status checks pin the literal job name "Test";
  # adding `strategy.matrix.shard: [1,2,3,4]` would rename the contexts to
  # "Test (shard 1)" etc. and break protection. The simpler alternative
  # (sharding via a sibling job named "Test Shard" while keeping "Test"
  # gated to push/merge_group) was also evaluated, but the affected-filter
  # + node_modules cache + bootstrap-lib cache combo already brings PR runs
  # well under the threshold where sharding would pay for itself. Revisit
  # if Test wall-clock on push:main creeps past ~5 min.
  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
      - name: Cache bootstrap (lib/) builds
        uses: actions/cache@v4
        with:
          path: packages/*/*/lib
          key: bootstrap-${{ runner.os }}-${{ hashFiles('packages/**/src/**', 'packages/**/package.json', 'packages/**/tsconfig.json') }}
          restore-keys: bootstrap-${{ runner.os }}-
      - name: Compute affected filter
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            FILTER=$(bun run scripts/affected.ts --base=origin/${{ github.base_ref }})
            echo "filter=$FILTER" >> $GITHUB_OUTPUT
          else
            echo "filter=--filter=*" >> $GITHUB_OUTPUT
          fi
      - name: Run tests
        run: |
          FILTER="${{ steps.affected.outputs.filter }}"
          if [ -z "$FILTER" ]; then
            echo "No affected packages — skipping tests."
            exit 0
          fi
          set -f
          bun run $FILTER test

  test-browser:
    name: Test (browser)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-chromium-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - run: bun run test:browser

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
      - name: Cache bootstrap (lib/) builds
        uses: actions/cache@v4
        with:
          path: packages/*/*/lib
          key: bootstrap-${{ runner.os }}-${{ hashFiles('packages/**/src/**', 'packages/**/package.json', 'packages/**/tsconfig.json') }}
          restore-keys: bootstrap-${{ runner.os }}-
      - name: Compute affected filter
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            FILTER=$(bun run scripts/affected.ts --base=origin/${{ github.base_ref }})
            echo "filter=$FILTER" >> $GITHUB_OUTPUT
          else
            echo "filter=--filter=*" >> $GITHUB_OUTPUT
          fi
      - name: Run build
        run: |
          FILTER="${{ steps.affected.outputs.filter }}"
          if [ -z "$FILTER" ]; then
            echo "No affected packages — skipping build."
            exit 0
          fi
          set -f
          bun run $FILTER build

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
      - name: Compute affected filter
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            FILTER=$(bun run scripts/affected.ts --base=origin/${{ github.base_ref }})
            echo "filter=$FILTER" >> $GITHUB_OUTPUT
          else
            echo "filter=--filter=*" >> $GITHUB_OUTPUT
          fi
      - name: Run lint
        run: |
          FILTER="${{ steps.affected.outputs.filter }}"
          if [ -z "$FILTER" ]; then
            echo "No affected packages — skipping lint."
            exit 0
          fi
          # oxlint is path-based and very fast; the affected filter only gates
          # the empty-changes case (skip when nothing to lint).
          bun run lint
      - name: Enforce pyreon/require-browser-smoke-test
        # Runs the focused `pyreon/require-browser-smoke-test` rule across
        # every package. Not gated on the affected filter because adding or
        # renaming a smoke test in any package affects the contract for the
        # whole monorepo. Also verifies that PHASE_5_PENDING_PACKAGES
        # exemptions haven't gone stale (package now has a browser test
        # but is still listed as exempt).
        run: bun run lint:browser-smoke

  docs-sync:
    name: Docs Sync
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
      - name: Check manifest-generated docs are in sync
        # Single source of truth for "in sync": gen-docs --check exits 1
        # if any generated file would change, printing a minimal diff.
        # Failure message tells reviewers the fix.
        run: bun run gen-docs --check

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          extra_args: --only-verified

  coverage:
    name: Coverage
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
      - run: bun run coverage

  audit:
    name: Dependency Audit
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
      - name: Check for untrusted dependencies
        run: bun pm untrusted
        continue-on-error: true
      - name: Verify no lockfile drift
        run: |
          bun install
          git diff --exit-code bun.lock || (echo "::error::Lockfile is out of sync with package.json" && exit 1)
