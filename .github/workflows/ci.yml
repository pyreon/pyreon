name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ── Shared cache keys ──────────────────────────────────────────────────────
# Defined here so every job uses the exact same strings.
env:
  NM_KEY: node-modules-${{ github.run_id }}
  BOOTSTRAP_KEY: bootstrap-${{ github.run_id }}

jobs:
  # ── Install: checkout + install + bootstrap, then save caches ───────────
  # Downstream jobs restore these caches by run_id — guaranteed fresh,
  # no stale restore-keys matches, no redundant bun install calls.
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      affected-filter: ${{ steps.affected.outputs.filter }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      # Try to restore a previous lockfile-matched cache (fast path)
      - name: Restore node_modules
        id: nm-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      # Save under run_id so downstream jobs get an exact match (no stale data)
      - name: Save node_modules for this run
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      # Also save under the lockfile hash for future runs
      - name: Save node_modules (lockfile key)
        if: steps.nm-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      # bun install above ran the postinstall bootstrap, which built lib/
      # fresh from current source. We DON'T restore a previous lib/ here —
      # cross-run lib/ caching was the source of "stale chunk hash" build
      # failures: rolldown's chunk filenames are content-hashed, and even
      # a stale lib/ that nominally matches the current source might
      # reference chunk filenames that no longer exist (e.g., dropped
      # files in the cache, divergent chunk-split decisions between runs).
      # Save under the per-run key so downstream jobs in THIS run get the
      # exact lib/ that THIS run's bootstrap produced — no cross-run
      # corruption.
      - name: Save bootstrap for this run
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      # Compute affected filter once — shared via output to all downstream jobs
      - name: Compute affected filter
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            FILTER=$(bun run scripts/affected.ts --base=origin/${{ github.base_ref }})
            echo "filter=$FILTER" >> $GITHUB_OUTPUT
          else
            echo "filter=--filter=*" >> $GITHUB_OUTPUT
          fi

  # ── Shared setup anchor (YAML anchor not supported, so we repeat) ───────
  # Every downstream job: checkout → setup-bun → restore run_id caches.
  # No bun install needed — caches are guaranteed fresh from Install job.

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - name: Run typecheck
        run: |
          FILTER="${{ needs.install.outputs.affected-filter }}"
          if [ -z "$FILTER" ]; then
            echo "No affected packages — skipping."
            exit 0
          fi
          set -f
          bun run $FILTER typecheck

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - name: Run lint
        run: bun run lint
      - name: Enforce pyreon/require-browser-smoke-test
        run: bun run lint:browser-smoke

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - name: Run tests
        run: |
          FILTER="${{ needs.install.outputs.affected-filter }}"
          if [ -z "$FILTER" ]; then
            echo "No affected packages — skipping."
            exit 0
          fi
          set -f
          # Some affected packages (most examples — playground, ssr-showcase,
          # benchmark, etc.) genuinely have no `test` script. When the affected
          # filter is *only* such packages, bun errors with "No packages matched
          # the filter" and exits 1. Tolerate that case — fail on real test
          # failures only.
          set +e
          OUTPUT=$(bun run $FILTER test 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"
          if [ $EXIT -ne 0 ] && echo "$OUTPUT" | grep -q "No packages matched the filter"; then
            echo "(no matching packages have a 'test' script — treating as no-op)"
            exit 0
          fi
          exit $EXIT

  test-browser:
    name: Test (browser)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-chromium-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - run: bun run test:browser

  # ── Test (Rust binary): cross-backend equivalence gate ───────────────
  # Builds the @pyreon/compiler Rust napi-rs binary and runs the compiler
  # test suite with it loaded. The cross-backend equivalence harness
  # (235 patterns) auto-detects the binary's presence and asserts every
  # JS-path output matches the Rust-path output. Without this job, only
  # the JS fallback is exercised in CI — which is exactly what shipped the
  # 6 divergences caught in Phase 1 (#491). Locks the Rust path against
  # silent regressions going forward.
  test-rust-binary:
    name: Test (Rust binary)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('packages/core/compiler/native/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - name: Build native binary
        run: bun run --filter='@pyreon/compiler' build:native
      - name: Assert binary present
        # Soft-fail in build-native.ts means cargo trouble silently routes
        # consumers to JS. CI's job is the opposite — fail loudly so the
        # gate can never erode to "JS-only ran, equivalence checks
        # silently skipped."
        run: |
          BIN=packages/core/compiler/native/pyreon-compiler.node
          if [ ! -f "$BIN" ]; then
            echo "::error::Native binary missing at $BIN. Cargo build failed silently (build-native.ts soft-fails). The Rust equivalence gate cannot run without it."
            exit 1
          fi
          echo "Binary OK: $(ls -la $BIN)"
      - name: Run @pyreon/compiler tests against Rust binary
        run: bun run --filter='@pyreon/compiler' test

  # ── E2E: real-Chromium app-level tests against example apps ──────────
  # Runs the playwright `playground` project — 30 tests covering signal
  # → DOM updates, computed values, batching, mount/unmount, conditional
  # rendering, list reconciliation, router navigation, and bench
  # comparison shapes. Targets `examples/playground` which exposes
  # `window.__pyreon` for direct primitive access from tests.
  #
  # The full e2e suite has more files (ssr-showcase, fundamentals,
  # visual-regression) but they're disabled in playwright.config.ts —
  # see the file's header for the per-project status. Re-enabling each
  # is gated on follow-up work (the ssr-showcase tests, for instance,
  # surfaced a real `_layout.tsx` double-mount bug in fs-router).
  e2e:
    name: E2E
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-chromium-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run e2e — playground + ssr-showcase + fundamentals
        run: bun run test:e2e
      - name: Run e2e — ui-showcase regression gate
        # Run as a separate step (own webServer boot) to avoid resource
        # contention when all 3 dev servers fight to start at the same
        # time. Locally and in CI the combined run produces flaky
        # failures; sequential boots are stable.
        run: bun run test:e2e:ui-regression
      - name: Run e2e — compat layers (react/preact/vue/solid)
        # Same separate-config rationale as ui-regression. Spawns 4 dev
        # servers (ports 5177-5180), one per compat-layer example app.
        # Proves each compat shim works in real-app shape, not just at
        # the vitest-browser smoke-test surface.
        run: bun run test:e2e:compat
      - name: Run e2e — app-showcase (flow + dnd)
        # Same separate-config rationale. Boots app-showcase on port 5181
        # and exercises @pyreon/flow's pointer-driven drag + selection +
        # wheel-zoom in a real-app shape. dnd specs queued once a
        # consumer demo lands (Task 4 in the e2e expansion plan).
        run: bun run test:e2e:app-showcase
      - name: Run e2e — islands-showcase (@pyreon/server hydration strategies)
        # Same separate-config rationale. Boots islands-showcase on port
        # 5182 and exercises each of @pyreon/server's 5 hydration
        # strategies end-to-end (load / idle / visible / media / never).
        # Catches the "the whole feature is unblooded" gap noted in the
        # post-PR-#453 island audit.
        run: bun run test:e2e:islands
      - name: Run e2e — SSG subpath / base-path runtime (PR E)
        # Same separate-config rationale. Builds ssr-showcase with
        # `zero({ base: '/blog/' })` then previews on port 5198 and runs
        # 4 specs that exercise the runtime contract under base — page
        # load, asset URL fetch success, in-app RouterLink-click
        # navigation, post-hydration counter reactivity. Companion to
        # the verify-modes ssr-showcase × ssg-subpath cell which gates
        # the build artifact; this gates the runtime behaviour.
        run: bun run test:e2e:ssg-subpath
      - name: Run e2e — SSG i18n route duplication runtime (PR H follow-up)
        # Same separate-config rationale. Builds ssr-showcase with
        # `zero({ i18n: { locales: ['en','de','cs'], defaultLocale: 'en' } })`
        # then previews on port 5199 and runs 4 specs that exercise the
        # runtime contract for per-locale routes — default-locale
        # unprefixed load, non-default prefixed load, third-locale
        # multi-locale duplication, RouterLink click as client-side push.
        # Companion to the verify-modes ssr-showcase × ssg-i18n cell
        # which gates the dist filesystem; this gates the runtime
        # routing/hydration behaviour.
        run: bun run test:e2e:ssg-i18n
      - name: Run e2e — SSG i18n prefix-strategy runtime (PR L3)
        # Same separate-config rationale. Builds ssr-showcase with
        # `strategy: 'prefix'` (every locale prefixed including default)
        # then serves on port 5200 via scripts/serve-ssg.ts. 4 specs
        # exercise the strategy-distinguishing shape: /en/about IS
        # prefixed, unprefixed /about returns 404, dynamic-route ×
        # locale composition works under prefix, hreflang `x-default`
        # points at en-PREFIXED URL on the sitemap. Companion to
        # PR L1's verify-modes ssg-i18n-prefix cell (build artifact);
        # this gates the runtime layer that L1 deliberately left as
        # a follow-up.
        run: bun run test:e2e:ssg-i18n-prefix
      - name: Run e2e — perf-dashboard (useFormState selector-narrowing gate)
        # Boots perf-dashboard on port 5183. Real-Chromium gate for the
        # `useFormState(form, s => s.isValid)` selector-narrowing contract
        # — asserts `form.formStateScan.fieldsRead === 0` on the selector
        # path and `>= N` on the no-selector control path. The unit-level
        # regression in @pyreon/form's form-additional.test.tsx is happy-
        # dom; this is the real-browser regression gate so a bundler
        # quirk that drops the dev-gate counter (or a use-form-state
        # regression that re-introduces the eager scan) fails CI loudly.
        run: bun run test:e2e:perf-dashboard
      - name: Run e2e — create-pyreon-app runtime (app/blog/dash fixtures)
        # Boots 3 pre-scaffolded fixture apps under examples/cpa-pw-* on
        # ports 5191-5193. Catches runtime regressions in scaffolded
        # output that scaffold-smoke (build-only) can't see — empty
        # `<main>` from misuse of layout patterns, broken hydration,
        # navigation regressions. 4 specs are skipped pending framework
        # fixes (nested-layout 404, dev-server API-routes 404).
        run: bun run test:e2e:cpa
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - name: Run build
        run: |
          # @pyreon/* packages are already built by install's bootstrap;
          # lib/ is restored from this run's cache above. The Build job
          # only verifies example app builds (which consume the restored
          # lib/). Including @pyreon/* in `bun run --filter=*` here would
          # race with the example builds: rolldown cleans lib/ before
          # rebuilding, and example apps reading lib/seo.js in parallel
          # hit a window where seo.js still references chunks that were
          # just deleted but not yet re-emitted → "Cannot find module".
          # Scope to examples/* to avoid the race.
          set -f
          bun run --filter='./examples/*' build

  coverage:
    name: Coverage
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - run: bun run coverage

  # ── Audit Types: typed-but-unimplemented detector ─────────────────────
  # Runs `audit-types --all --strict` against the high-risk packages
  # (zero, router, core, server, runtime-server, vite-plugin) and FAILS
  # CI if any field is typed-but-unimplemented (zero non-type refs in
  # the owning package). Phase E2 triaged the original 3-finding
  # baseline: zero's duplicate `LoaderContext` was deleted (re-exports
  # router's), `RouteMeta.requiresAuth` and `NativeItem.__isNative` are
  # in `EXEMPT_FIELDS` with rationale (user-side convention + cross-
  # package brand respectively). New HIGH findings now block merge.
  # See scripts/audit-types.ts for the heuristic + EXEMPT_FIELDS /
  # EXEMPT_FILES escape hatches when a field genuinely doesn't fit the
  # in-package-by-name read pattern.
  audit-types:
    name: Audit Types
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - name: Audit typed-but-unimplemented surfaces (strict)
        run: bun run audit-types --all --strict

  # ── Check bundle budgets: per-package main-entry size gate ────────────
  # Bundles each package's `lib/index.js` (workspace + peer-deps
  # externalized, dynamic-import chunks split out) and asserts the
  # gzipped main-entry size is ≤ the budget locked in
  # scripts/bundle-budgets.json. Catches regressions like "PR
  # accidentally moves heavy code out of a lazy chunk into the main
  # entry" before they ship to consumers. Lazy chunks (flow's elkjs,
  # document's PDF/DOCX renderers) are EXCLUDED from the main-entry
  # measurement by design — they only load on-demand.
  # See scripts/check-bundle-budgets.ts.
  check-bundle-budgets:
    name: Check Bundle Budgets
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - name: Verify each package main-entry within budget
        run: bun run check-bundle-budgets

  # ── Check distribution: bundle/distribution hygiene gate ──────────────
  # Asserts every published @pyreon/* package declares `sideEffects` (so
  # bundlers can tree-shake) and excludes `!lib/**/*.map` from its `files`
  # array (so source maps don't ship to npm consumers). Also runs an
  # `npm pack --dry-run` probe against @pyreon/reactivity to prove the
  # tarball is actually clean at publish time, not just on paper. The
  # probe relies on lib/ being built — restored from the bootstrap
  # cache rather than rebuilt, so the job runs in seconds, not minutes.
  # See scripts/check-distribution.ts.
  check-distribution:
    name: Check Distribution
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - name: Check sideEffects + source-map exclusion
        run: bun run check-distribution

  # ── Check doc claims: numeric drift gate ──────────────────────────────
  # Asserts every numeric claim in human-written docs (hooks count in
  # README/manifest/CLAUDE.md, docs page count in CLAUDE.md) matches the
  # underlying source of truth (export count, file count). The audit
  # caught the hooks README claiming 16 vs actual 34 — drift that lasted
  # long enough to ship to users. This gate prevents recurrence.
  # See scripts/check-doc-claims.ts.
  check-doc-claims:
    name: Check Doc Claims
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Verify doc-claim numbers match source of truth
        run: bun run check-doc-claims

  # ── No-major-changesets: 0.x version cap at PR time ───────────────────
  # Pyreon is 0.x; `major` changesets would produce a 1.0.0 cascade across
  # the `fixed` group of 60+ packages. Companion to `scripts/cap-changeset-
  # bumps.ts` (release-time downgrade) — the CI guard surfaces the violation
  # at PR time so contributors see a clear error instead of a silent release-
  # time downgrade. When Pyreon goes 1.0, remove BOTH this job and the
  # release-time cap step as a deliberate gate (the removal IS the signal).
  check-no-major-changesets:
    name: Check No Major Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: 'Verify no major changesets (0.x policy)'
        run: bun scripts/check-no-major-changesets.ts

  # ── Verify modes: real-app build matrix ────────────────────────────────
  # Builds every example × mode cell defined in scripts/verify-modes.ts and
  # asserts the dist/ has actual rendered content. This is the structural
  # gate against the "typed-but-unimplemented" bug class — 0.14.0 shipped
  # with `mode: "ssg"` typed but not implemented because no internal test
  # exercised the consumer-level surface end-to-end. See scripts/verify-modes.ts
  # for the matrix definition.
  verify-modes:
    name: Verify Modes
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - run: bun run verify-modes

  # ── Scaffold smoke: end-to-end gate against create-pyreon-app ──────────
  # Runs the actual scaffolder + bun install + bun run build for every
  # cell defined in scripts/scaffold-smoke.ts (template × adapter ×
  # integrations). Catches the bug class that PR #404 shipped with —
  # template TS errors / missing deps / wrong API names that lint+
  # typecheck on the scaffolder package can't see, because templates
  # aren't in any tsconfig include path.
  scaffold-smoke:
    name: Scaffold Smoke
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - run: bun run scaffold-smoke

  docs-sync:
    name: Docs Sync
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect whether docs-sync inputs changed
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" || echo '')
          if echo "$CHANGED" | grep -qE '(^packages/[^/]+/[^/]+/src/manifest\.ts$|^llms(-full)?\.txt$|^scripts/gen-docs(-core)?\.ts$|^packages/internals/manifest/|^package\.json$|^docs/docs/mcp\.md$|^scripts/check-mcp-docs\.ts$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "No docs-sync-relevant files changed — skipping."
          fi
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: steps.changes.outputs.should_run == 'true'
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: steps.changes.outputs.should_run == 'true'
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - name: Check manifest-generated docs are in sync
        if: steps.changes.outputs.should_run == 'true'
        run: bun run gen-docs --check
      - name: Check docs/docs/mcp.md covers every registered MCP tool
        if: steps.changes.outputs.should_run == 'true'
        run: bun run check-mcp-docs

  audit:
    name: Dependency Audit
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - name: Check for untrusted dependencies
        run: bun pm untrusted
        continue-on-error: true
      - name: Verify no lockfile drift
        run: git diff --exit-code bun.lock || (echo "::error::Lockfile is out of sync with package.json" && exit 1)

  # ── Benchmark (push:main only — track perf over time) ────────────────────
  benchmark:
    name: Benchmark
    if: github.event_name == 'push'
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: ${{ env.NM_KEY }}
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}
      - name: Run core benchmarks
        run: bun run bench:all > bench-results.json
      - name: Run bundle size analysis
        run: bun run bench:bundle-size > bundle-size.json
      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bench-${{ github.sha }}
          path: |
            bench-results.json
            bundle-size.json
          retention-days: 90

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          extra_args: --only-verified
