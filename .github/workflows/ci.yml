name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

# Cancellation policy — burst-safe WITHOUT per-commit pileup.
#
# Requirement: the safety-net gates that ONLY run on main (`Coverage (Full)`,
# `Benchmark` — gated `event_name == 'push' || 'merge_group'`, so they never
# run on PRs) must always run to completion for main HEAD; a newer commit must
# never cancel a run that is mid-flight.
#
# Two earlier designs each got half of it:
#   1. `cancel-in-progress: true` on a per-ref group — cancelled the RUNNING
#      main-push run every time a newer commit landed (merges land faster than
#      the 15-min coverage job), so the gates never completed (20+ pushes, all
#      cancelled).
#   2. per-`run_id` group (cancellation "never fires") — fixed (1) but gave
#      EVERY commit its own uncancellable full run, so a burst of N merges
#      produced N heavy main-CI runs that saturated the runner pool (observed:
#      7 stacked `CI [push] main` runs draining serially).
#
# Correct policy = protect the RUNNING run, COALESCE pending to the latest.
# A SHARED per-ref group + `cancel-in-progress: false` makes GitHub:
#   - never cancel the in-progress run  → Coverage/Benchmark always complete;
#   - cancel a *stale pending* run when a newer one queues (documented
#     concurrency behaviour) → a burst of N merges collapses to ~2 full runs:
#     the in-flight one + the latest HEAD. No pileup, no starvation.
# main HEAD is always covered (the coalesced-to-latest pending run); skipping
# coverage for the intermediate commits in a burst is correct — HEAD subsumes
# them, and the pre-merge gates already validated each PR.
#
# - push:main    → group `ci-refs/heads/main`, cancel:false → running protected, pending coalesced to latest HEAD.
# - merge_group  → unique queue ref per attempt, cancel:false → each merge-queue run completes (the queue requires it).
# - pull_request → per-PR ref, cancel:true → newest commit on the PR wins (unchanged).
#
# **YAML interpolation gotcha** — a bare `${{ github.event_name == 'pull_request' }}`
# interpolates to the literal string "true" or "false". YAML then re-parses
# `cancel-in-progress: false` as the BOOLEAN false (good), BUT `cancel-in-
# progress: true` as boolean true… and crucially, **GitHub's runner has been
# observed to treat the string-interpolated form as truthy even when it
# evaluates to `false`** (empirical: every push:main run cancelled at the
# pending stage despite the expression evaluating to `false`). The
# documented workaround is the explicit ternary `&& true || false` — forces
# the expression to return a JSON-native boolean that the runner's
# concurrency engine reads correctly.
#
# Bisect-verifiable: revert to the bare comparison → push:main runs cancel
# at the pending stage (never run any jobs); apply the ternary → push:main
# runs progress to completion.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && true || false }}

permissions:
  contents: read

# ── Shared cache keys ──────────────────────────────────────────────────────
# Defined here so every job uses the exact same strings.
#
# TWO-LAYER bootstrap cache strategy:
#
# 1. BOOTSTRAP_KEY (per-run-id) — what every DOWNSTREAM job restores via
#    the setup-pyreon composite action. Bootstrap saves under this key
#    after building lib/; downstream jobs restore under the same key for
#    an exact-match guaranteed-fresh artifact set. Same shape + composite-
#    action contract as pre-this-PR.
#
# 2. Source-hashed cross-run key — what the Bootstrap job ADDITIONALLY
#    saves under. Constructed at step level via hashFiles(...) because
#    that function isn't allowed in workflow-level `env:`. The Bootstrap
#    job FIRST tries to restore from this cross-run key; on EXACT match,
#    the build step skips entirely (saves ~236s). The save step writes
#    under BOTH keys so the source-hashed key is populated for future
#    cross-run hits AND the per-run-id key is populated for THIS run's
#    downstream jobs.
#
# The two-layer design preserves the existing downstream-job contract
# (composite action's `key: ${{ env.BOOTSTRAP_KEY }}` works unchanged)
# while adding cross-run reuse for the source-stable case.
env:
  # NM_KEY is gone (2026-06-11): node_modules is content-keyed by lockfile
  # hash, computed inside the setup-pyreon composite. Only lib/ keeps a
  # per-run key (source changes every push, so the per-run artifact is the
  # only exact one) — and the composite degrades through the source-hashed
  # + prefix restore-keys with a rebuild fallback when it's not visible.
  BOOTSTRAP_KEY: bootstrap-${{ github.run_id }}

jobs:
  # ── Install: checkout + install + bootstrap, then save caches ───────────
  # Downstream jobs restore these caches by run_id — guaranteed fresh,
  # no stale restore-keys matches, no redundant bun install calls.
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Shallow checkout — Install needs only the working tree (bun.lock +
      # package.json set). The affected-filter computation that used to
      # require full history here was dead weight: every consumer (cells,
      # changes) computes its own; the `affected-filter` output had ZERO
      # readers. Removed 2026-07 (queue-contention optimization pass).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      # P1b — cache bun's global package-tarball cache (`~/.bun/install/cache`).
      # When the lockfile-keyed node_modules restore misses (new bun.lock hash,
      # fresh runner), `bun install --frozen-lockfile` extracts tarballs from
      # this cache. Without it bun re-fetches every package from npm registry —
      # ~30-90s on cold starts. Content-addressed by tarball hash, safe to
      # share cross-run AND cross-PR.
      - name: Cache bun install cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.bun/install/cache
          key: bun-install-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-install-cache-${{ runner.os }}-
      # Try to restore a previous lockfile-matched cache (fast path)
      - name: Restore node_modules
        id: nm-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      # P3c — skip the postinstall lib/ build. The Install job now does
      # ONLY `bun install --frozen-lockfile` (~60s) so lib-free downstream
      # jobs (typecheck, lint, test, coverage, audit-types, etc.) unblock
      # ~150s sooner. The separate `bootstrap` job below runs the build
      # and gates lib-needing jobs (build, verify-modes, e2e-*,
      # check-bundle-budgets, scaffold-smoke, check-distribution).
      # PYREON_BOOTSTRAP_SKIP=1 makes bootstrap.ts a no-op (exit 0 before
      # any work). Local-dev installs deliberately keep the build because
      # devs want `bun run dev` to work immediately.
      - run: PYREON_BOOTSTRAP_SKIP=1 bun install --frozen-lockfile
      # Save under the lockfile hash — the ONLY node_modules key now.
      # The per-run-id save was dropped in the 2026-06-11 root-cause fix:
      # node_modules is fully determined by the lockfile, so the content
      # key IS exact; the run-id copy added a same-run cache-propagation
      # dependency (randomly invisible to same-run readers during cache-
      # service degradation) plus ~317MB of quota churn per run.
      - name: Save node_modules (lockfile key)
        if: steps.nm-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

  # ── Bootstrap (P3c): builds lib/ separately from Install ──────────────
  # Restores node_modules from the Install job (per-run cache), runs
  # `bun scripts/bootstrap.ts` (which does the workspace-wide build of
  # lib/*), saves the lib/ cache for lib-needing downstream jobs.
  #
  # ## Why split this off
  #
  # Pre-P3c, Install ran `bun install` + the postinstall bootstrap in
  # one ~210s job. Every downstream job — INCLUDING lib-free ones like
  # typecheck, lint, test — waited the full 210s to start. The build
  # step (~150s) accounts for ~70% of that wait.
  #
  # Post-P3c, Install does ONLY `bun install` (~60s). Lib-free jobs
  # need only `install`, so they start ~150s sooner. Lib-needing jobs
  # need `bootstrap` (which itself needs `install`), so their start
  # time is roughly unchanged (~210s = 60s install + 150s bootstrap)
  # but the critical path for the COMMON case (PRs only need a subset
  # of lib-needing jobs) is dominated by the now-faster lib-free path.
  #
  # ## Cross-run lib/ caching deliberately disabled
  #
  # We DON'T restore a previous-run lib/ here for the same reason the
  # pre-P3c Install job didn't: rolldown's chunk filenames are
  # content-hashed, and a stale lib/ that nominally matches current
  # source might reference chunk filenames that no longer exist
  # (dropped files, divergent chunk-split decisions between runs).
  # Save under the per-run key only so downstream jobs in THIS run get
  # exactly the lib/ that THIS run's bootstrap produced.
  bootstrap:
    name: Bootstrap
    # Skip the ~210s lib/ build when NOTHING is affected — a pure-prose docs PR
    # (CLAUDE.md, a README). Gated on `affected` (NOT `code`): a doc-INPUT change
    # (anti-patterns.md → @pyreon/mcp) is code=false but affected=true, and
    # test-cell then needs lib/, so bootstrap must run. Every lib/ consumer
    # (test-cell, build, verify-modes, budgets, distribution, browser/rust,
    # e2e, scaffold) is gated on `affected`/`code` or its own decide, so nothing
    # downstream needs lib/ when this skips. Fail-closed: also runs if `changes`
    # itself failed.
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.affected == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Composite restores node_modules (default) from Install's per-run
      # cache. We disable bootstrap restore because the cache doesn't
      # exist yet — THIS job populates it.
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      # Layer 2: source-hashed cross-run cache + content-hash INCREMENTAL
      # rebuild. On an EXACT key hit (no package source changed since a prior
      # run) the Build step is a no-op (~3s vs ~236s). On a prefix
      # (restore-keys) hit — some source changed — the NEAREST prior lib/ +
      # its manifest are restored, and `scripts/bootstrap.ts` content-hashes
      # each package and rebuilds ONLY the changed ones (~15-30s for a 1-2
      # package PR vs a ~236s cold build). The `.bootstrap-cache.json`
      # manifest (per-package source hashes) travels WITH lib/ in the same
      # cache entry, so the restored lib/ and the hashes that describe it
      # are always consistent.
      #
      # restore-keys is SAFE here (it was NOT under the old mtime detection):
      # bootstrap.ts now decides rebuilds by SOURCE CONTENT HASH, not mtime,
      # so a prefix-restored (older-source) lib/ never looks falsely-fresh —
      # every changed package is rebuilt in full (consistent chunks) and
      # unchanged packages keep their hash-verified lib/. Workspace deps are
      # externalized (JS) / referenced (DTS), so there is no cross-package
      # chunk staleness when only a subset rebuilds.
      #
      # hashFiles(...) is inlined — GHA disallows it in workflow-level
      # `env:`. Keep inputs in sync between this restore and the saves below.
      - name: Restore source-hashed lib/ cache (+ incremental manifest)
        id: bootstrap-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            packages/*/*/lib
            .bootstrap-cache.json
          key: bootstrap-ubuntu-${{ hashFiles('packages/*/*/src/**', 'packages/*/*/package.json', 'packages/*/*/tsconfig.json', 'tsconfig.json', 'scripts/bootstrap.ts', 'bun.lock') }}
          restore-keys: |
            bootstrap-ubuntu-
      # Build on any non-exact-hit. On an exact hit nothing changed → skip.
      # Otherwise bootstrap.ts runs and incrementally rebuilds only the
      # packages whose content hash differs from the restored manifest
      # (full cold build when there was no prefix match to restore).
      - name: Build lib/ (incremental)
        if: steps.bootstrap-cache.outputs.cache-hit != 'true'
        run: bun scripts/bootstrap.ts
      - name: Cache-hit summary
        run: |
          if [ "${{ steps.bootstrap-cache.outputs.cache-hit }}" = "true" ]; then
            echo "::notice title=Bootstrap cache hit::source-hashed cache hit — skipped ~236s of build"
          else
            echo "::notice title=Bootstrap cache miss::source changed since last cached build — rebuilt lib/"
          fi
      # Save under the source-hashed key (cross-run reuse). Only when
      # we just BUILT (no point re-saving identical bytes on cache-hit).
      - name: Save source-hashed lib/ cache for next runs
        if: steps.bootstrap-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Save the manifest alongside lib/ so the next run's restore gets
          # the per-package hashes that describe exactly this lib/.
          path: |
            packages/*/*/lib
            .bootstrap-cache.json
          # Key MUST match the restore step above — keep in sync.
          key: bootstrap-ubuntu-${{ hashFiles('packages/*/*/src/**', 'packages/*/*/package.json', 'packages/*/*/tsconfig.json', 'tsconfig.json', 'scripts/bootstrap.ts', 'bun.lock') }}
      # Layer 1: per-run-id key. ALWAYS save under this key (whether the
      # build ran or the source-hashed cache hit). Every downstream job
      # in this run (test, e2e, verify-modes, etc.) restores lib/ via
      # the setup-pyreon composite action's `key: ${{ env.BOOTSTRAP_KEY }}`.
      # This preserves the per-run-id contract pre-this-PR — downstream
      # jobs see the same lib/ they always have, no composite-action edits
      # needed.
      - name: Save lib/ under per-run-id key for downstream jobs
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/*/*/lib
          key: ${{ env.BOOTSTRAP_KEY }}

  # ── Shared setup anchor (YAML anchor not supported, so we repeat) ───────
  # Every downstream job: checkout → setup-bun → restore run_id caches.
  # No bun install needed — caches are guaranteed fresh from Install job.

  # ── Typecheck: per-category matrix (P3b) ─────────────────────────────
  # Sharded by `packages/<category>/` (8 cells in parallel). Each cell
  # narrows the affected-filter to its own slice via
  # `scripts/affected.ts --category=<name>`; cells with no affected
  # packages in their category skip gracefully (empty filter = no-op).
  # Aggregator `typecheck` job (next) keeps the stable `Typecheck`
  # required check name for branch protection.
  #
  # Why shard: pre-P3b Typecheck ran `bun run $FILTER --sequential
  # typecheck` against EVERY affected package on one runner (~270s
  # median for full-suite runs because we must run sequentially to
  # avoid 7+ heavy tsc invocations OOM-killing the 7GB runner). Sharding
  # parallelizes across runners — per-cell wall-clock = ~max-of-category
  # (90-120s typical) instead of the full sum. Critical-path drop
  # ~150-180s.
  #
  # Why 8 cells (not 5 as the plan first sketched): every `packages/*`
  # category is its own cell — including `internals` (4 pkgs), `ui` (3
  # private), `native` (6, newer ios/android stuff). The matrix infra
  # cost is per-cell startup overhead (~30s composite restore); going
  # 5→8 cells adds ~3 runners but each finishes in ~30-60s anyway
  # because every cell carries fewer packages. Smaller cells also fit
  # under the 10min job timeout with comfortable margin on the OOM-
  # sensitive `--sequential` path.
  typecheck-cell:
    name: typecheck (${{ matrix.category }})
    # DYNAMIC matrix (2026-07): only categories with affected packages spawn a
    # cell — `changes` computes the list with the SAME script+base each cell
    # uses, so the spawn decision and the cell's own filter can never disagree.
    # Pre-change all 9 cells booted a runner on every PR and most self-skipped
    # via an empty filter (~30–60s of queue+checkout+setup per no-op). The
    # `typecheck` aggregator treats a skipped/empty matrix as a pass.
    # Fail-closed twice over: if `changes` failed, the failure() arm runs the
    # cells AND the `|| full-list` matrix fallback spawns every category.
    # `examples` is a pseudo-category (affected.ts maps it to the top-level
    # examples/ dir) — example type regressions were invisible to CI before it.
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.typecheck-has == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        category: ${{ fromJSON(needs.changes.outputs.typecheck-matrix || '["core","fundamentals","internals","native","tools","ui","ui-system","zero","examples"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # affected.ts needs the merge-base to compute a real diff;
          # the install job uses fetch-depth: 0 for the same reason.
          fetch-depth: 0
      - uses: ./.github/actions/setup-pyreon
        with:
          # P3c — typecheck reads src/ via the bun customCondition (root
          # tsconfig.json line 8); lib/ is not needed. Skipping the
          # bootstrap restore lets typecheck start as soon as Install
          # finishes (~60s) instead of waiting for Bootstrap (~210s).
          restore-bootstrap: 'false'
      - name: Run typecheck (${{ matrix.category }})
        run: |
          # Recompute the filter per-cell with --category narrowing.
          # We DON'T reuse install.outputs.affected-filter because it
          # spans every category; per-cell we need only this slice.
          # The script's closure is still computed against the full dep
          # graph (a @pyreon/core change still expands to every
          # dependent), but the final emit drops anything outside the
          # cell's category.
          #
          # The `examples` pseudo-category maps to the top-level examples/
          # dir; every other category maps to packages/<cat>/.
          if [ "${{ matrix.category }}" = "examples" ]; then
            CATEGORY_GLOB="./examples/*"
          else
            CATEGORY_GLOB="./packages/${{ matrix.category }}/*"
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" || true
            FILTER=$(bun run scripts/affected.ts \
              --base=origin/${{ github.base_ref }} \
              --category=${{ matrix.category }})
            # Root-file change in a PR returns --filter=* from the
            # script (the only safe escalation when blast radius is
            # unknowable). At the cell level we translate that to the
            # category-scoped glob so each cell runs its OWN full
            # slice — otherwise every cell would run every package and
            # we'd lose the shard entirely.
            if [ "$FILTER" = "--filter=*" ]; then
              FILTER="--filter=$CATEGORY_GLOB"
            fi
          else
            # push:main + merge_group always run the full slice for
            # this category — the gate that protects main never
            # trusts the narrowing.
            FILTER="--filter=$CATEGORY_GLOB"
          fi
          if [ -z "$FILTER" ]; then
            echo "No affected packages in this category — skipping."
            exit 0
          fi
          echo "Cell filter: $FILTER"
          set -f
          # --sequential caps simultaneous memory at the largest
          # single tsc invocation (~775 MB for app-showcase, ~583 MB
          # for fundamentals-playground — the heaviest are the example
          # apps, now covered by the `examples` cell). --sequential keeps
          # per-cell peak memory at one tsc at a time.
          bun run $FILTER --sequential typecheck

  typecheck:
    name: Typecheck
    needs: typecheck-cell
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Aggregate typecheck matrix result
        run: |
          RESULT='${{ needs.typecheck-cell.result }}'
          echo "typecheck-cell=$RESULT"
          # `success` = every cell passed (or self-skipped via empty filter,
          # which exits 0). `skipped` = the whole matrix was `if:`-gated off
          # because nothing is affected (a pure-prose docs PR) — a pass, not a
          # regression. Anything else (failure/cancelled) = fail.
          if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
            echo "All typecheck cells passed (or skipped: nothing affected)."
            exit 0
          fi
          echo "::error::One or more typecheck cells failed ($RESULT)"
          exit 1

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Run lint
        run: bun run lint
      - name: Enforce pyreon/require-browser-smoke-test
        run: bun run lint:browser-smoke

  # ── Changes: did this PR touch anything beyond pure docs? ────────────
  # Layer-2 heavy-job gate. A PR that changes ONLY docs/markdown (CLAUDE.md,
  # READMEs, docs/**, .claude/**, llms*.txt) cannot affect any build/test
  # output, so the expensive always-run jobs (build, verify-modes, coverage,
  # browser/rust tests, audit-types, bundle/import budgets, distribution,
  # client-bundle-node-imports, manifest-depth, pyreon-lint-gate) gate on
  # `code == 'true'` and SKIP — a docs PR then runs only the fast gates
  # (lint, doc-claims, docs-sync, changeset, secrets-scan, …).
  #
  # CONSERVATIVE by construction (scripts/affected.ts:isDocsOnlyChange): any
  # non-docs path → code=true; a null/unknowable diff → code=true; push:main
  # + merge_group → code=true (the gate that protects main never trusts the
  # narrowing). A skipped required check reports as SUCCESS to branch
  # protection (same mechanism `e2e-suite` / `scaffold-smoke-cell` rely on),
  # so a docs PR is mergeable with the heavy jobs skipped.
  #
  # The per-category test/typecheck cells + e2e suites ARE gated here since
  # 2026-07 — via DYNAMIC matrices (only affected categories/suites spawn a
  # runner), not the old boot-then-self-skip shape. Their aggregators treat
  # a skipped/empty matrix as a pass, with fail-closed fallbacks (a failed
  # `changes` spawns the FULL cell matrices and reds the e2e/scaffold
  # aggregators).
  changes:
    name: Changes (decide)
    # NO `needs:` — deliberately. This job uses ONLY git + bun (the affected
    # scripts import nothing from node_modules — proven by the pre-2026-07
    # `changes`/`e2e-decide` jobs, which ran them for months with no
    # node_modules restore). The old `needs: install` edge was pure DAG
    # waste: under runner-queue contention (the measured PR-CI bottleneck —
    # 11,076s of summed queue wait vs 2,050s of summed work on a typical
    # run) every `needs` level costs a fresh 1–5 min queue round, and
    # `changes` gates bootstrap + every cell matrix. Starting it at t=0
    # moves the ENTIRE lib tier up by ~4–6 min.
    #
    # This is THE single decide job (2026-07 consolidation): it absorbed
    # `E2E (decide)`, `Scaffold Smoke (decide)`, and the bootstrap-exit-codes
    # relevance detection — three always-booted runners whose work is a few
    # seconds of git/bun each. Fewer jobs = fewer queue slots = less
    # self-inflicted starvation when parallel sessions push PRs concurrently.
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # Skip signals, all fail-closed (an error → the full set runs):
    #   • code     = a non-docs source file changed. Gates the READ-NOTHING
    #                heavy jobs (build, verify-modes, coverage, browser/rust,
    #                audit-types, budgets, distribution, manifest-depth,
    #                pyreon-lint-gate, client-bundle) — they never read docs.
    #   • affected = ANY workspace is affected, INCLUDING a doc-INPUT change
    #                mapped to its consuming package (anti-patterns.md +
    #                docs/patterns/** → @pyreon/mcp, whose tests PARSE them).
    #                Gates bootstrap.
    #   • typecheck-matrix / test-matrix = the per-category cell lists.
    #                Pre-consolidation EVERY cell booted a runner (9+9 jobs)
    #                and self-skipped via an empty filter — paying ~30–60s of
    #                checkout+setup+queue per no-op. Now only categories with
    #                affected packages spawn a cell (e2e-decide's proven
    #                dynamic-matrix pattern). Cells still compute their OWN
    #                narrow filter — the matrix only decides SPAWNING.
    #   • e2e-matrix / scaffold-has / bootstrap-exit-codes = moved verbatim
    #                from the deleted decide jobs.
    # They diverge exactly on a doc-INPUT change (code=false, affected=true). A
    # pure-prose docs PR is code=false AND affected=false → everything heavy
    # skips, only the fast gates run.
    outputs:
      code: ${{ steps.detect.outputs.code }}
      affected: ${{ steps.detect.outputs.affected }}
      typecheck-matrix: ${{ steps.matrices.outputs.typecheck }}
      typecheck-has: ${{ steps.matrices.outputs.typecheck-has }}
      test-matrix: ${{ steps.matrices.outputs.test }}
      test-has: ${{ steps.matrices.outputs.test-has }}
      e2e-matrix: ${{ steps.e2e.outputs.matrix }}
      e2e-has: ${{ steps.e2e.outputs.has }}
      scaffold-has: ${{ steps.scaffold.outputs.has }}
      bootstrap-exit-codes: ${{ steps.bexit.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Detect changes (code + affected)
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "affected=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR event (${{ github.event_name }}) → code=true, affected=true (full run)."
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}" || true
          BASE="origin/${{ github.base_ref }}"
          # Fail-closed: ONLY a clean "false" narrows the run. Any other value
          # (empty output, a non-zero affected.ts exit, an unexpected string)
          # defaults to `true` → run the full set. A skipped heavy job reports
          # success to branch protection, so a mis-detection must never silently
          # disable the required checks.
          CODE=$(bun run scripts/affected.ts --code-changed --base="$BASE") || CODE=true
          if [ "$CODE" != "false" ]; then CODE=true; fi
          AFFECTED=$(bun run scripts/affected.ts --has-affected --base="$BASE") || AFFECTED=true
          if [ "$AFFECTED" != "false" ]; then AFFECTED=true; fi
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "affected=$AFFECTED" >> "$GITHUB_OUTPUT"
          echo "Code (non-docs) changed: $CODE | Any package affected: $AFFECTED"
      - name: Compute typecheck/test cell matrices
        id: matrices
        run: |
          # Category lists MUST mirror the cells' own case statements below.
          # The two `native-*` test entries are PSEUDO-categories splitting
          # packages/native/ across two runners (see test-cell's timeout
          # comment); their affected-args mirror the cell exactly so the
          # decide verdict and the cell's own filter can never disagree
          # (same script, same base, deterministic).
          TC_ALL='["core","fundamentals","internals","native","tools","ui","ui-system","zero","examples"]'
          TEST_ALL='["core","fundamentals","internals","native-compiler","native-rest","tools","ui","ui-system","zero"]'
          emit() { # emit <prefix> <json>
            echo "$1=$2" >> "$GITHUB_OUTPUT"
            if [ "$2" = "[]" ]; then echo "$1-has=false" >> "$GITHUB_OUTPUT"; else echo "$1-has=true" >> "$GITHUB_OUTPUT"; fi
            echo "$1 matrix: $2"
          }
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            emit typecheck "$TC_ALL"
            emit test "$TEST_ALL"
            exit 0
          fi
          BASE="origin/${{ github.base_ref }}"
          # pick <output-prefix> <full-json> <cat>:<affected-args>...
          # Fail-closed: any affected.ts error, or a root-file `--filter=*`
          # verdict, emits the FULL list — never a silently-narrowed one.
          pick() {
            local prefix="$1" full="$2"; shift 2
            local list="" cat args out
            for spec in "$@"; do
              cat="${spec%%:*}"; args="${spec#*:}"
              # shellcheck disable=SC2086
              if ! out=$(bun run scripts/affected.ts --base="$BASE" $args); then
                echo "affected.ts failed for $cat — fail-closed to full $prefix matrix"
                emit "$prefix" "$full"; return 0
              fi
              if [ "$out" = "--filter=*" ]; then
                echo "root-file change — full $prefix matrix"
                emit "$prefix" "$full"; return 0
              fi
              [ -n "$out" ] && list="$list\"$cat\","
            done
            emit "$prefix" "[${list%,}]"
          }
          pick typecheck "$TC_ALL" \
            "core:--category=core" "fundamentals:--category=fundamentals" \
            "internals:--category=internals" "native:--category=native" \
            "tools:--category=tools" "ui:--category=ui" \
            "ui-system:--category=ui-system" "zero:--category=zero" \
            "examples:--category=examples"
          pick test "$TEST_ALL" \
            "core:--category=core" "fundamentals:--category=fundamentals" \
            "internals:--category=internals" \
            "native-compiler:--category=native/compiler" \
            "native-rest:--category=native --exclude=native/compiler" \
            "tools:--category=tools" "ui:--category=ui" \
            "ui-system:--category=ui-system" "zero:--category=zero"
      - name: Select affected e2e suites
        id: e2e
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MATRIX=$(bun run scripts/e2e-affected.ts --base=origin/${{ github.base_ref }})
          else
            MATRIX=$(bun run scripts/e2e-affected.ts --all)
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          if [ "$MATRIX" = "[]" ]; then
            echo "has=false" >> "$GITHUB_OUTPUT"
          else
            echo "has=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Selected e2e matrix: $MATRIX"
      - name: Detect scaffold-relevant changes
        id: scaffold
        run: |
          # Non-PR triggers always run the full matrix — main / merge_group
          # is the protected path. Per-suite skipping is a PR-only opt.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "has=true" >> "$GITHUB_OUTPUT"
            echo "Full scaffold matrix forced (event: ${{ github.event_name }})"
            exit 0
          fi
          BASE="origin/${{ github.base_ref }}"
          # Changed files (handles fetch failures cleanly — fall back to
          # running the matrix if we can't determine the diff).
          if ! CHANGED=$(git diff --name-only "$BASE"...HEAD 2>/dev/null); then
            echo "has=true" >> "$GITHUB_OUTPUT"
            echo "Could not determine changes — running full matrix (safety)"
            exit 0
          fi
          # Scaffold-relevant paths: the templates, the scaffolder, the
          # CLI, the zero runtime (which templates depend on), and the
          # test driver + workflow itself. Generous superset — false
          # positives are fine; false negatives would skip a real bug.
          TRIGGERS=$(cat <<'EOF'
          packages/zero/zero/
          packages/zero/zero-cli/
          packages/zero/create-zero/
          packages/zero/meta/
          packages/core/
          scripts/scaffold-smoke.ts
          scripts/affected.ts
          .github/workflows/ci.yml
          bun.lock
          package.json
          EOF
          )
          HAS=false
          while IFS= read -r prefix; do
            if echo "$CHANGED" | grep -qE "^$prefix"; then
              HAS=true
              echo "Matched trigger: $prefix"
              break
            fi
          done <<< "$TRIGGERS"
          echo "has=$HAS" >> "$GITHUB_OUTPUT"
          if [ "$HAS" = "false" ]; then
            echo "No scaffold-relevant changes — skipping matrix (saves ~265s/cell)"
          fi
      - name: Detect whether bootstrap-exit-codes inputs changed
        id: bexit
        run: |
          # push:main / merge_group always run.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Full run forced (event: ${{ github.event_name }})"
            exit 0
          fi
          BASE="origin/${{ github.base_ref }}"
          if ! CHANGED=$(git diff --name-only "$BASE"...HEAD 2>/dev/null); then
            # Couldn't determine diff — safe default = run.
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RELEVANT=false
          for prefix in \
            scripts/bootstrap.ts \
            scripts/install-git-hooks.ts \
            packages/internals/test-utils/src/tests/bootstrap-exit-codes.test.ts \
            .github/workflows/ci.yml; do
            if echo "$CHANGED" | grep -qE "^$prefix"; then
              RELEVANT=true
              echo "Matched trigger: $prefix"
              break
            fi
          done
          echo "run=$RELEVANT" >> "$GITHUB_OUTPUT"
          if [ "$RELEVANT" = "false" ]; then
            echo "No bootstrap.ts changes — bootstrap-exit-codes job will skip (saves ~190s)"
          fi

  # ── Test: per-category matrix (P3b) ──────────────────────────────────
  # Same shard shape as `typecheck-cell` above (8 cells, per-category).
  # Aggregator `test` job (next) keeps the stable `Test` required check
  # name for branch protection. See `typecheck-cell` comment for shard
  # rationale.
  #
  # P3c re-classification: needs `bootstrap`, not `install`. Most tests
  # use the bun condition → src/, but TWO classes of test legitimately
  # need lib/: bundle-size tests (`@pyreon/charts/src/tests/bundle-size`)
  # measure the BUILT lib/ in bytes, and tests that boot a nested Vite
  # SSR build at test time (`@pyreon/vite-plugin/src/tests/rocketstyle-
  # collapse`) hit Vite's hardcoded node-condition resolver which
  # requires lib/ for @pyreon/vite-plugin itself. Both surfaced as
  # `test (tools)` + `test (fundamentals)` failures on the first P3c
  # CI run; flipping back to `bootstrap` is the safe fix. Lib-free
  # tests still benefit indirectly — they run faster within the cell
  # because Install is now ~60s instead of ~210s, freeing the runner
  # pool sooner for everything downstream.
  test-cell:
    name: test (${{ matrix.category }})
    # Cost gate: also depend on `lint` (fast, deterministic, needs only
    # install — it finishes before bootstrap on every green run, so it adds
    # zero latency). When lint fails, the expensive matrix SKIPS via the
    # failure() arm requiring changes.result != 'success' (false when lint,
    # not changes, failed). Safe-by-invariant: lint ALWAYS reports, so a
    # green run never blocks on a skipped required check. The same
    # `[bootstrap, lint, changes]` gate is applied to every other
    # lib-needing expensive job below.
    # Dynamic matrix (see typecheck-cell): only categories with affected
    # packages spawn — the doc-INPUT mapping is preserved because `changes`
    # uses the same affected.ts (anti-patterns.md / docs/patterns/** →
    # @pyreon/mcp → the `tools` cell spawns and runs its parser test). The
    # `test` aggregator treats a skipped/empty matrix as a pass.
    # 2026-07 queue-contention pass: the `typecheck` needs-edge is GONE. It
    # routed every test cell through install → typecheck-cell → typecheck
    # (aggregator) → test-cell = FOUR queue rounds before a test started
    # (measured: test cells started at t≈1050–1175s with 180–300s queue
    # each). Under runner starvation each DAG level costs 1–5 min of queue,
    # dwarfing the runner-spend the cost gate saved. `lint` stays as the
    # cheap cost gate — it finishes before bootstrap on every green run, so
    # it adds zero latency while still skipping the matrix on lint failures
    # (the common pre-push-catchable class). A typecheck failure no longer
    # skips tests; the merge is blocked by the required `Typecheck` check
    # regardless, so the only cost is some wasted runner time on a doomed
    # run — cheaper than taxing every green run with two extra queue rounds.
    needs: [bootstrap, lint, changes]
    if: ${{ (success() && needs.changes.outputs.test-has == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    # `native` used to be ONE cell carrying two unrelated heavy workloads, and
    # it kept getting timeout-CANCELLED — which fails the required `Test`
    # aggregator on PRs that never touched native. The first attempt at a fix
    # raised the cap 10 → 25 minutes; measurement shows why that only bought
    # time: on `main` the single cell runs 1357–1472s against the 1500s cap,
    # i.e. 2–10% headroom. A gate that close to its own limit is a coin flip,
    # and a coin-flip required gate is worse than no gate.
    #
    # `native/compiler` is ~75-85% of the pair's cost, and that cost is almost
    # entirely REAL TOOLCHAIN. `packages/native/compiler/src/validate.ts` shells
    # out via `execFileSync`, and the suite has 175 `validateSwift`/
    # `validateKotlin` call sites across 98 test files. Measured warm, per
    # invocation: `swiftc -parse` 5.2-5.7s, `kotlinc` 17.4s. 175 x ~15s ~= 2600s,
    # which accounts for the whole ~2800s of aggregate test CPU. On 4 vCPUs that
    # is ~700s + overhead; the cell is observed at 1276s. Consistent.
    #
    # Two plausible hypotheses that measurement killed, recorded so nobody pays
    # for them twice:
    #   - "The 21 chained `verify-kotlin.ts --service=` runs pay kotlinc startup
    #     21 times." They are 26% of the cell, and the JVM page-cache warms after
    #     the first (29s cold, then 2-4s). Optimising them targets the wrong 26%.
    #   - "native/compiler spawns no toolchain; `import 383s` is the lead."
    #     Both false. `--no-isolate` cuts import 383s -> 48s and wall-clock does
    #     not move (291s -> 294s): `tests`, not `import`, dominates.
    #
    # So neither cell can be made meaningfully faster by scheduling, and the
    # toolchain cost is irreducible without changing what the suite validates.
    # What WAS fixable: two unrelated heavy workloads shared one runner for no
    # reason but living in the same directory. Hence a runner each.
    #
    # The halves are `native/compiler` and `native` MINUS `native/compiler`
    # (see `filterByCategory`'s `exclude`), so their union is `native` BY
    # CONSTRUCTION — a newly-added `packages/native/<pkg>` joins the `-rest`
    # cell automatically rather than silently escaping CI.
    #
    # Observed after the split: `native-compiler` 1276s (85% of cap),
    # `native-rest` 191s (13%). Headroom on the critical path went from 2-10%
    # to 15%, and the Kotlin chain can no longer push the compiler over. 85% is
    # still thinner than a required gate deserves — the remaining lever is spawn
    # reduction (batch or cache `swiftc -parse` / `kotlinc`), NOT a cap tweak.
    # The cap therefore STAYS at 25 minutes: tightening it toward the observed
    # 1276s would just rebuild the cliff somewhere less visible.
    #
    # Non-native cells are vitest-only and keep the tight 10-minute cap so a
    # genuine hang there still fails fast.
    timeout-minutes: ${{ startsWith(matrix.category, 'native') && 25 || 10 }}
    strategy:
      fail-fast: false
      matrix:
        # Dynamic (see typecheck-cell): only affected categories spawn;
        # `|| full-list` fallback keeps a `changes` failure fail-closed.
        category: ${{ fromJSON(needs.changes.outputs.test-matrix || '["core","fundamentals","internals","native-compiler","native-rest","tools","ui","ui-system","zero"]') }}
    steps:
      # Pin Node — vitest's `#!/usr/bin/env node` shebang means tests
      # run under whatever Node is on PATH. Without this, ubuntu-latest's
      # baked-in Node (currently 20) runs vitest; developers on Node 22+
      # hit interactions (e.g. the happy-dom localStorage shim trap fixed
      # in vitest.setup.ts) that ubuntu's stale Node masks. Pinning to
      # active-LTS Node 24 makes the CI env reflect what modern consumers
      # use, so bugs surface in CI instead of only at pre-push.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-pyreon
        with:
          node-version: '24'
          # P3c — needs lib/ for bundle-size tests + nested-Vite-SSR
          # tests; default `restore-bootstrap: 'true'` is correct.
      - name: Run tests (${{ matrix.category }})
        # PYREON_SKIP_SLOW_TESTS=1 makes individual tests opt OUT of the
        # PR-time fast path. Today this skips `bootstrap-exit-codes.test.ts`
        # in test (internals) — which takes ~190s on CI due to 8 subprocess
        # spawns of bun + the bootstrap.ts walk. The contract is covered by
        # the dedicated `bootstrap-exit-codes` cell below, which runs WITHOUT
        # this env var when scripts/bootstrap.ts itself changes. push:main +
        # merge_group also run the full suite (no env var passed).
        env:
          PYREON_SKIP_SLOW_TESTS: ${{ github.event_name == 'pull_request' && '1' || '' }}
        run: |
          # Most cells map 1:1 onto `packages/<category>/`. The two `native-*`
          # cells are PSEUDO-categories splitting `packages/native/` across two
          # runners (see the timeout-minutes comment). Their `--exclude`/glob
          # complement is derived, never enumerated, so a new native package is
          # always covered by exactly one of them.
          case "${{ matrix.category }}" in
            native-compiler)
              AFFECTED_ARGS="--category=native/compiler"
              FULL_FILTER="--filter=./packages/native/compiler"
              ;;
            native-rest)
              AFFECTED_ARGS="--category=native --exclude=native/compiler"
              FULL_FILTER=$(for d in packages/native/*/; do
                d="${d%/}"
                [ "$d" = "packages/native/compiler" ] && continue
                printf -- '--filter=./%s ' "$d"
              done)
              ;;
            *)
              AFFECTED_ARGS="--category=${{ matrix.category }}"
              FULL_FILTER="--filter=./packages/${{ matrix.category }}/*"
              ;;
          esac
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" || true
            FILTER=$(bun run scripts/affected.ts \
              --base=origin/${{ github.base_ref }} \
              $AFFECTED_ARGS)
            if [ "$FILTER" = "--filter=*" ]; then
              FILTER="$FULL_FILTER"
            fi
          else
            FILTER="$FULL_FILTER"
          fi
          if [ -z "$FILTER" ]; then
            echo "No affected packages in this category — skipping."
            exit 0
          fi
          echo "Cell filter: $FILTER"
          set -f
          # Some affected packages genuinely have no `test` script (rare
          # under packages/* — most are zero-cli kind of shape — but
          # possible). When the affected filter matches only such
          # packages, bun errors with "No packages matched the filter"
          # and exits 1. Tolerate that case — fail on real test
          # failures only.
          set +e
          OUTPUT=$(bun run $FILTER test 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"
          if [ $EXIT -ne 0 ] && echo "$OUTPUT" | grep -q "No packages matched the filter"; then
            echo "(no matching packages have a 'test' script — treating as no-op)"
            exit 0
          fi
          exit $EXIT

  test:
    name: Test
    needs: test-cell
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Aggregate test matrix result
        run: |
          RESULT='${{ needs.test-cell.result }}'
          echo "test-cell=$RESULT"
          # `success` = every cell passed (or self-skipped via empty filter).
          # `skipped` = the whole matrix was `if:`-gated off because nothing is
          # affected (a pure-prose docs PR) — a pass, not a regression.
          if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
            echo "All test cells passed (or skipped: nothing affected)."
            exit 0
          fi
          echo "::error::One or more test cells failed ($RESULT)"
          exit 1

  # ── Dedicated cell for `bootstrap-exit-codes.test.ts` ──────────────────
  # That single test file spawns 8 bun subprocesses, each running the
  # full bootstrap.ts walk over ~80 packages. Locally this runs in ~5s;
  # on GHA's slower runners it took ~190s (entirely dominating `test
  # (internals)`'s ~196s wall-clock). The PR-time test (internals) job
  # now sets PYREON_SKIP_SLOW_TESTS=1 to skip this file; this dedicated
  # cell runs WITHOUT the env var, but ONLY when `scripts/bootstrap.ts`
  # itself can have changed — that's the only path that can regress the
  # exit-code contract this suite protects.
  #
  # push:main / merge_group always run (safety: main never merges without
  # the full contract validation).
  bootstrap-exit-codes:
    name: bootstrap-exit-codes
    # 2026-07: the relevance detection moved into `Changes (decide)` — this
    # job used to boot a runner on EVERY PR (checkout + setup + node 24,
    # ~21–31s) just to conclude "not relevant, skip" ~99% of the time. Now
    # the job itself skips (no runner) unless bootstrap.ts / the test / the
    # workflow changed. Fail-closed: a failed `changes` runs it.
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.bootstrap-exit-codes == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          node-version: '24'
          restore-bootstrap: 'false' # this test doesn't read lib/
      - name: Run bootstrap-exit-codes
        run: |
          bun run --filter='@pyreon/test-utils' test src/tests/bootstrap-exit-codes.test.ts

  test-browser:
    name: Test (browser)
    # P3c — same risk class as `test-cell`: any browser test that asserts
    # on built artifacts (lib/) needs Bootstrap. Conservatively gate on
    # bootstrap rather than chase per-test audits.
    # Cost gate (see test-cell): lint only — the typecheck edge was dropped
    # in the 2026-07 queue-contention pass (each extra DAG level = a queue
    # round under runner starvation).
    # Layer-2 gate: skip entirely on a docs-only PR (`changes.code == false`).
    needs: [bootstrap, lint, changes]
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          node-version: '24'
      - name: Cache Playwright browsers
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-chromium-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: |
          # The recurring e2e / Test(browser) "cancelled" flake is the Playwright
          # install hanging until the 15-min job timeout (the specs never run —
          # the whole budget burns in this step). TWO independent apt hangs cause
          # it, both addressed here:
          #   1. `apt-get update` hangs on GitHub's packages.microsoft.com apt
          #      sources (azure-cli + prod) when they 403 → strip them first.
          #   2. The `apt-get install` of the OS deps hangs FETCHING the ~21 MB of
          #      .deb archives from GitHub's apt mirror (observed: 14 min stuck at
          #      "Need to get 21.1 MB" before cancellation).
          # ubuntu-latest already ships Chromium's core libs, so the OS-dep install
          # is best-effort + hard-timeout-bounded + non-fatal; the browser binary
          # (from Playwright's own CDN, which never hangs) is what matters and is
          # ALWAYS installed.
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f || true
          timeout 240 bunx playwright install-deps chromium || echo "::warning::playwright install-deps timed out or failed — relying on the runner's preinstalled Chromium libs"
          bunx playwright install chromium
      - run: bun run test:browser

  # ── Test (Rust binary): cross-backend equivalence gate ───────────────
  # Builds the @pyreon/compiler Rust napi-rs binary and runs the compiler
  # test suite with it loaded. The cross-backend equivalence harness
  # (235 patterns) auto-detects the binary's presence and asserts every
  # JS-path output matches the Rust-path output. Without this job, only
  # the JS fallback is exercised in CI — which is exactly what shipped the
  # 6 divergences caught in Phase 1 (#491). Locks the Rust path against
  # silent regressions going forward.
  test-rust-binary:
    name: Test (Rust binary)
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Composite handles checkout + bun + node + NM/bootstrap cache restore;
      # rust toolchain + cargo caches stay manual (specific ordering needs).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          node-version: '24'
          # P3c — @pyreon/compiler tests resolve via the bun condition
          # (its own src/), and the rust binary is built in this job
          # below. Other packages' lib/ is not needed.
          restore-bootstrap: 'false'
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master — pinned (OpenSSF Pinned-Dependencies)
        with:
          toolchain: stable
      - name: Cache cargo registry
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('packages/core/compiler/native/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-
      # P1c — cache cargo `target/` (compiled artifacts), keyed by Cargo.lock
      # + every Rust source file under native/src. Cargo's content hashing
      # invalidates correctly on source change; the cache only hits when the
      # exact compiled output is reproducible. Saves ~2-3 min on common case
      # where compiler source is unchanged (vast majority of CI runs).
      - name: Cache cargo target/
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: packages/core/compiler/native/target
          key: cargo-target-${{ runner.os }}-${{ hashFiles('packages/core/compiler/native/Cargo.lock', 'packages/core/compiler/native/src/**/*.rs') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ hashFiles('packages/core/compiler/native/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-
      - name: Build native binary
        run: bun run --filter='@pyreon/compiler' build:native
      - name: Assert binary present
        # Soft-fail in build-native.ts means cargo trouble silently routes
        # consumers to JS. CI's job is the opposite — fail loudly so the
        # gate can never erode to "JS-only ran, equivalence checks
        # silently skipped."
        run: |
          BIN=packages/core/compiler/native/pyreon-compiler.node
          if [ ! -f "$BIN" ]; then
            echo "::error::Native binary missing at $BIN. Cargo build failed silently (build-native.ts soft-fails). The Rust equivalence gate cannot run without it."
            exit 1
          fi
          echo "Binary OK: $(ls -la $BIN)"
      - name: Run @pyreon/compiler tests against Rust binary
        run: bun run --filter='@pyreon/compiler' test

  # ── E2E: real-Chromium app-level tests against example apps ──────────
  # Parallel, flake-resilient matrix. Before 2026-05 this was ONE runner
  # executing 11 suites SEQUENTIALLY — wall-clock = the SUM (~6-10 min),
  # and a flake in suite N skipped every suite after it (an unrelated
  # storage-hydration flake once skipped the whole zero-hmr gate). Now:
  #
  #  • `e2e-decide` maps the PR's changed paths → only the suites those
  #    changes can affect (scripts/e2e-affected.ts). push:main and
  #    merge_group always run ALL — the gate protecting main never
  #    trusts the narrowing; false-negatives are the only real danger.
  #  • `e2e-suite` is a `fail-fast: false` matrix — every suite is its
  #    own parallel job + own check. One suite's flake/failure cannot
  #    skip or cancel another. Wall-clock ≈ the slowest single suite.
  #  • Every playwright*.config.ts uses `retries: process.env.CI ? 2 : 0`
  #    so a flaky spec self-heals within its job (3 attempts); a real
  #    bug fails all 3. Local stays 0 for honest, fast feedback.
  #  • `e2e` (THIS exact check name) is the STABLE required check: it
  #    aggregates the matrix so branch-protection's "E2E" requirement
  #    keeps working no matter which / how many matrix jobs ran, and an
  #    empty matrix (docs-only PR) resolves as a green skip.
  e2e-suite:
    name: e2e (${{ matrix.name }})
    # P3c — e2e suites boot example apps via `vite preview` / `vite build`
    # which resolves @pyreon/* via the node condition → lib/. Needs Bootstrap.
    # Suite selection comes from the consolidated `Changes (decide)` job
    # (the standalone `E2E (decide)` runner was folded into it, 2026-07).
    # Cost gate (see test-cell): lint only (typecheck edge dropped).
    # Fail-closed: a failed `changes` leaves e2e-has empty → suites skip →
    # the `e2e` AGGREGATOR fails (it requires changes.result == success),
    # so the required E2E check goes red rather than green-via-skip.
    needs: [bootstrap, lint, changes]
    if: needs.changes.outputs.e2e-has == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.e2e-matrix || '[]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      - name: Cache Playwright browsers
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-chromium-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: |
          # The recurring e2e / Test(browser) "cancelled" flake is the Playwright
          # install hanging until the 15-min job timeout (the specs never run —
          # the whole budget burns in this step). TWO independent apt hangs cause
          # it, both addressed here:
          #   1. `apt-get update` hangs on GitHub's packages.microsoft.com apt
          #      sources (azure-cli + prod) when they 403 → strip them first.
          #   2. The `apt-get install` of the OS deps hangs FETCHING the ~21 MB of
          #      .deb archives from GitHub's apt mirror (observed: 14 min stuck at
          #      "Need to get 21.1 MB" before cancellation).
          # ubuntu-latest already ships Chromium's core libs, so the OS-dep install
          # is best-effort + hard-timeout-bounded + non-fatal; the browser binary
          # (from Playwright's own CDN, which never hangs) is what matters and is
          # ALWAYS installed.
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f || true
          timeout 240 bunx playwright install-deps chromium || echo "::warning::playwright install-deps timed out or failed — relying on the runner's preinstalled Chromium libs"
          bunx playwright install chromium
      - name: Run e2e — ${{ matrix.name }}
        # Tee the combined output so the next step can surface FLAKY
        # specs. `set -o pipefail` keeps Playwright's real exit code
        # through the pipe so a genuine failure still fails the job.
        run: |
          set -o pipefail
          bun run ${{ matrix.script }} 2>&1 | tee /tmp/e2e-out.txt
      - name: Surface flaky specs (passed only on retry)
        # `retries: 2` means a flaky spec self-heals → the job is green
        # and the flake is INVISIBLE. That hides a degrading spec. This
        # step turns "passed on retry" into a loud, durable signal: a
        # GitHub ::warning:: annotation + a job-summary block. It does
        # NOT fail the job (the retry already made it pass) — it makes
        # the flake impossible to ignore so the rate gets watched.
        if: always()
        run: |
          OUT=/tmp/e2e-out.txt
          [ -f "$OUT" ] || exit 0
          # Playwright's line/list reporter prints a final "  N flaky"
          # and lists each flaky title with a "(retry #N)" suffix.
          FLAKY=$(grep -E '[0-9]+ flaky' "$OUT" | grep -vE '\b0 flaky\b' || true)
          if [ -z "$FLAKY" ]; then
            echo "No flaky specs in suite '${{ matrix.name }}'."
            exit 0
          fi
          TITLES=$(grep -E '\(retry #[0-9]+\)' "$OUT" | sed 's/^[[:space:]]*//' | sort -u || true)
          echo "::warning title=Flaky e2e suite::'${{ matrix.name }}' had spec(s) that passed only on retry — $FLAKY"
          {
            echo "### ⚠️ Flaky specs in e2e suite \`${{ matrix.name }}\`"
            echo ""
            echo "Passed only after a retry (\`retries: 2\`). Green, but the flake rate should be watched / root-caused — not left to the retry mask."
            echo ""
            echo '```'
            echo "$FLAKY"
            [ -n "$TITLES" ] && { echo ""; echo "$TITLES"; }
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.name }}
          path: playwright-report/
          retention-days: 7

  # Stable required check. Aggregates the dynamic matrix so the
  # branch-protection "E2E" requirement keeps resolving regardless of
  # which suites the PR selected (or none, for a docs-only PR).
  e2e:
    name: E2E
    needs: [changes, e2e-suite]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Aggregate e2e matrix result
        run: |
          DECIDE='${{ needs.changes.result }}'
          SUITE='${{ needs.e2e-suite.result }}'
          HAS='${{ needs.changes.outputs.e2e-has }}'
          echo "changes=$DECIDE  e2e-suite=$SUITE  has=$HAS"
          if [ "$DECIDE" != "success" ]; then
            echo "::error::the changes (decide) job did not succeed ($DECIDE) — e2e suite selection is unknown"
            exit 1
          fi
          if [ "$HAS" != "true" ]; then
            echo "No e2e-relevant changes for this PR — matrix empty, green skip."
            exit 0
          fi
          if [ "$SUITE" = "success" ]; then
            echo "All selected e2e suites passed."
            exit 0
          fi
          echo "::error::One or more e2e suites failed (e2e-suite=$SUITE)"
          exit 1

  build:
    name: Build
    # P3c — `vite build` of examples resolves @pyreon/* via the node
    # condition → lib/. Needs Bootstrap.
    # Cost gate (see test-cell): skip when a fast deterministic check fails.
    # Layer-2 gate: skip entirely on a docs-only PR (`changes.code == false`).
    needs: [bootstrap, lint, changes] # typecheck edge dropped 2026-07 (queue-contention pass — see test-cell)
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      - name: Run build
        run: |
          # @pyreon/* packages are already built by install's bootstrap;
          # lib/ is restored from this run's cache above. The Build job
          # only verifies example app builds (which consume the restored
          # lib/). Including @pyreon/* in `bun run --filter=*` here would
          # race with the example builds: rolldown cleans lib/ before
          # rebuilding, and example apps reading lib/seo.js in parallel
          # hit a window where seo.js still references chunks that were
          # just deleted but not yet re-emitted → "Cannot find module".
          # Scope to examples/* to avoid the race.
          set -f
          bun run --filter='./examples/*' build

  # ── Coverage gate — split into floor (PR-fast) + full (push/merge_group) ──
  # P3a — pre-fix, Coverage ran the full per-package test suite with
  # --coverage instrumentation on EVERY PR (~200s). The actual coverage
  # numbers only matter when blocking main from regressing; the *floor*
  # config invariant (every package's vitest.config.ts threshold ≥ FLOOR
  # + drift detection on BELOW_FLOOR_EXEMPTIONS entries) is what's
  # actionable to a PR author at edit time. Splitting:
  #
  #  • `Coverage` (this job): floor-only, always runs, ~5s. Same name
  #    as before so branch protection keeps working — PRs now get a
  #    fast structural check instead of waiting 200s for actual
  #    numbers most PRs don't change.
  #  • `Coverage (Full)` (below): full test execution with coverage,
  #    runs on push:main + merge_group only. Main is never allowed to
  #    regress; merge_group acts as the final pre-merge safety check.
  #
  # Trade-off: a PR that drops a package's actual coverage from 92% to
  # 88% (still above the 90% floor of its vitest.config.ts threshold)
  # passes `Coverage` but fails `Coverage (Full)` at merge-queue time
  # — that's the documented safety policy. To opt INTO full coverage
  # on a specific PR, push the merge_group event manually or add a
  # `full-coverage` label (label-gating is a follow-up, not in this PR).
  coverage:
    name: Coverage
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false' # floor check reads vitest.config.ts only
      - name: Coverage floor + exemption drift check
        run: bun run coverage:floor

  coverage-full:
    name: Coverage (Full)
    # P3c — runs the full test suite, same lib/-requiring tests as
    # `test-cell`. Needs Bootstrap.
    #
    # Scoped to push:main + merge_group ONLY — NOT every PR. The original
    # "runs on every trigger" claim estimated ~30s added to PR CI; actual
    # CI measurement showed 262s (4.4 min) — 9× the estimate. That's a
    # 262s slice off the PR critical path for a check that only catches
    # numeric regressions main / merge_queue already gate on, and is
    # functionally duplicated for PR-visible feedback by the
    # `Coverage` floor gate (runs always, ~5s).
    #
    # Trade-off restored: a PR that drops a package's actual coverage from
    # 92% to 88% (still above the floor) passes `Coverage` but fails
    # `Coverage (Full)` at merge-queue time. Same safety as before; the
    # signal just lands at merge-time instead of PR-time.
    # Event-gated to push:main + merge_group only (never runs on PRs), so the
    # docs-only Layer-2 gate does not apply here — a code change always exists
    # by the time something lands on main.
    #
    # 2026-07 restoration: this job had gone red-on-arrival (12 packages below
    # their configured thresholds — coverage drifted under feature waves whose
    # tests live in the browser/e2e tier). A permanently-red safety net detects
    # nothing. Invariant since the restoration: every package's configured
    # thresholds sit AT/BELOW measured node-suite reality (ratchet up as tests
    # land, like lint-baseline); browser-covered files are coverageExclude'd /
    # v8-ignored from the node gate with per-site rationale. If this job goes
    # red, treat it as a REGRESSION to fix or an honest re-baseline to land
    # immediately — never leave it red (see anti-patterns.md "CI / Build Gate
    # Mistakes": a red-on-arrival gate is a dead gate).
    if: ${{ github.event_name == 'push' || github.event_name == 'merge_group' }}
    # Cost gate (see test-cell): skip when a fast deterministic check fails.
    needs: [bootstrap, lint] # typecheck edge dropped 2026-07 (queue-contention pass — see test-cell)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      - name: Run full per-package coverage
        run: bun run coverage

  # ── Audit Types: typed-but-unimplemented detector ─────────────────────
  # Runs `audit-types --all --strict` against the high-risk packages
  # (zero, router, core, server, runtime-server, vite-plugin) and FAILS
  # CI if any field is typed-but-unimplemented (zero non-type refs in
  # the owning package). Phase E2 triaged the original 3-finding
  # baseline: zero's duplicate `LoaderContext` was deleted (re-exports
  # router's), `RouteMeta.requiresAuth` and `NativeItem.__isNative` are
  # in `EXEMPT_FIELDS` with rationale (user-side convention + cross-
  # package brand respectively). New HIGH findings now block merge.
  # See scripts/audit-types.ts for the heuristic + EXEMPT_FIELDS /
  # EXEMPT_FILES escape hatches when a field genuinely doesn't fit the
  # in-package-by-name read pattern.
  audit-types:
    name: Audit Types
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Audit typed-but-unimplemented surfaces (strict)
        run: bun run audit-types --all --strict

  # ── Pyreon Lint Gate: the framework's OWN lint rules as a CI check ────
  # Runs `pyreon doctor --only lint --ci` over first-party
  # `packages/*/src` (the doctor lint gate's scope — examples, e2e, docs,
  # scripts, and test files are excluded; `.pyreonlintrc.json` exemptPaths
  # apply). Fails on ERROR-severity findings only; warnings + infos stay
  # advisory. This is the gate that would have caught the compat
  # `no-process-dev-gate` bug before it shipped — Pyreon's own rules
  # previously ran NOWHERE in CI (only `oxlint .` + `lint:browser-smoke`
  # did). Lib-free: the CLI + @pyreon/lint resolve via the `bun` condition
  # → src, so no bootstrap build is needed (needs: install only).
  # See packages/tools/cli/src/doctor/gates/lint.ts.
  pyreon-lint-gate:
    name: Pyreon Lint Gate
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Run Pyreon lint rules over framework source (error-gating)
        run: bun run lint:pyreon

  # ── Check bundle budgets: per-package main-entry size gate ────────────
  # Bundles each package's `lib/index.js` (workspace + peer-deps
  # externalized, dynamic-import chunks split out) and asserts the
  # gzipped main-entry size is ≤ the budget locked in
  # scripts/bundle-budgets.json. Catches regressions like "PR
  # accidentally moves heavy code out of a lazy chunk into the main
  # entry" before they ship to consumers. Lazy chunks (flow's elkjs,
  # document's PDF/DOCX renderers) are EXCLUDED from the main-entry
  # measurement by design — they only load on-demand.
  # See scripts/check-bundle-budgets.ts.
  check-bundle-budgets:
    name: Check Bundle Budgets
    # P3c — bundles `lib/index.js` of every published package via Bun.build.
    # Needs Bootstrap.
    # Cost gate (see test-cell): skip when a fast deterministic check fails.
    # Layer-2 gate: skip entirely on a docs-only PR (`changes.code == false`).
    needs: [bootstrap, lint, changes] # typecheck edge dropped 2026-07 (queue-contention pass — see test-cell)
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      - name: Verify each package main-entry within budget
        run: bun run check-bundle-budgets

  # ── Check import budgets: PER-IMPORT (minimal-import) bundle gate ─────
  # Sibling of check-bundle-budgets. That gate measures each package's
  # FULL barrel; this one locks the gzipped size of the CANONICAL MINIMAL
  # IMPORTS real apps write (`mount`-only, `signal/computed/effect`, basic
  # router). It catches the failure mode the full-barrel gate can't see:
  # an optional feature silently STOPPING tree-shaking so a minimal import
  # starts dragging in code it never used to. Needs Bootstrap (measures
  # built lib/index.js). See scripts/check-import-budgets.ts.
  check-import-budgets:
    name: Check Import Budgets
    needs: [bootstrap, lint, changes] # typecheck edge dropped 2026-07 (queue-contention pass — see test-cell)
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      - name: Verify canonical minimal imports within budget
        run: bun run check-import-budgets

  # ── Check distribution: bundle/distribution hygiene gate ──────────────
  # Asserts every published @pyreon/* package declares `sideEffects` (so
  # bundlers can tree-shake) and excludes `!lib/**/*.map` from its `files`
  # array (so source maps don't ship to npm consumers). Also runs an
  # `npm pack --dry-run` probe against @pyreon/reactivity to prove the
  # tarball is actually clean at publish time, not just on paper. The
  # probe relies on lib/ being built — restored from the bootstrap
  # cache rather than rebuilt, so the job runs in seconds, not minutes.
  # See scripts/check-distribution.ts.
  check-distribution:
    name: Check Distribution
    # P3c — `npm pack --dry-run` probe reads lib/ via the `files` array.
    # Needs Bootstrap.
    # Cost gate (see test-cell): skip when a fast deterministic check fails.
    # Layer-2 gate: skip entirely on a docs-only PR (`changes.code == false`).
    needs: [bootstrap, lint, changes] # typecheck edge dropped 2026-07 (queue-contention pass — see test-cell)
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      - name: Check sideEffects + source-map exclusion
        run: bun run check-distribution

  # ── Check bin liveness: published-CLI no-op guard ─────────────────────
  # A published bin can build + ship + exit 0 while executing NOTHING —
  # @pyreon/lint 0.43.x shipped `bin/pyreon-lint.js` doing a bare
  # `import('../lib/cli.js')` whose `if (import.meta.main) main()` call the
  # bundler had tree-shaken out, so `npx pyreon-lint` ran nothing; and
  # `import.meta.main`-gated bins are a silent no-op on Node 20/22 LTS.
  # This gate spawns each published bin under REAL Node (not Bun — the bug
  # is Node-runtime specific) and fails if any does nothing. Reads lib/, so
  # it Needs Bootstrap. See scripts/check-bin-liveness.ts.
  check-bin-liveness:
    name: Check Bin Liveness
    needs: [bootstrap, lint, changes] # typecheck edge dropped 2026-07 (queue-contention pass — see test-cell)
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      - name: Spawn every published bin, assert it does something
        run: bun run check-bin-liveness

  # ── Check client-bundle node-import leak ──────────────────────────────
  # PR-S7 (#1125) first cut shipped a regression: i18n-routing.ts (exported
  # from @pyreon/zero's CLIENT-SAFE main entry) added a top-level
  # `import { AsyncLocalStorage } from 'node:async_hooks'`. The browser
  # couldn't resolve it, hydration broke, ssr-showcase e2e failed on
  # "counter doesn't increment" + "theme toggle silent". The fix split
  # the ALS into a server-only module loaded lazily.
  #
  # This gate prevents recurrence: walks every documented client-safe
  # package's main entry source transitively (following relative imports
  # within the package) and fails if ANY reachable file has a `node:*`
  # static import. Catches the bug class at CI time before it ships.
  #
  # See scripts/check-client-bundle-node-imports.ts.
  check-client-bundle-node-imports:
    name: Check Client Bundle Node Imports
    # No `install` edge — this walker is pure bun + repo source (it ran
    # without a node_modules restore for months; the edge was ordering-only).
    needs: [changes]
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Verify no node:* imports leak into client-safe packages
        run: bun run check-client-bundle-node-imports

  # ── Check export entries: release-build convention guard ──────────────
  # The shared build tool derives every entry from the package.json `exports`
  # KEY by convention (`"./X"` → `src/X.ts`) and ignores the bun/import/types
  # targets. A subpath export whose source file doesn't match (e.g. "./matchers"
  # with only `src/matchers-register.ts`) builds fine on INCREMENTAL/cached CI
  # builds but fails the RELEASE's clean `build-batched` with UNRESOLVED_ENTRY —
  # aborting the publish of EVERY package (this is what blocked the 0.40.0
  # release). Reproduces the tool's derivation statically in <1s so the mismatch
  # fails the PR, not the release weeks later. Lib-free. See
  # scripts/check-export-entries.ts. Also runs in `validate-fast` (pre-push).
  check-export-entries:
    name: Check Export Entries
    # No needs — pure bun + repo files (never restored node_modules).
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Verify every subpath export has a build entry
        run: bun run check-export-entries

  # ── Release Build: the release's clean build + pack, run as a PR gate ──
  # THE structural fix for release-only build failures. The release runs
  # `build-batched.ts` (a CLEAN full build of every published package) then
  # `publish.ts`. Per-PR CI builds are INCREMENTAL + cached, so a broken build
  # config never gets rebuilt in CI and only fails at release, aborting the
  # publish of EVERY package. This job runs the EXACT release build path +
  # `publish.ts --dry-run` (pack + manifest-validate, no upload), so if it is
  # green the release's build+pack step cannot fail. Clean build (no bootstrap
  # restore). Gated on code changes — skips docs-only PRs (fail-closed: still
  # runs if `changes` itself failed). No npm auth / id-token needed (the
  # dry-run does not request provenance). See scripts/{build-batched,publish}.ts.
  release-build:
    name: Release Build
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Clean full build of every published package (release path)
        run: bun scripts/build-batched.ts
      - name: Pack + validate every manifest (publish dry-run, no upload)
        run: bun scripts/publish.ts --dry-run

  # ── Check doc claims: numeric drift gate ──────────────────────────────
  # Asserts every numeric claim in human-written docs (hooks count in
  # README/manifest/CLAUDE.md, docs page count in CLAUDE.md) matches the
  # underlying source of truth (export count, file count). The audit
  # caught the hooks README claiming 16 vs actual 34 — drift that lasted
  # long enough to ship to users. This gate prevents recurrence.
  # See scripts/check-doc-claims.ts.
  check-doc-claims:
    name: Check Doc Claims
    # No needs — pure bun + repo files (never restored node_modules).
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Verify doc-claim numbers match source of truth
        run: bun run check-doc-claims

  # ── Docs generated-freshness gate ─────────────────────────────────────
  # The docs reference (41 pages), troubleshooting (7 cats), and examples-
  # gallery pages all emit from a single source of truth (package manifests,
  # .claude/rules/anti-patterns.md, docs/src/examples/). This regenerates
  # them and fails if the committed output drifted — so a manifest edit or a
  # new example can't silently leave the docs stale. Lib-free: the generators
  # read source via the bun condition. See docs/scripts/check-generated-fresh.ts.
  docs-generated-fresh:
    name: Docs Generated Fresh
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Regenerate docs + assert no drift
        run: bun docs/scripts/check-generated-fresh.ts

  # ── Lint ratchets ─────────────────────────────────────────────────────
  # TWO ratchets, both lib-free. (1) oxlint: `error`-severity rules are gated
  # at 0 by the `Lint` job; this covers the `warn` backlog (lint-baseline.json).
  # (2) @pyreon/lint: ERROR findings are gated by the `Pyreon Lint Gate` job;
  # this covers the advisory (warn + info) findings the framework's own
  # dogfooding produces over packages/*/src (pyreon-lint-baseline.json). Both:
  # per-rule counts may only DECREASE — a change pushing any rule above its
  # baseline fails here. Turns each lint surface from a snapshot into a
  # self-sustaining system. See scripts/check-{lint,pyreon-lint}-ratchet.ts +
  # .claude/rules/code-style.md.
  lint-ratchet:
    name: Lint Ratchet
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Verify oxlint warn-finding counts have not regressed
        run: bun run check-lint-ratchet
      - name: Verify @pyreon/lint advisory-finding counts (framework src) have not regressed
        run: bun run check-pyreon-lint-ratchet

  # ── Manifest depth ratchet ────────────────────────────────────────────
  # The root cause behind "get_api returns a signature but no foot-gun
  # catalog for half the fundamentals" was that nothing enforced manifest
  # density — rx shipped 3 api[] entries for 37 functions; store
  # referenced StoreApi 3x in seeAlso with no entry (a get_api 404).
  # This ratchet locks each migrated package's achieved density so it
  # can't silently erode. Not-yet-migrated packages are intentionally
  # absent from the lock (the visible backlog), so this never flag-days
  # CI. See scripts/check-manifest-depth.ts.
  check-manifest-depth:
    name: Check Manifest Depth
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      # check-manifest-depth's `findManifests` dynamic-imports every package
      # manifest.ts; each does `import { defineManifest } from
      # '@pyreon/manifest'` — a workspace specifier that resolves ONLY against
      # the restored node_modules symlink farm. The composite restores
      # node_modules by default. No bootstrap restore needed (script reads
      # manifest.ts via the bun condition → src/, not lib/).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Verify locked manifests stay at or above their density floor
        run: bun run check-manifest-depth

  # ── Check Manifest Examples: manifest api[].example ↔ shipped API ─────
  # Every manifest api[].example (+ longExample) is rendered VERBATIM into
  # the MCP api-reference AI assistants read. A stale example (wrong arg
  # order/shape, missing/renamed export, wrong return field) actively
  # TEACHES broken code. This gate typechecks every enforced package's
  # examples against the LIVE shipped types (subpath-aware, validated
  # injection, syntax-fragment tolerant). LIB-FREE: aliases @pyreon/* to
  # src via the bun condition. See scripts/check-manifest-examples.ts.
  check-manifest-examples:
    name: Check Manifest Examples
    needs: [install, changes]
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          restore-bootstrap: 'false'
      - name: Typecheck manifest api[].example blocks against shipped exports
        run: bun run check-manifest-examples

  # ── No-major-changesets: 0.x version cap at PR time ───────────────────
  # Pyreon is 0.x; `major` changesets would produce a 1.0.0 cascade across
  # the `fixed` group of 60+ packages. Companion to `scripts/cap-changeset-
  # bumps.ts` (release-time downgrade) — the CI guard surfaces the violation
  # at PR time so contributors see a clear error instead of a silent release-
  # time downgrade. When Pyreon goes 1.0, remove BOTH this job and the
  # release-time cap step as a deliberate gate (the removal IS the signal).
  check-no-major-changesets:
    name: Check No Major Changesets
    runs-on: ubuntu-latest
    # 3, not 1 — measured p50 is ~11s but that includes checkout + setup-bun,
    # both of which have observed p95 tails past 30s on cold runners; a 60s
    # cap gave <1.5× headroom (the ws-relay timeout-sizing rule).
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: 'Verify no major changesets (0.x policy)'
        run: bun scripts/check-no-major-changesets.ts

  # ── Verify modes: real-app build matrix ────────────────────────────────
  # Builds every example × mode cell defined in scripts/verify-modes.ts and
  # asserts the dist/ has actual rendered content. This is the structural
  # gate against the "typed-but-unimplemented" bug class — 0.14.0 shipped
  # with `mode: "ssg"` typed but not implemented because no internal test
  # exercised the consumer-level surface end-to-end. See scripts/verify-modes.ts
  # for the matrix definition.
  verify-modes:
    name: Verify Modes
    # P3c — `vite build` of every example × mode cell. Needs Bootstrap.
    # Cost gate (see test-cell): skip when a fast deterministic check fails.
    # Layer-2 gate: skip entirely on a docs-only PR (`changes.code == false`).
    needs: [bootstrap, lint, changes] # typecheck edge dropped 2026-07 (queue-contention pass — see test-cell)
    if: ${{ (success() && needs.changes.outputs.code == 'true') || (failure() && needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      - run: bun run verify-modes

  # ── Scaffold smoke: end-to-end gate against create-pyreon-app ──────────
  # Runs the actual scaffolder + bun install + bun run build for every
  # cell defined in scripts/scaffold-smoke.ts (template × adapter ×
  # integrations). Catches the bug class that PR #404 shipped with —
  # template TS errors / missing deps / wrong API names that lint+
  # typecheck on the scaffolder package can't see, because templates
  # aren't in any tsconfig include path.
  #
  # P1d — sharded as a matrix (6 cells in parallel) so wall-clock
  # ≈ slowest single cell instead of the sum. Pre-shard the job ran 6
  # cells sequentially in one runner (~215s); post-shard each runs in
  # its own ~50-110s job (per-cell `bun install` from repo root is the
  # dominant cost) with no cross-cell contention.
  #
  # `scaffold-smoke-aggregate` mirrors the e2e aggregator pattern: a
  # stable required check name regardless of which cells ran (matches
  # branch-protection's expectations even if a cell gets renamed).
  #
  # ## Path-scoping (perf): PRs that don't touch the scaffolder OR any
  # template skip the matrix entirely. All 6 cells share the same
  # scaffold-relevant input surface (the cells differ only in template ×
  # adapter combinations — the SCAFFOLDER + the templates are the same
  # source) so it's all-or-nothing. The consolidated `Changes (decide)` job
  # gates the matrix (the standalone `Scaffold Smoke (decide)` runner was
  # folded into it, 2026-07); the `scaffold-smoke` aggregator runs always
  # (empty matrix is a green skip, same shape as e2e).
  # push:main + merge_group ALWAYS run the full matrix — main is never
  # allowed to merge an undetected scaffold regression.
  scaffold-smoke-cell:
    name: Scaffold Smoke (${{ matrix.cell }})
    # P3c — each cell runs `bun install` + `vite build` of the scaffolded app.
    # Needs Bootstrap so the workspace lib/ is resolvable when the app pulls
    # in @pyreon/* via the node condition.
    # Cost gate (see test-cell): lint only (typecheck edge dropped 2026-07).
    needs: [bootstrap, lint, changes]
    if: ${{ needs.changes.outputs.scaffold-has == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        cell:
          - cpa-smoke-app-vercel
          - cpa-smoke-app-static
          - cpa-smoke-blog-cloudflare
          - cpa-smoke-dashboard-vercel-full
          - cpa-smoke-dashboard-node-supabase
          - cpa-smoke-monorepo-vercel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      # scaffold-smoke.ts accepts a positional cell filter:
      #   `bun scripts/scaffold-smoke.ts cpa-smoke-app-vercel` runs only that cell.
      - name: Run scaffold-smoke cell
        run: bun scripts/scaffold-smoke.ts ${{ matrix.cell }}

  # Stable required-check aggregator. Mirrors the `e2e` job's pattern
  # — branch protection requires this check by name; matrix cells are
  # the individual reports + failure surface.
  scaffold-smoke:
    name: Scaffold Smoke
    needs: [changes, scaffold-smoke-cell]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Aggregate scaffold-smoke matrix
        run: |
          RESULT="${{ needs.scaffold-smoke-cell.result }}"
          # Fail-closed (2026-07, an improvement over the old decide job): if
          # `changes` didn't succeed, the scaffold relevance is UNKNOWN and the
          # cells skipped — that must read as red, not green-via-skip.
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::changes (decide) did not succeed (${{ needs.changes.result }}) — scaffold relevance unknown"
            exit 1
          fi
          # `skipped` happens when the decide step says no relevant
          # changes — that's a green outcome (matches e2e's empty-matrix
          # pattern). `success` is the normal pass. Anything else fails.
          if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
            if [ "$RESULT" = "skipped" ]; then
              echo "No scaffold-relevant changes — matrix skipped."
            else
              echo "All scaffold-smoke cells passed."
            fi
            exit 0
          fi
          echo "::error::One or more scaffold-smoke cells failed (result=$RESULT)"
          exit 1

  docs-sync:
    name: Docs Sync
    # No `install` edge — self-sufficient: its own detection usually skips
    # everything; when it does run, it restores the CROSS-RUN lockfile-keyed
    # node_modules cache (restore-keys prefix) with a bun-install fallback.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect whether docs-sync inputs changed
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}" || true
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" || echo '')
          if echo "$CHANGED" | grep -qE '(^packages/[^/]+/[^/]+/src/manifest\.ts$|^llms(-full)?\.txt$|^scripts/gen-docs(-core)?\.ts$|^packages/internals/manifest/|^package\.json$|^docs/src/content/docs/mcp\.md$|^scripts/check-mcp-docs\.ts$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "No docs-sync-relevant files changed — skipping."
          fi
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: steps.changes.outputs.should_run == 'true'
        with:
          bun-version-file: .bun-version
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: docs-sync-nm
        if: steps.changes.outputs.should_run == 'true'
        with:
          path: |
            node_modules
            packages/*/*/node_modules
            examples/*/node_modules
            docs/node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-bun-
      - name: Fallback bun install (cache miss)
        if: steps.changes.outputs.should_run == 'true' && steps.docs-sync-nm.outputs.cache-hit != 'true'
        env:
          PYREON_BOOTSTRAP_SKIP: '1'
        run: bun install --frozen-lockfile
      - name: Check manifest-generated docs are in sync
        if: steps.changes.outputs.should_run == 'true'
        run: bun run gen-docs --check
      - name: Check docs/src/content/docs/mcp.md covers every registered MCP tool
        if: steps.changes.outputs.should_run == 'true'
        run: bun run check-mcp-docs

  audit:
    name: Dependency Audit
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
        with:
          # P3c — `bun pm untrusted` + lockfile diff only need NM, not lib/.
          restore-bootstrap: 'false'
      - name: Check for untrusted dependencies
        run: bun pm untrusted
        continue-on-error: true
      - name: Verify no lockfile drift
        run: git diff --exit-code bun.lock || (echo "::error::Lockfile is out of sync with package.json" && exit 1)

  # ── Benchmark (push:main only — track perf over time) ────────────────────
  benchmark:
    name: Benchmark
    if: github.event_name == 'push'
    # P3c — benchmarks measure realistic perf against the BUILT artifacts,
    # not src/. Needs Bootstrap.
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pyreon
      - name: Run core benchmarks
        run: bun run bench:all > bench-results.json
      - name: Run bundle size analysis
        run: bun run bench:bundle-size > bundle-size.json
      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-${{ github.sha }}
          path: |
            bench-results.json
            bundle-size.json
          retention-days: 90

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    # 10, not 5 — the pre-pull retry loop below can legitimately spend
    # 4 pull attempts + 60s of backoff sleeps before its OWN loud failure;
    # a 5-min cap could kill the job mid-retry with an opaque "cancelled"
    # instead of the loop's diagnostic (the timeout-must-exceed-composed-
    # internal-budgets rule from testing.md).
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # The trufflehog action `docker run`s ghcr.io/trufflesecurity/
      # trufflehog at job runtime. ghcr.io intermittently times out on
      # the manifest fetch (exit 125, BEFORE any scan) — and since this
      # is a REQUIRED check, that flake blocks every PR repo-wide on bad
      # luck (observed on #656, #688). Pre-pull the image with retry +
      # backoff into the local Docker cache so the action finds it
      # locally and never performs the flaky network pull. This adds
      # ZERO change to the trufflehog action SHA, `--only-verified`
      # args, or scan scope — the security posture is identical; only
      # the image fetch is made resilient. A genuine sustained ghcr.io
      # outage still fails (correctly) after honest retries.
      - name: Pre-pull trufflehog image (ghcr.io flake-resilient)
        run: |
          img="ghcr.io/trufflesecurity/trufflehog:latest"
          for i in 1 2 3 4; do
            if docker pull "$img"; then exit 0; fi
            echo "::warning::ghcr.io pull attempt $i/4 failed for $img; backing off ${i}0s"
            sleep "${i}0"
          done
          echo "::error::trufflehog image pull failed after 4 attempts — genuine ghcr.io outage, not a transient flake"
          exit 1
      - uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          extra_args: --only-verified
