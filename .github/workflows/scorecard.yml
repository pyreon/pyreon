name: Scorecard

# Closes the "no OpenSSF Scorecard" gap: runs the official scorecard analysis,
# publishes the result (Security tab + the public scorecard.dev / deps.dev
# badge) and uploads SARIF so regressions in security posture are visible.
# This is the authoritative, continuously-recomputed score — the manual
# inspection that motivated this PR was only a proxy for it.
#
# Branch-Protection check (the BranchProtectionID / alert #285 posture):
# `main` is protected by BOTH classic branch protection AND a public Repo
# Ruleset ("main branch protection"). The ruleset is load-bearing for the
# SCORE, not just enforcement: Scorecard runs with the default GITHUB_TOKEN,
# which CANNOT read classic Branch Protection — but Repo Rulesets are public,
# so Scorecard credits them without a PAT. The ruleset blocks force-push +
# branch deletion, requires a PR + all CI status checks, enforces linear
# history, and applies to admins (no bypass actors).
#
# The one Scorecard sub-check we deliberately do NOT satisfy is "require
# approving reviews / codeowners review": this is a single-maintainer org repo,
# GitHub forbids self-approval, and enforce-admins leaves no bypass — so
# requiring >=1 approver would block every merge. The ruleset therefore sets
# `required_approving_review_count: 0` (preserves self-merge) while keeping all
# the protections above. Alert #285 was dismissed (won't-fix) on that basis;
# re-open + require approvers if a second maintainer is ever added.

on:
  branch_protection_rule:
  workflow_dispatch: # allow an on-demand re-score after a protection change
  schedule:
    - cron: '41 5 * * 1' # weekly, Mondays 05:41 UTC
  push:
    branches: [main]

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the Scorecard SARIF to the Security tab
      id-token: write # publish results to the OpenSSF API (provenance)
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: results.sarif
