name: OSV-Scanner

# Closes the "no dependency-vulnerability gate" gap via OSV-Scanner's
# canonical OpenSSF-maintained reusable workflow (the standalone step-action
# is not a valid composite action at the pinned tag). Deliberately ADVISORY
# (`fail-on-vuln: false`): it scans the lockfile against the OSV database and
# publishes findings to the Security tab (SARIF) but does NOT fail the build.
# A hard-fail gate on a ~1400-package tree on day one would red every PR for
# pre-existing transitive advisories with no merge path — the same
# advisory-first rationale the repo applies to perf.yml. Once the baseline is
# triaged this can be ratcheted to blocking (`fail-on-vuln: true`).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '13 6 * * 1' # weekly, Mondays 06:13 UTC

concurrency:
  group: osv-scanner-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: OSV dependency scan (advisory)
    # Pinned to google/osv-scanner v2.3.8 (resolved via gh api — verifiable).
    uses: google/osv-scanner/.github/workflows/osv-scanner-reusable.yml@408fcd6f8707999a29e7ba45e15809764cf24f67
    permissions:
      security-events: write # upload OSV SARIF to the Security tab
      contents: read
      actions: read
    with:
      scan-args: |-
        --recursive
        ./
      fail-on-vuln: false
