# Scheduled publish-state verification — companion to the post-publish step
# in release.yml. Catches the silent-dead-release class even when the
# release workflow itself crashed before its own verify step (the v0.31.0
# incident shape: Version PR merged, publish job OOM'd, nothing alerted).
# Advisory by nature (sentinel npm lookups), but a red run here is a
# released-but-unpublished state that needs immediate action.
name: Published State

on:
  schedule:
    # Daily at 05:23 UTC — offset from perf.yml (03:17) + leak-sweep (04:11).
    - cron: '23 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify npm matches released version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Check published state
        # `--native` ALSO verifies the native compiler binaries (published by
        # release-native.yml AFTER the JS packages). The in-release check in
        # release.yml deliberately omits it — native isn't on npm yet at that
        # point — so this daily run is what guards the native-binary cascade.
        run: bun scripts/check-published-state.ts --native
