name: Doc Examples

# Typechecks VitePress markdown code blocks marked with `// @check` as
# the first content line. Catches API drift in docs that the manifest
# pipeline (api-reference / llms-*) doesn't reach.
#
# Opt-in by marker — only blocks the author explicitly tagged are
# checked. The gate covers what's marked; authors can grow the set
# over time as docs mature. See `scripts/check-doc-examples.ts` for
# the rationale + extraction rules.

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/docs/**'
      - 'packages/core/core/src/**'
      - 'packages/core/reactivity/src/**'
      - 'packages/core/runtime-dom/src/**'
      - 'packages/core/runtime-server/src/**'
      - 'packages/core/router/src/**'
      - 'scripts/check-doc-examples.ts'
      - '.github/workflows/doc-examples-check.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: doc-examples-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Doc Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck opted-in doc examples
        run: bun scripts/check-doc-examples.ts
