name: Native Compiler Validation

# Runs the native compiler's compile-validation gate (`validate.ts`)
# against every emitted fixture. With `swiftc` + `kotlinc` installed in
# the runner, the test suite enforces — via `PYREON_REQUIRE_NATIVE_VALIDATE=1`
# — that every fixture compiles cleanly. The fail-loud mode catches:
#   1. New emitter code emitting invalid Swift / Kotlin
#   2. New fixtures that expose emit-bugs the local dev env (which
#      typically lacks one or both toolchains) wouldn't catch
#
# Trigger model:
#   - `pull_request` SPAWNS on every PR but a cheap `decide` job (~10s,
#     GitHub files API — no clone) gates the expensive validate job on
#     the EXACT dependency surface of the native validate suite:
#     `packages/native/**`, `examples/native-*/**` (the K-FINAL +
#     showcase loops read those sources directly), `bun.lock` (pins
#     oxc-parser — the native compiler's ONLY runtime dep),
#     `.bun-version`, and this workflow. A skipped-via-`if` job reports
#     success to branch protection, so the REQUIRED check stays
#     deadlock-free (the trigger-level `paths:` filter would instead
#     leave non-matching PRs stuck on an "expected" check forever).
#
#     History: an earlier audit note (2026-06, CRIT-1) claimed
#     path-filtering left a hole because "packages/core/compiler/
#     cascades through PMTC" — that premise doesn't survive the
#     dependency graph: `@pyreon/native-compiler` imports ONLY
#     `oxc-parser` (verified: zero `@pyreon/*` runtime imports in its
#     src). The decide filter above IS the cascade surface; a
#     core-compiler change cannot alter the native emit. Before that
#     note, EVERY PR — docs-only included — paid the Swift+Kotlin
#     toolchain install + full fixture compile (~10-25 min ubuntu).
#   - `workflow_dispatch` — manual run, useful for re-validating
#     a specific commit without a fresh PR. Always runs (decide
#     short-circuits to true for non-PR events).
#   - `schedule` — nightly drift check against main. Catches a fixture
#     that started failing because a fresh swift / kotlinc release
#     changed parser strictness. Always runs.
#
# REQUIRED check in branch protection ("Validate emitted Swift +
# Kotlin") — which is exactly why the gating lives in a decide JOB,
# not a trigger-level paths filter.
#
# A SECOND validate job — `validate-swift-typecheck` (macOS) — shares
# the same `decide` gate and runs the native-compiler suite on a
# macOS runner, where the REAL SwiftUI SDK resolves so the ~58
# `swiftc -typecheck`-against-real-SwiftUI blocks EXECUTE (they SKIP
# on the ubuntu `validate` job — Linux swift has no SwiftUI). It is
# the only per-PR CI cell that catches the Swift type-corruption
# class the ubuntu `-parse` cannot. ADVISORY-first (not yet a
# required check); see the job for the promote-to-required note.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    # 05:23 UTC — offset from existing nightly workflows so runners
    # don't all queue at once.
    - cron: '23 5 * * *'

# Read-only default at the workflow level. The validate job below
# grants only `contents: read` — it runs swiftc/kotlinc parse +
# emits no artifacts to git, no PR comments, no tags.
permissions:
  contents: read

concurrency:
  group: native-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Pinned tool versions for reproducibility. Bump deliberately;
  # the nightly drift run catches issues from upstream changes.
  SWIFT_VERSION: '6.0'
  KOTLIN_VERSION: '2.0.21'

jobs:
  decide:
    name: Decide (native paths touched?)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      run: ${{ steps.diff.outputs.run }}
    steps:
      - name: Check changed paths against the native dependency surface
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "non-PR event — always validate"
            exit 0
          fi
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')
          if echo "$files" | grep -qE '^(packages/native/|examples/native-)'              || echo "$files" | grep -qxE 'bun\.lock|\.bun-version|\.github/workflows/native-validate\.yml'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "native surface touched — validating"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "no native-surface change — validate job skips (reports success to branch protection)"
          fi

  validate:
    name: Validate emitted Swift + Kotlin
    needs: decide
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    # Derived, not guessed (the ws-relay backstop rule): measured runtime is
    # 22m26s–24m20s across recent PRs, so the previous `25` left <1 min of
    # headroom — any slow runner tripped it (job timeout reports as
    # "cancelled", which cost a release-PR diagnosis on #2230). Budget =
    # worst measured (~24.5m) + ~40% runner-variance headroom.
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Setup Swift toolchain
        # `swift-actions/setup-swift` is the canonical community action
        # for installing swiftc on Linux runners (the Swift project
        # ships official Linux toolchains). Pinned via the env var so
        # bumping is a one-line change.
        # SHA-pinned per PinnedDependenciesID supply-chain hardening.
        # swift-actions/setup-swift@v2
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2.4.0
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Verify swiftc availability
        run: swiftc --version

      - name: Setup JDK (Kotlin prerequisite)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install kotlinc (pinned release + sha256)
        # Pinned, IMMUTABLE Kotlin compiler release + sha256 verification —
        # satisfies Scorecard PinnedDependencies (no live `curl get.sdkman.io |
        # bash` downloadThenRun). The release asset URL is versioned + immutable,
        # so the hash is STABLE (no live-bootstrap-URL fragility that made the
        # SDKMAN pin infeasible). `kotlin-compiler-<V>.zip` unzips to `kotlinc/`.
        # Bump KOTLIN_SHA256 when bumping KOTLIN_VERSION — the `.sha256` is
        # published next to the asset (…/kotlin-compiler-<V>.zip.sha256).
        env:
          KOTLIN_SHA256: '0352c0a45bd22f80f6b26e485cd04da8047baa5de54865281fb9f89a4a7bcf2a'
        run: |
          set -euo pipefail
          ZIP="kotlin-compiler-${KOTLIN_VERSION}.zip"
          curl -fsSL -o "$ZIP" "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/${ZIP}"
          echo "${KOTLIN_SHA256}  ${ZIP}" | sha256sum -c -
          unzip -q "$ZIP" -d "$HOME/kotlin-dist"
          echo "$HOME/kotlin-dist/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Verify kotlinc availability
        run: kotlinc -version

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Run native-compiler tests with validation REQUIRED
        # PYREON_REQUIRE_NATIVE_VALIDATE=1 promotes the "skip when tool
        # absent" path to a HARD FAIL. With swiftc + kotlinc both
        # installed in this runner, that's the right contract — if a
        # tool is missing the runner is broken and we should know.
        env:
          PYREON_REQUIRE_NATIVE_VALIDATE: '1'
        run: bun run --filter='@pyreon/native-compiler' test

      - name: iOS counter end-to-end smoke
        # End-to-end gate for the CLI build pipeline: walk src/, emit
        # generated/, swiftc-parse the result. Catches regressions the
        # fixture-snapshot tests miss — the CLI's directory walker,
        # workspace-resolution path, source-map emission, and the
        # output-file naming convention are all exercised here.
        #
        # We don't run the Xcode part (no Apple-hardware runners) —
        # `swiftc -parse` on the emit is the meaningful CI signal.
        # The `xcodegen generate` part is verified locally per PR.
        run: |
          set -eo pipefail
          cd examples/native-counter-ios
          # Reset any cached output so the build is exercising the
          # CLI's create-from-scratch path, not just touching an
          # existing file.
          rm -f generated/*.swift
          bash scripts/build.sh
          # Assert the expected output file landed.
          test -f generated/Counter.swift
          # Parse-validate the emit.
          swiftc -parse generated/Counter.swift
          # Sanity-check the content carries the canonical @State line —
          # catches an emit that silently produced empty / wrong-shape
          # output. swiftc would have caught a malformed file but not
          # "file exists, parses, but has zero @State declarations".
          grep -q '@State private var count: Int = 0' generated/Counter.swift
          grep -q 'Button("Increment")' generated/Counter.swift
          echo "[ios-counter-smoke] ✓ Counter.tsx compiles to valid SwiftUI"

      - name: iOS TodoMVC end-to-end smoke
        # Parallel to the Counter smoke above, but exercises the full
        # Phase 2 typecheck-clean feature set. Counter only covers
        # `signal → @State`; TodoMVC covers the 12 Phase 2 PRs that
        # took the emit from `swiftc -parse` PARSE_OK to
        # `swiftc -typecheck` clean — the Phase 2 typecheck-clean
        # closure (PRs #853/#854/#857/#859/#860/#861/#864/#866/#868/#871/#872/#874).
        #
        # This ubuntu smoke uses `swiftc -parse` (not `-typecheck`)
        # for the same reason as Counter: the Linux swift toolchain
        # doesn't ship SwiftUI symbols. The structural emit-content
        # greps below each lock in ONE specific Phase 2 PR's
        # contribution — together they prove the typecheck-clean
        # Phase 2 feature set is still emitted end-to-end. The real
        # `swiftc -typecheck` against the SwiftUI SDK now runs in the
        # `validate-swift-typecheck` macOS job below (per-PR, native-
        # affected), not just locally / on the advisory device gate.
        run: |
          set -eo pipefail
          cd examples/native-todomvc-ios
          rm -f generated/*.swift
          bash scripts/build.sh
          test -f generated/TodoApp.swift
          # Parse-validate the emit.
          swiftc -parse generated/TodoApp.swift

          # Phase 2 PR regression locks — each grep proves ONE PR's
          # feature is still emitted. Missing any of these would mean
          # the Phase 2 typecheck-clean milestone has silently
          # regressed.
          #
          # #853 + #857 — struct emit + Codable conformance for
          #               named type aliases.
          grep -q 'struct Todo: Codable {' generated/TodoApp.swift
          # #864's module-level-let lock moved to an INLINE fixture in
          # todomvc-baseline.test.ts — M1.2a's device assertion caught a
          # real second-session bug in the app's module counter (resets
          # per launch while storage persists → id collision → duplicate
          # <For by={id}> key silently dropped the new row), so TodoApp
          # now derives ids from persisted state. Lock the NEW shape:
          grep -q 'let maxId = todos.reduce(0' generated/TodoApp.swift
          # #859 — @PyreonAppStorage (Codable bridge to @AppStorage).
          grep -q '@PyreonAppStorage("pyreon-todomvc:todos")' generated/TodoApp.swift
          # #866 — computed property type inference via method chain.
          grep -q 'private var visible: \[Todo\] {' generated/TodoApp.swift
          # #866 — single-expr computed property.
          grep -q 'private var remaining: Int { todos.filter' generated/TodoApp.swift
          # #861 — TS-method translation (.filter / .map / .contains).
          grep -q '.filter({ t in !t.done })' generated/TodoApp.swift
          grep -q '.contains(where: { t in t.done })' generated/TodoApp.swift
          # #861 — string .trimmingCharacters from .trim().
          grep -q 'trimmingCharacters(in: .whitespacesAndNewlines)' generated/TodoApp.swift
          # #868 — multi-statement computed body + enum comparison.
          grep -q 'if filter == .active {' generated/TodoApp.swift
          # #871 — function-typed prop call inside trailing closure.
          grep -q 'Button("Remove") { onRemove() }' generated/TodoApp.swift
          # #872 — JSX event-handler forwarding + unnamed function-arg
          #         labels (TodoRow passes onToggle/onRemove without
          #         labelled args; here you see the call site shape).
          grep -q 'TodoRow(todo: t, onToggle:' generated/TodoApp.swift
          # #874 — Toggle binding (LAST typecheck-blocker; the
          #         interactive form, not just read-only).
          grep -q 'Toggle("", isOn: Binding(' generated/TodoApp.swift
          echo "[ios-todomvc-smoke] ✓ TodoApp.tsx compiles to typecheck-clean SwiftUI (Phase 2 feature set verified)"

  validate-swift-typecheck:
    name: Validate emitted Swift (real-SDK typecheck, macOS)
    needs: decide
    if: needs.decide.outputs.run == 'true'
    # macOS runners ship the REAL SwiftUI SDK, which the Linux swift toolchain
    # the `validate` job above uses does NOT — so `isSwiftUIAvailable()` is
    # true here and the ~58 `it.skipIf(!isSwiftUIAvailable())` real-SDK
    # `swiftc -typecheck` blocks EXECUTE (they SKIP on the ubuntu job).
    #
    # Honest delta (this cell is INCREMENTAL, not a from-scratch type gate):
    # the ubuntu `validate` job ALREADY catches most Swift type corruption
    # per-PR via `validateSwiftWithStubs` — a `swiftc -typecheck` against
    # mirror stubs (30/37 fixtures) that rejects e.g. a String bound where an
    # Int is expected. What ONLY the real SDK adds is (1) stub-MASKING
    # insurance — a real-SDK-only type error the mirror stub doesn't model —
    # and (2) the `@Observable`/Observation surface a struct stub cannot fake.
    # It does NOT close the heavy PyreonRuntime-service fixtures (same `-I`
    # scope limit as `validateSwiftTypecheck`; a tracked follow-up). Before
    # this cell those real-SDK blocks ran ONLY on a dev's local macOS and the
    # advisory `native-device.yml` (which gates 0 PRs) — never in per-PR CI.
    #
    # Kotlin blocks skip gracefully (no kotlinc installed here — Kotlin is
    # already fully gated on the ubuntu `validate` job via Compose stubs), so
    # we deliberately do NOT set PYREON_REQUIRE_NATIVE_VALIDATE (which promotes
    # a missing tool to a HARD FAIL and would red on absent kotlinc). The
    # explicit SwiftUI probe step below is the runner-sanity gate a stripped
    # SDK cannot slip past — otherwise every real-SDK block would silently
    # `skipIf` and the cell would go green-but-empty (a dead gate).
    #
    # `macos-15` matches native-device.yml's pinned image. ADVISORY-first:
    # this job is NOT yet a required branch-protection check — promote it once
    # a few weeks prove it stable against macOS-image / Xcode drift (the repo's
    # advisory→required pattern). It runs on native-affected PRs only (shared
    # `decide` gate); a non-native PR skips → reports success (deadlock-free).
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Verify swiftc + real SwiftUI SDK (fail loud if the runner lacks it)
        # The entire value of this cell is the REAL SwiftUI SDK. If a runner-image
        # change ever strips it, FAIL HERE — otherwise every real-SDK typecheck
        # block silently `skipIf`s and the cell reports green-but-empty.
        run: |
          set -euo pipefail
          swiftc --version
          printf 'import SwiftUI\nimport Foundation\nlet _pyreonSwiftUIProbe = 0\n' > "${RUNNER_TEMP}/pyreon-swiftui-probe.swift"
          swiftc -typecheck "${RUNNER_TEMP}/pyreon-swiftui-probe.swift"
          echo "SwiftUI SDK present — validateSwiftTypecheck blocks WILL run"

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Run native-compiler tests (real-SDK Swift -typecheck)
        # macos-15 ships the real SwiftUI SDK → isSwiftUIAvailable()=true → the
        # real-SDK `swiftc -typecheck` blocks run (they SKIP on ubuntu). Kotlin
        # blocks skip (no kotlinc); the ubuntu `validate` job covers Kotlin.
        run: bun run --filter='@pyreon/native-compiler' test
