name: Deploy Docs (zero-content preview)

# Side-by-side deploy of the docs-zero example. Builds the
# zero-content-powered docs and uploads to GitHub Pages alongside the
# existing VitePress deploy. The runtime serves docs-zero at the
# `/pyreon/preview/` subpath so it can be visually compared with the
# legacy /pyreon/ site for one bake week before the production
# cut-over (see docs/CUTOVER.md).
#
# Once the cut-over PR lands, this workflow is REMOVED and the main
# `docs.yml` is flipped to build docs-zero instead.

on:
  push:
    branches: [main]
    # Auto-redeploy on any change to a package the preview transitively
    # builds with. Pre-fix the filter only watched `examples/docs-zero`
    # + `packages/zero/zero-content` — so framework fixes that affect the
    # docs-zero build (e.g. the @pyreon/zero `--base` CLI carve-out in
    # PR #1395) didn't trigger a redeploy. The preview compiles a real
    # zero app, so any of these can change what ships:
    #
    #   - @pyreon/zero            — fs-router, SSG/SSR/SPA modes, the
    #                                base/port CLI carve-outs, image +
    #                                font auto-wire
    #   - @pyreon/zero-content    — the markdown-to-JSX content pipeline
    #   - @pyreon/vite-plugin     — JSX transform + HMR
    #   - @pyreon/router          — RouterView, RouterLink, base prefix
    #                                resolution
    #   - @pyreon/runtime-dom     — mount, hydrate, signal-driven DOM
    #   - @pyreon/reactivity      — signal / computed / effect (every
    #                                framework re-export uses this)
    #   - @pyreon/core            — VNode / h() / JSX runtime
    #   - @pyreon/compiler        — JSX → _tpl / _bind compile step
    #   - @pyreon/runtime-server  — SSR primitives (used by zero's SSG)
    #   - @pyreon/head            — useHead / Meta / link injection
    #
    # When the cut-over lands, this whole workflow is replaced by the
    # production `docs.yml` (which doesn't need a path filter — every
    # push to main is a deploy candidate). Until then, this list keeps
    # the side-by-side preview honest against framework regressions.
    paths:
      - 'examples/docs-zero/**'
      - 'packages/zero/zero/**'
      - 'packages/zero/zero-content/**'
      - 'packages/tools/vite-plugin/**'
      - 'packages/core/router/**'
      - 'packages/core/runtime-dom/**'
      - 'packages/core/reactivity/**'
      - 'packages/core/core/**'
      - 'packages/core/compiler/**'
      - 'packages/core/runtime-server/**'
      - 'packages/core/head/**'
      - '.github/workflows/docs-zero-preview.yml'
  workflow_dispatch:

concurrency:
  group: deploy-docs-zero-preview
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build docs-zero
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Need the full history so `git log -1 --format=%aI <file>` in
          # the last-updated plugin returns the real timestamp instead
          # of the shallow-clone-only commit.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build docs-zero
        # `--base=` CLI flag is honored by zero's `config()` hook via the
        # argvHasBaseFlag() carve-out (mirrors the equivalent --port
        # handling that already shipped). Same pattern the rest of the
        # Vite ecosystem expects.
        run: |
          cd examples/docs-zero
          bunx vite build --base=/pyreon/preview/

      - name: Pack the preview into the existing site bundle
        # set -e so the step exits non-zero on the FIRST failing command
        # — keeps the failure mode visible instead of letting a later
        # `cp` mask a broken VitePress build with a confusing "cannot
        # stat" error (the actual root cause was a partial-chain cwd
        # leftover when `cd docs && … && cd ..` broke mid-chain).
        run: |
          set -e
          # Build the legacy VitePress site as the OUTER artifact.
          (cd docs && bun install --frozen-lockfile && bun run build)
          # Drop the docs-zero build into preview/ of the VitePress dist.
          # All paths are workspace-root-relative — no cwd leakage from
          # the previous subshell.
          mkdir -p docs/.vitepress/dist/preview
          cp -r examples/docs-zero/dist/. docs/.vitepress/dist/preview/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
