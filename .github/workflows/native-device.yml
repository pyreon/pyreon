name: Native Device Build

# Real-toolchain BUILD + UI-SMOKE gate for the emitted native apps — the
# step BEYOND `native-validate.yml` (which does `swiftc -parse` / `kotlinc`
# typecheck on the emitted fragments). This compiles the FULL example apps
# — PMTC-emitted code + the host shell + the real SwiftUI / Jetpack Compose
# dependencies — on actual Xcode (iOS Simulator SDK) and Gradle/Android
# toolchains, AND (Phase 2.2) boots an iOS Simulator + runs an XCUITest
# that asserts the root view renders by querying the `accessibilityIdentifier`
# emitted from the canonical `data-testid` (see `examples/native-todomvc-ios/
# iosUITests/PyreonTodoMVCUITests.swift`). The Android-side Compose
# instrumented test is the next follow-up — pairs with the BUILD step
# below; needs an emulator-runner action.
#
# ## When this runs
#
# `native-validate.yml` runs on free Linux runners per PR (`swiftc -parse`
# + kotlinc-against-stubs). This workflow is the OTHER half — the real
# Xcode / Gradle build — which needs a macOS runner and ~40 min. It runs:
#   - AUTOMATICALLY on any PR that touches the native pipeline
#     (packages/native/**, examples/native-*/**, or this file) — decided
#     by the fail-closed `changes` job below, mirroring ci.yml's idiom.
#     The repo is PUBLIC, so macOS runner minutes are free; the old
#     label-only opt-in existed for private-repo billing, which no longer
#     applies. PR-time coverage protects the nightly green streak: an
#     emit regression is caught on the PR, not the next morning.
#   - on a PR carrying the `native-device` label — the manual opt-in for
#     changes OUTSIDE the native paths that a maintainer still wants
#     device-proven (e.g. a compiler-adjacent refactor).
#   - on `workflow_dispatch` (manual) and the nightly schedule (drift
#     check against main) — both unconditional.
#
# ## Status + promotion protocol
#
# Advisory — NOT YET in branch-protection's required checks. The encoded
# promotion gate is `bun scripts/check-native-device-streak.ts`: 14
# consecutive green nightlies (the audit's 2-week observation window;
# every red night resets the clock — see the sticky-issue job below).
# THIS workflow shape is required-check-SAFE by construction: the
# pull_request trigger has NO path filter (a filtered-out trigger creates
# no check run → a required check would deadlock every non-native PR);
# instead the `changes` job skips the build jobs at the JOB level, and a
# skipped job satisfies a required status check. When the streak gate
# passes, promotion is a pure branch-protection change (add the two build
# job names as required checks) — zero workflow surgery.

on:
  workflow_dispatch:
  pull_request:
    # NO `paths:` filter — deliberately. A trigger-level filter is
    # deadlock-UNSAFE for a required check (no check run is created for a
    # filtered-out PR, so branch protection waits forever). Path scoping
    # lives in the `changes` job below (job-level skip = success).
    # `opened`/`reopened` are included so a FRESH native PR gets its
    # device run without waiting for a push or a label.
    types: [opened, reopened, synchronize, labeled]
  schedule:
    # 47 past 05 UTC — offset from native-validate.yml's 05:23 so the two
    # native workflows don't queue against each other.
    - cron: '47 5 * * *'

# Read-only default at the workflow level. Each job below grants only
# `contents: read` — neither the iOS nor Android build needs anything
# more (no tags pushed, no PR comments posted, no OIDC tokens minted).
permissions:
  contents: read

concurrency:
  group: native-device-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Changes (decide native) ─────────────────────────────────────────
  # Cheap always-on decide job — the required-check-safe replacement for
  # the old trigger-level `paths:` filter. Mirrors ci.yml's `changes`
  # job. FAIL-CLOSED: only a clean "false" narrows the run; an empty
  # output, a failed diff, or a crashed job defaults the build jobs to
  # RUNNING (a skipped required check reports success, so a mis-detection
  # must never silently disable the gate).
  changes:
    name: Changes (decide native)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      native: ${{ steps.detect.outputs.native }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect native-path changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR event (${{ github.event_name }}) → native=true (full run)."
            exit 0
          fi
          # Fail-closed: any diff failure → native=true.
          git fetch origin "${{ github.base_ref }}" || true
          if FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD"); then
            if printf '%s\n' "$FILES" | grep -qE '^(packages/native/|examples/native-|\.github/workflows/native-device\.yml$)'; then
              NATIVE=true
            else
              NATIVE=false
            fi
          else
            NATIVE=true
          fi
          echo "native=$NATIVE" >> "$GITHUB_OUTPUT"
          echo "Native paths changed: $NATIVE"

  ios-build:
    # Runs when: non-PR event (nightly / dispatch) · the PR touches native
    # paths (`changes` job) · the PR carries the `native-device` label
    # (manual opt-in for path-external changes).
    # The path arm (native==true) fires on EVERY
    # PR action INCLUDING unrelated-label events — deliberately: a job-
    # level skip reports SUCCESS to branch protection, so if an unrelated
    # `labeled` event skipped the builds on a native-path PR, a RED device
    # run could be LAUNDERED into a skipped-green latest check by adding
    # any label. Re-running the (free, cancel-in-progress-deduped) matrix
    # on a rare label addition is the safe side of that trade. The label
    # arms below are for path-EXTERNAL changes only.
    # The `(failure() && …)` arm is the fail-closed guard from ci.yml's
    # anti-pattern entry: a crashed `changes` job must RUN the gate, not
    # skip it (a skipped required check reports success).
    needs: changes
    if: >-
      (success() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.native == 'true' ||
        (github.event.action == 'labeled' && github.event.label.name == 'native-device') ||
        (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'native-device'))
      )) ||
      (failure() && needs.changes.result != 'success')
    name: iOS — xcodebuild (Simulator SDK)
    runs-on: macos-15
    # 60, not 40: the fetch-arc run data showed 40 is AT the wire —
    # attempt 1 timed out BOTH jobs at ~40:01/40:30; attempt 2's iOS
    # finished at 38.8 and Android timed out INSIDE the final (tasks)
    # Espresso step with every prior step green. Advisory, label-gated
    # jobs end when done — a generous ceiling only prevents the
    # false-cancel class, it never adds wall-clock to green runs.
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install workspace deps (bootstraps @pyreon/native-cli used by the preBuildScript)
        run: |
          # Retry the install — a transient registry tarball-extract flake
          # (`Fail extracting tarball for "@biomejs/cli-…"`) on the Android
          # job broke the nightly green streak on 2026-06-27 (the run was
          # otherwise green). Three attempts with linear backoff; any green
          # attempt wins, all-three-fail still fails the step. This is the
          # dominant transient flake resetting the device-gate green streak —
          # the XCUITest attach flake already has `-retry-tests-on-failure`,
          # this is the install half. Lockfile-frozen, so a retry can only
          # re-download the SAME pinned versions (no resolution drift).
          n=0
          until [ "$n" -ge 3 ]; do
            bun install --frozen-lockfile && exit 0
            n=$((n + 1))
            echo "::warning::bun install attempt $n failed — retrying in $((n * 10))s"
            sleep $((n * 10))
          done
          echo "::error::bun install failed after 3 attempts"
          exit 1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Emit Swift (PMTC .tsx → generated/*.swift)
        # Run the compile loop up front so `generated/` exists before
        # xcodegen/xcodebuild (the project.yml preBuildScript re-runs it,
        # but populating it here gives a clearer failure if PMTC itself
        # breaks vs the Xcode build).
        working-directory: examples/native-todomvc-ios
        run: bash scripts/build.sh

      - name: Generate Xcode project
        working-directory: examples/native-todomvc-ios
        run: xcodegen generate

      - name: Build app for the iOS Simulator
        # Build only — proves the emitted Swift links against real
        # SwiftUI. The launch-and-render UI smoke is the NEXT step.
        # `CODE_SIGNING_ALLOWED=NO` because a Simulator build needs no
        # provisioning profile. `generic/platform=iOS Simulator` avoids
        # pinning a specific device/runtime name.
        working-directory: examples/native-todomvc-ios
        run: |
          set -o pipefail
          xcodebuild build \
            -project PyreonTodoMVC.xcodeproj \
            -scheme PyreonTodoMVC \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Resolve a concrete Simulator device
        # `xcodebuild test` needs a CONCRETE device (the build step's
        # `generic/platform=iOS Simulator` cannot run tests). Hardcoding
        # a model name ROTS with every macos-* runner-image update — the
        # previously-pinned `iPhone 15` vanished from the macos-15 Xcode
        # images and every UITest step died with "Unable to find a
        # device matching the provided destination specifier" (exit 70).
        # Resolve the first AVAILABLE iPhone at runtime instead — robust
        # across image updates by construction.
        run: |
          SIM_NAME=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          if [ -z "$SIM_NAME" ]; then
            echo "::error::No available iPhone simulator on this runner image:"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Resolved simulator: $SIM_NAME"
          echo "PYREON_SIM_NAME=$SIM_NAME" >> "$GITHUB_ENV"

      - name: Run UITest on iOS Simulator (Phase 2.2 launch-and-render smoke)
        # The Phase-2.2 deliverable from the plan: BOOT the Simulator,
        # install the app, run an XCUITest that asserts the root view
        # (accessibilityIdentifier=todo-app, emitted from the canonical
        # `data-testid` in src/TodoApp.tsx) renders.
        #
        # The PyreonTodoMVC scheme (defined explicitly in project.yml)
        # wires the PyreonTodoMVCUITests target into the `test` action,
        # so this single `xcodebuild test` invocation builds + installs
        # the app, boots the Simulator, and runs the UITest bundle in
        # one shot.
        #
        # `-retry-tests-on-failure -test-iterations 3` (here + the 3
        # sibling steps): XCUITest's harness attach is load-flaky on CI
        # simulators — "Failed to get background assertion ... Timed
        # out while acquiring background assertion" killed a run whose
        # SAME suite passed locally and whose prior steps passed on the
        # same sim. Xcode's native per-test retry self-heals the attach
        # flake; a real product failure still fails all 3 iterations.
        working-directory: examples/native-todomvc-ios
        run: |
          set -o pipefail
          xcodebuild test \
            -retry-tests-on-failure \
            -test-iterations 3 \
            -project PyreonTodoMVC.xcodeproj \
            -scheme PyreonTodoMVC \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${PYREON_SIM_NAME},OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      # ── Gap 7 part (a) — XCUITest coverage beyond TodoMVC ──
      # The audit (2026-06-05 native-readiness) explicitly calls out
      # "native-router-demo-ios + native-counter-ios have no test
      # coverage." These steps close that — same xcodegen + xcodebuild
      # test pattern as the TodoMVC steps above. The Simulator stays
      # booted across the 3 example apps so device boot-time cost is
      # paid ONCE (~30s); only the per-app install + test cost adds up.

      - name: Emit + xcodegen + UITest — native-counter-ios
        working-directory: examples/native-counter-ios
        run: |
          set -o pipefail
          bash scripts/build.sh
          xcodegen generate
          xcodebuild test \
            -retry-tests-on-failure \
            -test-iterations 3 \
            -project PyreonCounter.xcodeproj \
            -scheme PyreonCounter \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${PYREON_SIM_NAME},OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Emit + xcodegen + UITest — native-router-demo-ios
        working-directory: examples/native-router-demo-ios
        run: |
          set -o pipefail
          bash scripts/build.sh
          xcodegen generate
          xcodebuild test \
            -retry-tests-on-failure \
            -test-iterations 3 \
            -project PyreonRouterDemo.xcodeproj \
            -scheme PyreonRouterDemo \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${PYREON_SIM_NAME},OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      # Tasks showcase — Gap 5 PR-5.3(b) closure. Runs the
      # PyreonTasksUITests.swift suite (auth-gate + navigation +
      # logout flow) against the prerendered canonical TasksApp.tsx
      # source. Closes the audit's "no device CI for tasks" gap on
      # the iOS side.
      # fetch-arc device proof: the quotes screen fetches
      # http://127.0.0.1:8787/quotes.json. The Simulator shares the
      # host loopback, so a plain host file server is reachable
      # in-app. Started ONCE, before the tasks UITest; the trailing
      # `&` + disown keeps it alive across steps within this job.
      - name: Start quotes fixture server (port 8787)
        run: |
          # -u + file-redirect: python block-buffers a non-tty pipe
          # (zero observability) and an orphan holding the step's pipe
          # can keep the job alive after the work ends — the exact hang
          # the Android script hit in round 3.
          python3 -u -m http.server 8787 --bind 127.0.0.1 --directory "$GITHUB_WORKSPACE/examples/native-tasks/fixtures" > /tmp/fixture-server.log 2>&1 &
          disown
          # Readiness poll, NOT a fixed `sleep 1`: python's http.server can take
          # >1s to bind under CI load, so a fixed sleep raced the bind and curl
          # exited 7 ("couldn't connect") — a flake that reddened attrs PR #2477's
          # Android build on a fully-successful gradle assemble. Poll up to 30s,
          # fail loudly with the server log if it truly never starts. ONE line
          # deliberately: the Android emulator-runner runs `script:` lines
          # individually under /usr/bin/sh, where a multi-line for/do/done loop
          # errors "expecting done" — so keep BOTH fixture polls single-line.
          i=0; while ! curl -fsS http://127.0.0.1:8787/quotes.json >/dev/null 2>&1; do i=$((i+1)); [ "$i" -ge 30 ] && { echo "fixture server FAILED to start within 30s"; cat /tmp/fixture-server.log 2>/dev/null || true; exit 1; }; sleep 1; done; echo "fixture server OK (ready after ${i}s)"

      - name: Emit + xcodegen + UITest — native-tasks-ios
        working-directory: examples/native-tasks-ios
        run: |
          set -o pipefail
          bash scripts/build.sh
          xcodegen generate
          xcodebuild test \
            -retry-tests-on-failure \
            -test-iterations 3 \
            -project PyreonTasks.xcodeproj \
            -scheme PyreonTasks \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${PYREON_SIM_NAME},OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  android-build:
    # Same gate as ios-build — see the comment there.
    needs: changes
    if: >-
      (success() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.native == 'true' ||
        (github.event.action == 'labeled' && github.event.label.name == 'native-device') ||
        (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'native-device'))
      )) ||
      (failure() && needs.changes.result != 'success')
    name: Android — gradlew assembleDebug
    runs-on: ubuntu-latest
    # 60, not 40: the fetch-arc run data showed 40 is AT the wire —
    # attempt 1 timed out BOTH jobs at ~40:01/40:30; attempt 2's iOS
    # finished at 38.8 and Android timed out INSIDE the final (tasks)
    # Espresso step with every prior step green. Advisory, label-gated
    # jobs end when done — a generous ceiling only prevents the
    # false-cancel class, it never adds wall-clock to green runs.
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Setup JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        # First-party action for the SDK + build-tools + platform.
        # SHA-pinned per PinnedDependenciesID supply-chain hardening.
        # android-actions/setup-android@v3
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Gradle (pinned distribution + sha256)
        # The android example pins AGP 8.7.0 (needs Gradle 8.9+) but ships no
        # `gradlew` wrapper, so install Gradle directly. Pinned, IMMUTABLE
        # distribution + sha256 verification — satisfies Scorecard
        # PinnedDependencies (no live `curl get.sdkman.io | bash`
        # downloadThenRun). The distribution URL is versioned + immutable, so
        # the hash is STABLE. `gradle-<V>-bin.zip` unzips to `gradle-<V>/`.
        # Bump GRADLE_SHA256 when bumping GRADLE_VERSION — the official `.sha256`
        # is at services.gradle.org/distributions/gradle-<V>-bin.zip.sha256.
        env:
          GRADLE_VERSION: '8.10.2'
          GRADLE_SHA256: '31c55713e40233a8303827ceb42ca48a47267a0ad4bab9177123121e71524c26'
        run: |
          set -euo pipefail
          ZIP="gradle-${GRADLE_VERSION}-bin.zip"
          # `--retry`/`--retry-all-errors` hardens the single network fetch
          # against the same transient-download class that broke the streak
          # (the sha256 check below still gates a corrupt/partial download).
          curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors -o "$ZIP" "https://services.gradle.org/distributions/${ZIP}"
          echo "${GRADLE_SHA256}  ${ZIP}" | sha256sum -c -
          unzip -q "$ZIP" -d "$HOME/gradle-dist"
          echo "$HOME/gradle-dist/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Verify gradle availability
        run: gradle --version

      - name: Install workspace deps (bootstraps @pyreon/native-cli)
        run: |
          # Retry the install — a transient registry tarball-extract flake
          # (`Fail extracting tarball for "@biomejs/cli-…"`) on the Android
          # job broke the nightly green streak on 2026-06-27 (the run was
          # otherwise green). Three attempts with linear backoff; any green
          # attempt wins, all-three-fail still fails the step. This is the
          # dominant transient flake resetting the device-gate green streak —
          # the XCUITest attach flake already has `-retry-tests-on-failure`,
          # this is the install half. Lockfile-frozen, so a retry can only
          # re-download the SAME pinned versions (no resolution drift).
          n=0
          until [ "$n" -ge 3 ]; do
            bun install --frozen-lockfile && exit 0
            n=$((n + 1))
            echo "::warning::bun install attempt $n failed — retrying in $((n * 10))s"
            sleep $((n * 10))
          done
          echo "::error::bun install failed after 3 attempts"
          exit 1

      - name: Emit Kotlin (PMTC .tsx → generated/*.kt)
        working-directory: examples/native-todomvc-android
        run: bash scripts/build.sh

      - name: Build debug APK
        working-directory: examples/native-todomvc-android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Enable KVM for emulator
        # `reactivecircus/android-emulator-runner` requires KVM
        # acceleration. ubuntu-latest GitHub-hosted runners support
        # nested virtualization but `/dev/kvm` needs explicit user
        # permissions to be readable by the runner user.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Compose instrumented test on Android Emulator (Phase 2.2 launch-and-render smoke)
        # The Phase-2.2 counterpart to the iOS XCUITest step: BOOT an
        # Android Emulator, install the app, run the Compose test
        # asserting the root composable (testTag=todo-app, emitted from
        # the canonical `data-testid` in the SHARED src/TodoApp.tsx)
        # renders.
        #
        # `reactivecircus/android-emulator-runner` is the standard GH
        # Actions emulator-runner. API 33 + google_apis target + x86_64
        # is the canonical fast-boot combination (default-image,
        # Google-suggested, no Play services overhead). `disable-animations`
        # cuts test-flake from transitional animations interfering with
        # the assertion timing.
        #
        # `connectedCheck` (NOT `connectedAndroidTest`) runs every
        # connected-device test task — both library unit tests and
        # instrumented tests — and is the conventional umbrella task
        # for CI.
        # SHA-pinned per PinnedDependenciesID supply-chain hardening.
        # reactivecircus/android-emulator-runner@v2
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # working-directory (NOT a `cd` inside `script`): the
          # emulator-runner executes each script LINE from the
          # workspace root, so a multi-line `cd X` + `gradle ...`
          # ran gradle at the repo root → "Directory ... does not
          # contain a Gradle build". First surfaced on the first
          # run that ever REACHED this step (the build steps before
          # it use step-level working-directory and were fine).
          working-directory: examples/native-todomvc-android
          script: gradle connectedCheck --no-daemon --stacktrace

      # ── Gap 5 Android Espresso parity beyond TodoMVC ──
      # Adds the Counter Android example to the Espresso CI gate.
      # Same shape as native-todomvc-android above — Emit Kotlin →
      # assembleDebug → connectedCheck.

      - name: Emit Kotlin (PMTC .tsx → generated/*.kt) — native-counter-android
        working-directory: examples/native-counter-android
        run: bash scripts/build.sh

      - name: Build debug APK — native-counter-android
        working-directory: examples/native-counter-android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Run Espresso test on Android Emulator — native-counter-android
        # SHA-pinned same as the TodoMVC step above so supply-chain
        # hardening is consistent. Fresh emulator boot per step
        # (reactivecircus/android-emulator-runner re-boots when invoked
        # multiple times in the same job) — acceptable cost on the
        # label-gated advisory path.
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # working-directory (NOT a `cd` inside `script`): the
          # emulator-runner executes each script LINE from the
          # workspace root, so a multi-line `cd X` + `gradle ...`
          # ran gradle at the repo root → "Directory ... does not
          # contain a Gradle build". First surfaced on the first
          # run that ever REACHED this step (the build steps before
          # it use step-level working-directory and were fine).
          working-directory: examples/native-counter-android
          script: gradle connectedCheck --no-daemon --stacktrace

      # Router demo — wires the existing #1455 example into device CI.
      # Was previously not in the device matrix; closes the audit's
      # Phase C "router-demo-android no test coverage" gap.

      - name: Emit Kotlin (PMTC .tsx → generated/*.kt) — native-router-demo-android
        working-directory: examples/native-router-demo-android
        run: bash scripts/build.sh

      - name: Build debug APK — native-router-demo-android
        working-directory: examples/native-router-demo-android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Run Espresso test on Android Emulator — native-router-demo-android
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # working-directory (NOT a `cd` inside `script`): the
          # emulator-runner executes each script LINE from the
          # workspace root, so a multi-line `cd X` + `gradle ...`
          # ran gradle at the repo root → "Directory ... does not
          # contain a Gradle build". First surfaced on the first
          # run that ever REACHED this step (the build steps before
          # it use step-level working-directory and were fine).
          working-directory: examples/native-router-demo-android
          script: gradle connectedCheck --no-daemon --stacktrace

      # Tasks showcase — Gap 5 PR-5.3(c) closure on the Android side.
      # Runs TasksAppInstrumentedTest.kt (login → store-gated tasks →
      # add-task → typed-params detail → logout via Compose UI test)
      # against the prerendered canonical TasksApp.tsx source. Closes the audit's
      # "no device CI for tasks" gap on Android. The showcase is
      # STORE-BACKED (Gap 4): the auth-gate + cross-screen task list
      # live in one defineStore singleton, so the test exercises the
      # store-read guard + store mutation + typed-params detail.

      - name: Emit Kotlin (PMTC .tsx → generated/*.kt) — native-tasks-android
        working-directory: examples/native-tasks-android
        run: bash scripts/build.sh

      - name: Build debug APK — native-tasks-android
        working-directory: examples/native-tasks-android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Run Espresso test on Android Emulator — native-tasks-android
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # working-directory (NOT a `cd` inside `script`): the
          # emulator-runner executes each script LINE from the
          # workspace root, so a multi-line `cd X` + `gradle ...`
          # ran gradle at the repo root → "Directory ... does not
          # contain a Gradle build". First surfaced on the first
          # run that ever REACHED this step (the build steps before
          # it use step-level working-directory and were fine).
          working-directory: examples/native-tasks-android
          # fetch-arc device proof: serve the quotes fixture on the
          # HOST, then `adb reverse` forwards the EMULATOR's
          # 127.0.0.1:8787 to the host server — the same loopback URL
          # the iOS Simulator (and web dev) reads works unchanged
          # inside the emulator. The cleartext exception for loopback
          # lives in the app's network_security_config.xml.
          #
          # Round-3 hardening (all three bit at once):
          #   - ABSOLUTE fixture path: relative paths are ambiguous
          #     under the action's per-line execution model (the same
          #     trap class as the working-directory note above).
          #   - stdout/stderr to a FILE, not the step pipe: python
          #     block-buffers a non-tty pipe (no banner, no GET lines —
          #     zero observability) AND the orphan holding the pipe
          #     kept the step alive 44 minutes after gradle exited
          #     (the 'timeout inside the last step' was really a hang).
          #   - curl health-check BEFORE gradle (the iOS job had one;
          #     this script didn't) — a dead server fails in 1s with a
          #     named cause instead of a 20s ComposeTimeoutException
          #     deep inside the Espresso run.
          script: |
            python3 -u -m http.server 8787 --bind 127.0.0.1 --directory "$GITHUB_WORKSPACE/examples/native-tasks/fixtures" > /tmp/fixture-server.log 2>&1 &
            # Readiness poll, NOT a fixed `sleep 1`: the python server can take
            # >1s to bind under CI load; a fixed sleep raced the bind → curl exit
            # 7 (the flake that reddened #2477). ONE line: the emulator-runner
            # runs each script line under /usr/bin/sh, so a multi-line loop
            # breaks ("expecting done"). Poll up to 30s, fail loudly on timeout.
            i=0; while ! curl -fsS http://127.0.0.1:8787/quotes.json >/dev/null 2>&1; do i=$((i+1)); [ "$i" -ge 30 ] && { echo "fixture server FAILED to start within 30s"; cat /tmp/fixture-server.log 2>/dev/null || true; exit 1; }; sleep 1; done; echo "fixture server OK (ready after ${i}s)"
            adb reverse tcp:8787 tcp:8787
            gradle connectedCheck --no-daemon --stacktrace

      # The connected-test HTML/XML reports are the ONLY place the
      # failing assertion's line number lives — the gradle console log
      # truncates the stack at the assertIsDisplayed frame. Their
      # absence made the round-3 tasks failure (the Text testTag drop)
      # needlessly hard to diagnose; upload them whenever Espresso ran.
      - name: Upload connected-test reports
        # failure OR cancelled: a job-level timeout reports the running
        # step as cancelled, and that's exactly when the report matters.
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-connected-reports
          path: |
            examples/native-*-android/app/build/reports/androidTests/
            /tmp/fixture-server.log
          retention-days: 14
          if-no-files-found: ignore

  # ── Nightly-failure visibility (sticky issue) ──
  #
  # The device gate is ADVISORY (not in branch protection) and its
  # nightly schedule has no human watching the Actions tab — the gate
  # was red for 13 consecutive nights (2026-05-29 → 2026-06-10) before
  # anyone noticed, because nothing surfaced the failures anywhere a
  # maintainer looks. This job closes that visibility hole: a FAILED
  # scheduled run creates (or comments on) ONE sticky issue titled
  # below; a SUCCESSFUL scheduled run closes it. Label-gated PR runs
  # are excluded — their failures are visible on the PR itself, and an
  # author iterating on red device CI shouldn't spam the issue.
  #
  # Sticky-issue pattern (find-by-title + comment-in-place) mirrors
  # perf.yml / leak-sweep.yml's sticky PR comments; `always()` (not
  # bare `failure()`) is required so the job ALSO runs on success to
  # auto-close the issue.
  notify-nightly:
    name: Nightly status → sticky issue
    if: always() && github.event_name == 'schedule'
    needs: [ios-build, android-build]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      # `retries: 3` for transient GitHub API 5xx — but DELIBERATELY NOT
      # wrapped in a swallow-all `catch` like the advisory PR-comment steps
      # in bundle-size-diff / perf / leak-sweep. There, the comment REPORTS
      # alongside a real gate, so a failed post must not turn the check red.
      # Here the notification IS the deliverable: if the sticky issue can't
      # be written, a red nightly would vanish silently — the catalogued
      # dead-gate class. So this one still fails loudly after retries.
      - name: Create / update / close the sticky failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          retries: 3
          script: |
            const title = '[native-device] Nightly device build is RED'
            const failed =
              '${{ needs.ios-build.result }}' === 'failure' ||
              '${{ needs.android-build.result }}' === 'failure'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              per_page: 100,
            })
            const sticky = issues.find((i) => i.title === title)
            if (failed) {
              const line = [
                `Nightly run failed: ${runUrl}`,
                `- iOS (xcodebuild + XCUITest): **${{ needs.ios-build.result }}**`,
                `- Android (gradle + Compose test): **${{ needs.android-build.result }}**`,
              ].join('\n')
              if (sticky) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: sticky.number,
                  body: line,
                })
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body: [
                    'The nightly native-device build (real xcodebuild iOS Simulator +',
                    'real gradle Android Emulator against the PMTC-emitted examples)',
                    'is failing. This issue is managed by the workflow: it gets one',
                    'comment per failed nightly and AUTO-CLOSES on the next green run.',
                    '',
                    'Streak gate: `bun scripts/check-native-device-streak.ts` needs 14',
                    'consecutive green nightlies before native-device can be promoted',
                    'to a required check — every red night resets that clock.',
                    '',
                    line,
                  ].join('\n'),
                })
              }
            } else if (sticky) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: sticky.number,
                body: `Nightly run is green again: ${runUrl} — auto-closing.`,
              })
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: sticky.number,
                state: 'closed',
              })
            }
