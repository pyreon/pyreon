<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400" fill="none" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif">
  <!--
    Pyreon GitHub README banner — brand handoff §6.4 (PxArtReadme).
    Standalone repo asset (no site CSS), so canonical palette hex is
    baked in — same justified exception as the OG card. No fabricated
    version/size chips: real badges live as shields in README.md.
  -->
  <defs>
    <linearGradient id="rb-ember" x1="0" x2="1">
      <stop offset="0" stop-color="#FF1F8C"/>
      <stop offset="0.55" stop-color="#FF5E1A"/>
      <stop offset="1" stop-color="#FFC83D"/>
    </linearGradient>
    <radialGradient id="rb-glow" cx="0.18" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#FF5E1A" stop-opacity="0.10"/>
      <stop offset="0.7" stop-color="#FF5E1A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="400" fill="#0A0A0E"/>
  <rect width="1280" height="400" fill="url(#rb-glow)"/>

  <!-- ON glyph (~80px) + wordmark + subtitle -->
  <g transform="translate(80 150)">
    <circle cx="24" cy="43" r="15" fill="#F4EFE6"/>
    <path d="M47 58 L47 28 L47 43 Q47 28 62 28 Q77 28 77 43 L77 58" stroke="#F4EFE6" stroke-width="6.7" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  </g>
  <text x="190" y="190" font-size="76" font-weight="600" letter-spacing="-3" fill="#F4EFE6">pyre<tspan fill="url(#rb-ember)">on</tspan></text>
  <text x="192" y="232" font-size="20" fill="#8A8696">fine-grained reactivity · full-stack · AI-native</text>

  <!-- ember signal waveform footer -->
  <path d="M80 320 L420 320 L460 296 L760 296 L800 344 L1200 344" stroke="url(#rb-ember)" stroke-width="1.5" fill="none" opacity="0.8"/>
</svg>
