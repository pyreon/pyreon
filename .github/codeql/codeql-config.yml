# CodeQL config — scope analysis to the security-relevant surface.
#
# The workflow comment states the intent: "static analysis of the JS/TS
# surface — the dominant injection/XSS attack surface for a UI framework
# + its compiler." Test files, e2e specs, and example apps are NOT that
# surface: their inputs are hardcoded fixtures under the author's
# control, so findings like "polynomial regex on uncontrolled data" on a
# test's tag-stripping helper are false positives for a security gate.
#
# Excluding them keeps the gate signal on shipped code (packages' src,
# minus tests) and removes baseline noise surfaced when CodeQL was first
# enabled (PR #695) — pre-existing test-fixture regexes attributed to the
# next PR because there was no prior analyzed baseline on main.
name: 'Pyreon CodeQL config'

paths-ignore:
  - '**/tests/**'
  - '**/__tests__/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - '**/*.browser.test.ts'
  - '**/*.browser.test.tsx'
  - 'e2e/**'
  - 'examples/**'
  - 'docs/**'
  - '**/lib/**'
  - '**/dist/**'
  # Build-time CODE GENERATOR. `buildCompiledVerdicts` emits an inlined
  # validator from the consuming app's OWN `@pyreon/validate` schema source
  # (never untrusted runtime input) — the same accepted pattern as the validate
  # runtime JIT (`jit.ts`). CodeQL's `js/bad-code-sanitization` /
  # `js/unsafe-code-construction` are false positives for a build-time emitter
  # (emitValidator JSON-escapes every user string; the schema name is
  # identifier-guarded), but those queries can't be path-scoped via
  # query-filters — so the codegen is isolated in this one file and excluded
  # here, while the rest of the plugin stays fully scanned. Correctness is
  # locked by the compiler's emit-equivalence gate + the transform-driven tests.
  - '**/vite-plugin/src/compiled-verdicts.ts'
  # Build-time CODE GENERATOR (same accepted pattern as compiled-verdicts.ts).
  # `transformClientDirectives` lowers a `hydrate="…"` attribute to an
  # `island(() => import('…'), { name, hydrate })` wrapper by string-splicing the
  # app's OWN source (every emitted specifier/name is JSON.stringify-escaped;
  # the import source comes from the app's own import statement, never untrusted
  # runtime input). CodeQL's `js/bad-code-sanitization` / `js/unsafe-code-construction`
  # are false positives for a build-time emitter; correctness is locked by the
  # transform's 16-spec suite incl. a pipeline-validity check.
  - '**/compiler/src/client-directives.ts'
