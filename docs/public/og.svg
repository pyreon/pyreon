<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif">
  <!--
    Pyreon OG / social card — brand handoff §6.3 (PxArtOG).
    Standalone asset (social scrapers have no site CSS), so the
    canonical palette hex is baked in directly — the one legitimate
    exception to the no-raw-hex rule. Honesty: no dead pyreon.dev, no
    unverified version tag.
  -->
  <defs>
    <linearGradient id="og-ember" x1="0" x2="1">
      <stop offset="0" stop-color="#FF1F8C"/>
      <stop offset="0.55" stop-color="#FF5E1A"/>
      <stop offset="1" stop-color="#FFC83D"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0A0A0E"/>

  <!-- faint schematic baseline grid -->
  <g opacity="0.35">
    <line x1="0" y1="30"  x2="1200" y2="30"  stroke="#23232E"/>
    <line x1="0" y1="64"  x2="1200" y2="64"  stroke="#23232E"/>
    <line x1="0" y1="98"  x2="1200" y2="98"  stroke="#23232E"/>
    <line x1="0" y1="132" x2="1200" y2="132" stroke="#23232E"/>
    <line x1="0" y1="166" x2="1200" y2="166" stroke="#23232E"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#23232E"/>
    <line x1="0" y1="234" x2="1200" y2="234" stroke="#23232E"/>
    <line x1="0" y1="268" x2="1200" y2="268" stroke="#23232E"/>
    <line x1="0" y1="302" x2="1200" y2="302" stroke="#23232E"/>
    <line x1="0" y1="336" x2="1200" y2="336" stroke="#23232E"/>
    <line x1="0" y1="370" x2="1200" y2="370" stroke="#23232E"/>
    <line x1="0" y1="404" x2="1200" y2="404" stroke="#23232E"/>
    <line x1="0" y1="438" x2="1200" y2="438" stroke="#23232E"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="#23232E"/>
    <line x1="0" y1="506" x2="1200" y2="506" stroke="#23232E"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#23232E"/>
    <line x1="0" y1="574" x2="1200" y2="574" stroke="#23232E"/>
    <line x1="0" y1="608" x2="1200" y2="608" stroke="#23232E"/>
  </g>
  <!-- ember signal waveform -->
  <path d="M0 380 L420 380 L460 348 L740 348 L780 412 L1200 412" stroke="url(#og-ember)" stroke-width="1.5" fill="none"/>

  <!-- ON mark + wordmark (top-left) -->
  <g transform="translate(64 56)">
    <circle cx="13" cy="23" r="8" fill="#F4EFE6"/>
    <path d="M25 31 L25 15 L25 23 Q25 15 33 15 Q41 15 41 23 L41 31" stroke="#F4EFE6" stroke-width="3.6" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
    <text x="56" y="32" font-size="26" font-weight="600" letter-spacing="-0.8" fill="#F4EFE6">pyreon</text>
  </g>

  <!-- headline -->
  <text x="64" y="380" font-size="116" font-weight="600" letter-spacing="-5" fill="#F4EFE6">Signals in.</text>
  <text x="64" y="486" font-size="116" font-weight="600" letter-spacing="-5" fill="url(#og-ember)">Updates out.</text>
  <text x="64" y="536" font-size="24" fill="#8A8696">Pyreon — the signal-based UI framework. Fine-grained. Full-stack. AI-native.</text>

  <!-- footer (real link, no dead domain) -->
  <text x="64" y="590" font-size="15" font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#8A8696">github.com/pyreon/pyreon</text>
  <text x="1136" y="590" text-anchor="end" font-size="15" font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#8A8696">forged in prague · eu</text>
</svg>
