<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F0F14" />

    <!-- Title + description are overridden per-page via @pyreon/head's
         useHead() in _layout.tsx. The default below ships on the home
         page and any SSG render that doesn't set a title explicitly. -->
    <title>Pyreon — the signal-based UI framework</title>
    <meta
      name="description"
      content="Signal-based UI framework — fine-grained reactivity, no virtual DOM, streaming SSR."
    />

    <!-- FOUC-safe theme sync. Mirrors VitePress's localStorage key
         ('vitepress-theme-appearance') so the cut-over is seamless for
         users who already have a stored preference. Sets data-theme on
         <html> BEFORE first paint so tokens.css resolves the right
         palette with no flash. Default = dark per brand handoff. -->
    <script>
      ;(function () {
        try {
          var a = localStorage.getItem('vitepress-theme-appearance')
          var d =
            !a ||
            a === 'dark' ||
            (a === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = d ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>

    <!-- Brand fonts — Space Grotesk (sans) + JetBrains Mono (mono/accent),
         from brand handoff §4. Now self-hosted by @pyreon/zero's
         `fontPlugin` (wired via `zero({ font })` in vite.config.ts):

           • selfHost: woff2 emitted under /assets/fonts (same-origin,
             immutable) — eliminates the fonts.googleapis.com +
             fonts.gstatic.com cross-origin connection setup AND Google's
             10-minute-cached CSS that Lighthouse flagged.
           • subsets: ['latin'] — trims the unused subset woff2 files.
           • fallbackAdjust: emits size-adjusted "<Family> Fallback"
             @font-face declarations (the next/font technique) so the
             system fallback's metrics MATCH the web font — zero
             font-swap CLS — plus the `--pyreon-font-*` vars that
             tokens.css points `--font-sans` / `--font-mono` at.

         The plugin injects the self-host `<style>` + a primary-subset
         `<link rel=preload as=font>` at build time. In `vite dev` it
         falls back to the Google CDN `<link>` (build-only self-host),
         so local dev keeps working with no extra wiring. -->

    <!-- Brand favicon — rounded ink tile + ember disc. Leading slash
         so Vite's index.html transform base-prefixes it to
         `/<base>/favicon.svg`. Relative `./favicon.svg` would resolve
         against the current page URL and 404 on deep routes like
         `/pyreon/docs/X/` (→ tried to load `/docs/favicon.svg`). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph + Twitter card. og:image is absolute (social scrapers
         don't resolve site-relative paths) AND a raster PNG — Twitter/X,
         Facebook, LinkedIn, Slack, Discord and iMessage all reject SVG
         og:images, so an SVG card shows no thumbnail anywhere. og.png is a
         1200x630 raster of og.svg (brand fonts baked in via headless-Chromium
         render; see scripts/generate-og.mjs). og.svg is kept as the source. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pyreon.dev/" />
    <meta property="og:title" content="Pyreon — the signal-based UI framework" />
    <meta
      property="og:description"
      content="Signal-based UI framework — fine-grained reactivity, no virtual DOM, streaming SSR."
    />
    <meta property="og:image" content="https://pyreon.dev/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Pyreon — the signal-based UI framework. Signals in. Updates out."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://pyreon.dev/og.png" />
    <meta
      name="twitter:image:alt"
      content="Pyreon — the signal-based UI framework. Signals in. Updates out."
    />
  </head>
  <body>
    <div id="app"><!--pyreon-app--></div>
    <!--pyreon-head-->
    <!--pyreon-scripts-->
  </body>
</html>
