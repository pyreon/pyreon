<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F0F14" />

    <!-- Title + description are overridden per-page via @pyreon/head's
         useHead() in _layout.tsx. The default below ships on the home
         page and any SSG render that doesn't set a title explicitly. -->
    <title>Pyreon — the signal-based UI framework</title>
    <meta
      name="description"
      content="Signal-based UI framework — fine-grained reactivity, no virtual DOM, streaming SSR."
    />

    <!-- FOUC-safe theme sync. Mirrors VitePress's localStorage key
         ('vitepress-theme-appearance') so the cut-over is seamless for
         users who already have a stored preference. Sets data-theme on
         <html> BEFORE first paint so tokens.css resolves the right
         palette with no flash. Default = dark per brand handoff. -->
    <script>
      ;(function () {
        try {
          var a = localStorage.getItem('vitepress-theme-appearance')
          var d =
            !a ||
            a === 'dark' ||
            (a === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = d ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>

    <!-- Brand fonts — Space Grotesk (sans) + JetBrains Mono (mono/accent),
         from brand handoff §4. PageSpeed-optimized loading:

         1. `preconnect` primes DNS + TCP + TLS to fonts.googleapis.com
            AND fonts.gstatic.com before the stylesheet request fires.
         2. The fonts CSS itself is loaded NON-blockingly via the
            `preload as=style` + `onload` swap pattern. A standard
            `<link rel=stylesheet>` BLOCKS the first paint until the
            CSS arrives — moving the load to `preload` removes that
            critical-path dependency (~150-300ms saved on slow 4G).
            On load the `onload` handler flips it back to `stylesheet`
            so the rules actually apply.
         3. `<noscript>` fallback keeps the fonts working for users
            with JS disabled (the `onload` rel-flip needs JS).
         4. `display=swap` in the URL ensures the system fallback
            paints text immediately while the woff2 is fetched —
            never invisible-until-loaded. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      />
    </noscript>

    <!-- Brand favicon — rounded ink tile + ember disc. Leading slash
         so Vite's index.html transform base-prefixes it to
         `/<base>/favicon.svg`. Relative `./favicon.svg` would resolve
         against the current page URL and 404 on deep routes like
         `/pyreon/docs/X/` (→ tried to load `/docs/favicon.svg`). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph + Twitter card. og:image is absolute because social
         scrapers don't resolve site-relative paths. The OG asset is an
         SVG (Twitter/Slack prefer raster — a build-time PNG rasterize
         is a documented follow-up; same gap most static SSG generators have). -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pyreon.dev/" />
    <meta property="og:title" content="Pyreon — the signal-based UI framework" />
    <meta
      property="og:description"
      content="Signal-based UI framework — fine-grained reactivity, no virtual DOM, streaming SSR."
    />
    <meta property="og:image" content="https://pyreon.dev/og.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://pyreon.dev/og.svg" />
  </head>
  <body>
    <div id="app"><!--pyreon-app--></div>
    <!--pyreon-head-->
    <!--pyreon-scripts-->
  </body>
</html>
